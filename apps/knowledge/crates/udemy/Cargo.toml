[package]
name = "udemy"
version = "0.1.0"
edition = "2021"
description = "Udemy course scraping, parsing, embedding, and semantic search"

[features]
default = ["metal"]
metal = ["candle/metal"]
cuda  = ["candle/cuda"]

[[bin]]
name = "udemy"
path = "src/bin/udemy.rs"

[dependencies]
candle    = { path = "../../../../crates/candle", default-features = false }
lancedb      = "0.27"
arrow-array  = "57"
arrow-schema = "57"
futures      = "0.3"
tokio        = { version = "1", features = ["full"] }
serde        = { version = "1", features = ["derive"] }
serde_json   = "1"
anyhow       = "1"
tracing      = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
reqwest      = { version = "0.12", features = ["json", "cookies", "gzip", "brotli"] }
regex        = "1"
scraper      = "0.22"
clap         = { version = "4", features = ["derive"] }
