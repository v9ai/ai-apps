[package]
name = "knowledge-ml-core"
version = "0.1.0"
edition = "2021"
description = "Offline ML pipeline for the knowledge app — similarity, readability, concept extraction"
license = "MIT"

[features]
default = ["metal"]
metal = ["candle/metal"]
cuda  = ["candle/cuda"]

[[bin]]
name = "build-similarity"
path = "src/bin/build_similarity.rs"

[[bin]]
name = "analyze-readability"
path = "src/bin/analyze_readability.rs"

[dependencies]
candle = { path = "../../../../crates/candle", default-features = false }

tokio      = { version = "1", features = ["full"] }
serde      = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror  = "2"
anyhow     = "1"
tracing    = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
walkdir    = "2"
clap       = { version = "4", features = ["derive"] }
