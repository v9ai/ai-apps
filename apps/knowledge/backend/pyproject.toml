[project]
name = "knowledge-backend"
version = "0.1.0"
description = "LangGraph content generation pipeline for knowledge articles"
requires-python = ">=3.12"
dependencies = [
    "langgraph>=0.4.0",
    "langchain-core>=0.3.0",
    "deepseek-client",
]

[tool.uv.sources]
deepseek-client = { path = "../../../pypackages/deepseek", editable = true }

[project.optional-dependencies]
test = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[project.scripts]
generate = "graph.cli:main"
