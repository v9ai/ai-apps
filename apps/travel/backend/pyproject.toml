[project]
name = "travel-agent"
version = "0.1.0"
description = "Katowice travel guide — AI-powered top places to visit with Google Maps integration"
requires-python = ">=3.12"
dependencies = [
    "langgraph>=0.2",
    "deepseek-client",
    "python-dotenv>=1.0.0",
]

[tool.uv.sources]
deepseek-client = { path = "../../../pypackages/deepseek", editable = true }

[build-system]
requires = ["setuptools>=73.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["travel_agent*"]

[dependency-groups]
dev = [
    "langgraph-cli[inmem]>=0.4.14",
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "deepeval>=2.0",
    "langchain-openai>=0.3",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[project.scripts]
generate = "travel_agent.cli:main"
