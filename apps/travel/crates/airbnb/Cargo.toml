[package]
name = "airbnb"
version = "0.1.0"
edition = "2021"
description = "Airbnb URL builder — no API, just parameterised search links with filters"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
url = "2"
chrono = { version = "0.4", features = ["serde"] }

[[bin]]
name = "airbnb-search"
path = "src/bin/search.rs"
