[package]
name = "travel-ml"
version = "0.1.0"
edition = "2021"
description = "Hotel semantic search: Candle embeddings + LanceDB vector store"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
anyhow = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
reqwest = { version = "0.12", features = ["json"] }
scraper = "0.22"
clap = { version = "4", features = ["derive"] }
futures = "0.3"
regex = "1"

# Candle ML (match crates/research versions)
candle-core = "0.9"
candle-nn = "0.9"
candle-transformers = "0.9"
hf-hub = "0.4"
tokenizers = "0.21"

# LanceDB + Arrow (match crates/research versions)
lancedb = "0.27"
arrow-array = "57"
arrow-schema = "57"
arrow = "57"

# DeepSeek (fallback only — gated behind feature)
[dependencies.deepseek]
path = "../../../../crates/deepseek"
features = ["reqwest-client"]
optional = true

[features]
default = []
deepseek-fallback = ["deepseek"]

[[bin]]
name = "travel-ml"
path = "src/bin/main.rs"
