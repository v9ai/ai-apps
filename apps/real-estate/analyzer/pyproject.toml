[project]
name = "real-estate-analyzer"
version = "0.1.0"
description = "Apartment price analyzer with DeepSeek extraction and valuation"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.29.0",
    "httpx>=0.27.0",
    "beautifulsoup4>=4.12.0",
    "lxml>=5.0.0",
    "deepeval>=2.0.0",
    "python-dotenv>=1.0.0",
    "psycopg[binary]>=3.2.0",
    "pgvector>=0.3.0",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-xdist>=3.5.0",
]

[tool.pytest.ini_options]
testpaths = ["eval"]
asyncio_mode = "strict"
markers = [
    "slow: marks tests that call the live agent (deselect with '-m \"not slow\"')",
    "safety: marks safety/bias evaluation tests",
    "structural: marks structural schema validation tests",
    "e2e: marks end-to-end pipeline tests",
]

[build-system]
requires = ["setuptools>=73.0.0", "wheel"]
build-backend = "setuptools.build_meta"
