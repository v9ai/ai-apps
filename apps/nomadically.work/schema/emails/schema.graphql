extend type Query {
  emailCampaigns(status: String, limit: Int, offset: Int): EmailCampaignsResult!
  emailCampaign(id: String!): EmailCampaign
  emailTemplates(category: String, limit: Int, offset: Int): EmailTemplatesResult!
  emailTemplate(id: Int!): EmailTemplate
  emailStats: EmailStats!
}

extend type Mutation {
  createDraftCampaign(input: CreateCampaignInput!): EmailCampaign!
  updateCampaign(id: String!, input: UpdateCampaignInput!): EmailCampaign!
  deleteCampaign(id: String!): DeleteCampaignResult!
  launchEmailCampaign(id: String!): EmailCampaign!
  sendEmail(input: SendEmailInput!): SendEmailResult!
  generateEmail(input: GenerateEmailInput!): GenerateEmailResult!
  createEmailTemplate(input: CreateEmailTemplateInput!): EmailTemplate!
  updateEmailTemplate(id: Int!, input: UpdateEmailTemplateInput!): EmailTemplate!
  deleteEmailTemplate(id: Int!): DeleteEmailTemplateResult!
  scheduleBatchEmails(input: ScheduleBatchEmailsInput!): ScheduleBatchResult!
  scheduleFollowUpBatch(input: FollowUpBatchInput!): FollowUpBatchResult!
  markEmailReplied(resendId: String!): MarkRepliedResult!
  syncResendEmails(companyId: Int): SyncResendResult!
  sendScheduledEmailNow(resendId: String!): SendNowResult!
  cancelScheduledEmail(resendId: String!): CancelEmailResult!
  cancelCompanyEmails(companyId: Int!): CancelCompanyEmailsResult!
  generateReply(input: GenerateReplyInput!): GenerateReplyResult!
}

type EmailCampaign {
  id: String!
  companyId: Int
  name: String!
  status: String!
  sequence: JSON
  delayDays: JSON
  startAt: String
  mode: String
  fromEmail: String
  replyTo: String
  totalRecipients: Int!
  emailsSent: Int!
  emailsScheduled: Int!
  emailsFailed: Int!
  recipientEmails: [String!]!
  createdAt: String!
  updatedAt: String!
}

type EmailCampaignsResult {
  campaigns: [EmailCampaign!]!
  totalCount: Int!
}

type DeleteCampaignResult {
  success: Boolean!
  message: String
}

input CreateCampaignInput {
  name: String!
  companyId: Int
  fromEmail: String
  replyTo: String
  mode: String
  sequence: JSON
  delayDays: JSON
  recipientEmails: [String!]
}

input UpdateCampaignInput {
  name: String
  status: String
  fromEmail: String
  replyTo: String
  mode: String
  sequence: JSON
  delayDays: JSON
  startAt: String
  recipientEmails: [String!]
}

type EmailTemplate {
  id: Int!
  name: String!
  description: String
  subject: String
  htmlContent: String
  textContent: String
  category: String
  tags: [String!]!
  variables: [String!]!
  isActive: Boolean!
  createdAt: String!
  updatedAt: String!
}

type EmailTemplatesResult {
  templates: [EmailTemplate!]!
  totalCount: Int!
}

type DeleteEmailTemplateResult {
  success: Boolean!
  message: String
}

input CreateEmailTemplateInput {
  name: String!
  description: String
  subject: String
  htmlContent: String
  textContent: String
  category: String
  tags: [String!]
  variables: [String!]
}

input UpdateEmailTemplateInput {
  name: String
  description: String
  subject: String
  htmlContent: String
  textContent: String
  category: String
  tags: [String!]
  variables: [String!]
  isActive: Boolean
}

input SendEmailInput {
  to: String!
  subject: String!
  html: String!
  text: String
  replyTo: String
  from: String
  scheduledAt: String
}

type SendEmailResult {
  success: Boolean!
  id: String
  error: String
}

input GenerateEmailInput {
  recipientName: String!
  recipientRole: String
  companyName: String
  purpose: String!
  tone: String
  templateId: Int
}

type GenerateEmailResult {
  subject: String!
  html: String!
  text: String!
}

input GenerateReplyInput {
  originalEmailContent: String!
  originalSender: String!
  additionalDetails: String
  tone: String
  replyType: String
  includeCalendly: Boolean
  replyTo: String
}

type GenerateReplyResult {
  subject: String!
  body: String!
}

# --- Batch Scheduling ---

input ScheduleBatchEmailsInput {
  """Recipients with name and email"""
  recipients: [BatchRecipientInput!]!
  subject: String!
  body: String!
  """Use business day scheduling (Mon-Fri, 8am UTC, random delays)"""
  useScheduler: Boolean
}

input BatchRecipientInput {
  email: String!
  name: String!
  contactId: Int
  companyId: Int
}

type ScheduleBatchResult {
  success: Boolean!
  message: String!
  scheduled: Int!
  failed: Int!
  firstSendDate: String
  lastSendDate: String
  schedulingPlan: String
}

# --- Follow-up Sequences ---

input FollowUpBatchInput {
  companyId: Int!
  daysAfter: Int!
  sequenceNumber: String!
  customSubject: String
  customInstructions: String
}

type FollowUpBatchResult {
  success: Boolean!
  message: String!
  contactCount: Int!
  emailIds: [String!]!
}

type MarkRepliedResult {
  success: Boolean!
  message: String
}

# --- Sync & Cancel ---

type SyncResendResult {
  success: Boolean!
  updatedCount: Int!
  skippedCount: Int!
  totalCount: Int!
  error: String
}

type SendNowResult {
  success: Boolean!
  resendId: String
  error: String
}

type CancelEmailResult {
  success: Boolean!
  error: String
}

type EmailStats {
  sentToday: Int!
  sentThisWeek: Int!
  sentThisMonth: Int!
  scheduledToday: Int!
  scheduledFuture: Int!
  totalSent: Int!
  deliveredToday: Int!
  deliveredThisWeek: Int!
  deliveredThisMonth: Int!
  bouncedToday: Int!
  bouncedThisWeek: Int!
  bouncedThisMonth: Int!
  openedToday: Int!
  openedThisWeek: Int!
  openedThisMonth: Int!
}

type CancelCompanyEmailsResult {
  success: Boolean!
  message: String!
  cancelledCount: Int!
  failedCount: Int!
}
