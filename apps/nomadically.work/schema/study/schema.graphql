type StudyTopic {
  id: ID!
  category: String!
  topic: String!
  title: String!
  summary: String
  bodyMd: String
  deepDive: String
  difficulty: String!
  tags: [String!]!
  createdAt: DateTime!
}

type StudyConceptExplanation {
  id: ID!
  selectedText: String!
  explanation: String!
  createdAt: DateTime!
}

extend type Query {
  studyTopic(category: String!, topic: String!): StudyTopic
  studyTopics(category: String!): [StudyTopic!]!
  studyCategories: [String!]!
}

extend type Mutation {
  createStudyTopic(
    category: String
    topic: String
    title: String
    summary: String
    difficulty: String
    tags: [String!]
  ): StudyTopic!
  generateStudyConceptExplanation(
    studyTopicId: ID!
    selectedText: String!
    context: String
  ): StudyConceptExplanation!
  generateStudyDeepDive(
    studyTopicId: ID!
    force: Boolean
  ): StudyTopic!
  generateStudyTopicsForCategory(category: String!, count: Int): [StudyTopic!]!
}
