extend type Query {
  blockedCompanies: [BlockedCompany!]!
}

extend type Mutation {
  blockCompany(name: String!, reason: String): BlockedCompany!
  unblockCompany(id: Int!): DeleteBlockedCompanyResult!
}

type BlockedCompany {
  id: Int!
  name: String!
  reason: String
  createdAt: String!
}

type DeleteBlockedCompanyResult {
  success: Boolean!
  message: String
}
