[package]
name = "hooks"
version = "0.4.0"
edition = "2021"
description = "Parallel Rust hook server for Claude Code — routes evaluations to DeepSeek Reasoner"

[[bin]]
name = "hooks-server"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full", "signal"] }
axum = { version = "0.7", features = ["json"] }
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dashmap = "6"
sha2 = "0.10"
regex = "1"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
dotenvy = "0.15"
dirs = "6"
deepseek = { path = "../../../crates/deepseek" }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
