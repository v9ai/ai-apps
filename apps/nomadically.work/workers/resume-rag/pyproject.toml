[project]
name = "nomadically-work-resume-rag"
version = "0.1.0"
description = "Cloudflare Python Worker for Resume RAG with Vectorize + LlamaParse"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    # NOTE: No runtime deps needed — the worker uses only built-in Pyodide
    # modules (js, pyodide.ffi) and the Cloudflare Workers runtime (workers).
    # webtypy is dev-only (IDE type hints). Do NOT add pydantic or langchain —
    # they pull in pydantic_core (4 MB WASM) and blow past the 3 MiB limit.
]

[dependency-groups]
dev = ["workers-py", "workers-runtime-sdk"]

[tool.uv]
# Use Pyodide-compatible packages when available
index-url = "https://pypi.org/simple"
