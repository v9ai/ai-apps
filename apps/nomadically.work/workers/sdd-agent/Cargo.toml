[package]
name = "sdd-agent"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
worker = { version = "0.7", features = ["d1"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
futures = "0.3"
js-sys = "0.3"
deepseek = { path = "../../../../crates/deepseek", default-features = false }

# NOTE: No tokio/reqwest — wasm32-unknown-unknown target.
# DeepSeek API called via worker::Fetch (CF Workers native fetch).
# Agent SDK patterns implemented natively for WASM parity.
