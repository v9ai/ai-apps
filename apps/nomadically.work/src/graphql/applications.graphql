# Application-related GraphQL queries and mutations

fragment ApplicationFields on Application {
  id
  email
  jobId
  resume
  questions {
    questionId
    questionText
    answerText
  }
  status
  notes
  jobTitle
  companyName
  companyKey
  jobDescription
  aiInterviewQuestions
  createdAt
}

query GetApplications {
  applications {
    ...ApplicationFields
  }
}

query GetApplication($id: Int!) {
  application(id: $id) {
    ...ApplicationFields
  }
}

mutation CreateApplication($input: ApplicationInput!) {
  createApplication(input: $input) {
    ...ApplicationFields
  }
}

mutation UpdateApplication($id: Int!, $input: UpdateApplicationInput!) {
  updateApplication(id: $id, input: $input) {
    id
    jobId
    status
    notes
    jobTitle
    companyName
    companyKey
    jobDescription
  }
}

mutation DeleteApplication($id: Int!) {
  deleteApplication(id: $id) {
    success
    message
  }
}
