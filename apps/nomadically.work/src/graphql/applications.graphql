mutation DeleteApplication($id: Int!) {
  deleteApplication(id: $id) {
    success
    message
  }
}

mutation LinkSelectionToRequirement($applicationId: Int!, $requirement: String!, $sourceQuote: String!) {
  linkSelectionToRequirement(applicationId: $applicationId, requirement: $requirement, sourceQuote: $sourceQuote) {
    id
    aiInterviewPrep {
      summary
      requirements {
        requirement
        questions
        studyTopics
        studyTopicDeepDives { topic deepDive }
        sourceQuote
        deepDive
      }
      generatedAt
    }
  }
}

mutation GenerateAgenticCoding($applicationId: Int!) {
  generateAgenticCoding(applicationId: $applicationId) {
    id
    agenticCoding {
      overview
      workflowPattern
      exercises {
        title
        description
        difficulty
        skills
        hints
        agentPrompt
      }
      promptTemplates {
        title
        purpose
        stackContext
        prompt
      }
      qaApproach
      failureModes {
        scenario
        why
        alternative
      }
      teamPractices
      measurableOutcomes {
        task
        beforeTime
        afterTime
        improvement
      }
      resources {
        title
        url
        description
      }
      generatedAt
    }
  }
}

mutation GenerateBackendPrep($applicationId: Int!) {
  generateBackendPrep(applicationId: $applicationId) {
    id
    aiBackendPrep {
      systemDesign { ...BackendPrepSectionFields }
      distributedSystems { ...BackendPrepSectionFields }
      databaseDesign { ...BackendPrepSectionFields }
      sqlOptimization { ...BackendPrepSectionFields }
      nosqlPatterns { ...BackendPrepSectionFields }
      apiDesign { ...BackendPrepSectionFields }
      authSecurity { ...BackendPrepSectionFields }
      caching { ...BackendPrepSectionFields }
      messageQueues { ...BackendPrepSectionFields }
      microservices { ...BackendPrepSectionFields }
      testing { ...BackendPrepSectionFields }
      devops { ...BackendPrepSectionFields }
      securityOwasp { ...BackendPrepSectionFields }
      performance { ...BackendPrepSectionFields }
      concurrencyAsync { ...BackendPrepSectionFields }
      observability { ...BackendPrepSectionFields }
      eventDriven { ...BackendPrepSectionFields }
      serverlessEdge { ...BackendPrepSectionFields }
      typescriptNode { ...BackendPrepSectionFields }
      aiMlIntegration { ...BackendPrepSectionFields }
      generatedAt
    }
  }
}

mutation GenerateDeepResearch($applicationId: Int!) {
  generateDeepResearch(applicationId: $applicationId) {
    id
    aiDeepResearch {
      questions {
        question
        category
        deepseek { model content reasoning }
        qwen { model content reasoning }
      }
      generatedAt
    }
  }
}

mutation GenerateInterviewQuestions($applicationId: Int!, $type: String!) {
  generateInterviewQuestions(applicationId: $applicationId, type: $type) {
    id
    aiInterviewQuestions {
      companyContext
      recruiterQuestions {
        question
        reason
        category
      }
      technicalQuestions {
        question
        reason
        category
      }
      recruiterGeneratedAt
      technicalGeneratedAt
    }
  }
}
