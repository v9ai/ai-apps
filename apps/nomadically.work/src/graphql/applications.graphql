# Application-related GraphQL queries and mutations

fragment ApplicationFields on Application {
  id
  email
  jobId
  resume
  questions {
    questionId
    questionText
    answerText
  }
  status
  notes
  jobTitle
  companyName
  companyKey
  jobDescription
  createdAt
  interviewPrep {
    id
    slug
    title
    description
    level
  }
  aiInterviewPrep {
    summary
    requirements {
      requirement
      questions
      studyTopics
      studyTopicDeepDives { topic deepDive }
      sourceQuote
      deepDive
    }
    generatedAt
  }
  aiInterviewQuestions {
    companyContext
    recruiterQuestions {
      question
      reason
      category
    }
    technicalQuestions {
      question
      reason
      category
    }
    recruiterGeneratedAt
    technicalGeneratedAt
  }
  agenticCoding {
    overview
    workflowPattern
    exercises {
      title
      description
      difficulty
      skills
      hints
      agentPrompt
    }
    promptTemplates {
      title
      purpose
      stackContext
      prompt
    }
    qaApproach
    failureModes {
      scenario
      why
      alternative
    }
    teamPractices
    measurableOutcomes {
      task
      beforeTime
      afterTime
      improvement
    }
    resources {
      title
      url
      description
    }
    generatedAt
  }
  aiBackendPrep {
    systemDesign { ...BackendPrepSectionFields }
    distributedSystems { ...BackendPrepSectionFields }
    databaseDesign { ...BackendPrepSectionFields }
    sqlOptimization { ...BackendPrepSectionFields }
    nosqlPatterns { ...BackendPrepSectionFields }
    apiDesign { ...BackendPrepSectionFields }
    authSecurity { ...BackendPrepSectionFields }
    caching { ...BackendPrepSectionFields }
    messageQueues { ...BackendPrepSectionFields }
    microservices { ...BackendPrepSectionFields }
    testing { ...BackendPrepSectionFields }
    devops { ...BackendPrepSectionFields }
    securityOwasp { ...BackendPrepSectionFields }
    performance { ...BackendPrepSectionFields }
    concurrencyAsync { ...BackendPrepSectionFields }
    observability { ...BackendPrepSectionFields }
    eventDriven { ...BackendPrepSectionFields }
    serverlessEdge { ...BackendPrepSectionFields }
    typescriptNode { ...BackendPrepSectionFields }
    aiMlIntegration { ...BackendPrepSectionFields }
    generatedAt
  }
  aiDeepResearch {
    questions {
      question
      category
      deepseek { model content reasoning }
      qwen { model content reasoning }
    }
    generatedAt
  }
}

fragment BackendPrepSectionFields on BackendPrepSection {
  title
  overview
  keyConcepts
  deepDive
  interviewQuestions {
    question
    idealAnswer
    followUps
    difficulty
  }
  codeExamples {
    title
    language
    code
    explanation
  }
  commonPitfalls
  talkingPoints
  researchInsights
}

query GetApplications {
  applications {
    ...ApplicationFields
  }
}

query GetApplication($id: Int!) {
  application(id: $id) {
    ...ApplicationFields
  }
}

mutation CreateApplication($input: ApplicationInput!) {
  createApplication(input: $input) {
    ...ApplicationFields
  }
}

mutation UpdateApplication($id: Int!, $input: UpdateApplicationInput!) {
  updateApplication(id: $id, input: $input) {
    id
    jobId
    status
    notes
    jobTitle
    companyName
    companyKey
    jobDescription
  }
}

mutation LinkTrackToApplication($applicationId: Int!, $trackSlug: String!) {
  linkTrackToApplication(applicationId: $applicationId, trackSlug: $trackSlug) {
    id
    interviewPrep {
      id
      slug
      title
      description
      level
    }
  }
}

mutation UnlinkTrackFromApplication($applicationId: Int!, $trackSlug: String!) {
  unlinkTrackFromApplication(applicationId: $applicationId, trackSlug: $trackSlug) {
    id
    interviewPrep {
      id
      slug
      title
      description
      level
    }
  }
}

mutation GenerateInterviewPrep($applicationId: Int!) {
  generateInterviewPrep(applicationId: $applicationId) {
    id
    aiInterviewPrep {
      summary
      requirements {
        requirement
        questions
        studyTopics
        studyTopicDeepDives { topic deepDive }
        sourceQuote
        deepDive
      }
      generatedAt
    }
  }
}

mutation GenerateTopicDeepDive($applicationId: Int!, $requirement: String!, $force: Boolean) {
  generateTopicDeepDive(applicationId: $applicationId, requirement: $requirement, force: $force) {
    id
    aiInterviewPrep {
      summary
      requirements {
        requirement
        questions
        studyTopics
        studyTopicDeepDives { topic deepDive }
        sourceQuote
        deepDive
      }
      generatedAt
    }
  }
}

mutation GenerateStudyTopicDeepDive($applicationId: Int!, $requirement: String!, $studyTopic: String!, $force: Boolean) {
  generateStudyTopicDeepDive(applicationId: $applicationId, requirement: $requirement, studyTopic: $studyTopic, force: $force) {
    id
    aiInterviewPrep {
      summary
      requirements {
        requirement
