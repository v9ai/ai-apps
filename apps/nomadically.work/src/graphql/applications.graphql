    }
  }
}

mutation GenerateRequirementFromSelection($applicationId: Int!, $selectedText: String!) {
  generateRequirementFromSelection(applicationId: $applicationId, selectedText: $selectedText) {
    id
    aiInterviewPrep {
      summary
      requirements {
        requirement
