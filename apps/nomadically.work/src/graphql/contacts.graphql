query GetContact($id: Int!) {
  contact(id: $id) {
    id
    firstName
    lastName
    email
    emails
    bouncedEmails
    linkedinUrl
    company
    companyId
    position
    emailVerified
    doNotContact
    githubHandle
    telegramHandle
    tags
    nbStatus
    nbResult
    nbFlags
    nbSuggestedCorrection
    createdAt
    updatedAt
  }
}

mutation UpdateContact($id: Int!, $input: UpdateContactInput!) {
  updateContact(id: $id, input: $input) {
    id
    firstName
    lastName
    email
    emails
    linkedinUrl
    position
    githubHandle
    telegramHandle
    doNotContact
    tags
    emailVerified
    updatedAt
  }
}

mutation DeleteContact($id: Int!) {
  deleteContact(id: $id) {
    success
    message
  }
}

query GetResendEmail($resendId: String!) {
  resendEmail(resendId: $resendId) {
    id
    from
    to
    subject
    text
    html
    lastEvent
    createdAt
    scheduledAt
    cc
    bcc
  }
}

query GetContactEmails($contactId: Int!) {
  contactEmails(contactId: $contactId) {
    id
    resendId
    fromEmail
    toEmails
    subject
    textContent
    status
    sentAt
    recipientName
    createdAt
    updatedAt
  }
}

query GetContacts($companyId: Int, $search: String, $limit: Int, $offset: Int) {
  contacts(companyId: $companyId, search: $search, limit: $limit, offset: $offset) {
    contacts {
      id
      firstName
      lastName
      email
      bouncedEmails
      linkedinUrl
      position
      company
      companyId
      githubHandle
      telegramHandle
      emailVerified
      doNotContact
      nbResult
      tags
      createdAt
    }
    totalCount
  }
}

mutation ImportContacts($contacts: [ContactInput!]!) {
  importContacts(contacts: $contacts) {
    success
    imported
    failed
    errors
  }
}

mutation FindContactEmail($contactId: Int!) {
  findContactEmail(contactId: $contactId) {
    success
    emailFound
    email
    verified
    message
    candidatesTried
  }
}

mutation FindCompanyEmails($companyId: Int!) {
  findCompanyEmails(companyId: $companyId) {
    success
    message
    companiesProcessed
    totalContactsProcessed
    totalEmailsFound
    errors
  }
}

mutation EnhanceAllContacts {
  enhanceAllContacts {
    success
    message
    companiesProcessed
    totalContactsProcessed
    totalEmailsFound
    errors
  }
}

mutation ApplyEmailPattern($companyId: Int!) {
  applyEmailPattern(companyId: $companyId) {
    success
    message
    contactsUpdated
    pattern
    contacts {
      id
      email
      emailVerified
    }
  }
}

mutation UnverifyCompanyContacts($companyId: Int!) {
  unverifyCompanyContacts(companyId: $companyId) {
    success
    count
  }
}

mutation CreateContact($input: CreateContactInput!) {
  createContact(input: $input) {
    id
    firstName
    lastName
    email
    linkedinUrl
    position
    companyId
    githubHandle
    telegramHandle
    tags
  }
}
