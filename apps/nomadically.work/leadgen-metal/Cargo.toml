[package]
name = "leadgen-metal"
version = "0.1.0"
edition = "2021"

[dependencies]
memmap2 = "0.9"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
crossbeam = "0.8"
parking_lot = "0.12"
ahash = "0.8"
bytemuck = { version = "1", features = ["derive"] }
crc32fast = "1"
roaring = "0.10"
regex = "1"
scraper = "0.20"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
uuid = { version = "1", features = ["v4"] }
