[project]
name = "nomadically-langgraph"
version = "0.2.0"
description = "LangGraph pipelines for job processing, classification, matching, and cleanup"
requires-python = ">=3.12"
dependencies = [
    "click>=8.0",
    "deepeval>=3.8.9",
    "duckduckgo-search>=7.0",
    "httpx>=0.27.0",
    "langchain-openai>=1.1.11",
    "langchain-core>=0.3",
    "langgraph>=1.1.2",
    "psycopg[binary]>=3.2",
    "python-dotenv>=1.0",
    "pydantic>=2.0",
    "tenacity>=9.0",
    "tavily-python>=0.5.0",
]

[project.scripts]
cli = "cli:main"
