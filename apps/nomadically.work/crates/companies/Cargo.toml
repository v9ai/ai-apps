[package]
name = "companies"
version = "0.1.0"
edition = "2021"
description = "Audit & hide broken companies in nomadically.work"

[lib]
name = "companies"
path = "src/lib.rs"

[[bin]]
name = "companies"
path = "src/bin/companies.rs"

[dependencies]
nomad = { path = "../nomad" }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4", features = ["derive"] }
regex = "1"
once_cell = "1"
rayon = "1"
