[package]
name = "nomad"
version = "0.1.0"
edition = "2021"
description = "Job processing pipeline + local dev orchestrator for nomadically.work"

[lib]
name = "nomad"
path = "src/lib.rs"

[[bin]]
name = "nomad"
path = "src/main.rs"

[[bin]]
name = "nomad-classify"
path = "src/bin/classify.rs"

[[bin]]
name = "nomad-process"
path = "src/bin/process.rs"

[[bin]]
name = "nomad-cleanup"
path = "src/bin/cleanup.rs"

[[bin]]
name = "nomad-report"
path = "src/bin/report.rs"

[dependencies]
tokio = { version = "1", features = ["full", "process", "signal"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
anyhow = "1"
deepseek = { path = "../../../../crates/deepseek", features = ["reqwest-client", "agent"] }
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
regex = "1"
once_cell = "1"
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4", features = ["derive"] }
urlencoding = "2"
