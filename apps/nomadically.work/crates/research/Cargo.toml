[package]
name = "research-agent"
version = "0.1.0"
edition = "2021"
description = "DeepSeek Reasoner + Semantic Scholar research agent for remote EU job market analysis"

[[bin]]
name = "research-agent"
path = "src/bin/research_agent.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
anyhow = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
async-trait = "0.1"
reqwest = { version = "0.12", features = ["json"] }
dotenvy = "0.15"
url = "2"
research = { path = "../../../../crates/research" }
deepseek = { path = "../../../../crates/deepseek" }

[dev-dependencies]
axum = "0.8"
tempfile = "3"
