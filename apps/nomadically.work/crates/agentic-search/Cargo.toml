[package]
name = "agentic-search"
version = "0.1.0"
edition = "2021"
description = "Cost-aware agentic codebase search — Glob → Grep → Read tool hierarchy driven by DeepSeek"

[[bin]]
name = "agentic-search"
path = "src/main.rs"

[dev-dependencies]
tempfile = "3"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
dotenvy = "0.15"
glob = "0.3"
regex = "1"
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
walkdir = "2"
