[package]
name = "semantic-scholar"
version = "0.1.0"
edition = "2021"
description = "Semantic Scholar API client for research paper discovery"

[[bin]]
name = "research"
path = "src/bin/research.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", features = ["json"] }
tokio = { version = "1", features = ["full"] }
anyhow = "1"
thiserror = "2"
tracing = "0.1"
clap = { version = "4", features = ["derive"] }
