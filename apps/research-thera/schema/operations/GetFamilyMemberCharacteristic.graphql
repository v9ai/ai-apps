query GetFamilyMemberCharacteristic($id: Int!) {
  familyMemberCharacteristic(id: $id) {
    id
    familyMemberId
    createdBy
    category
    title
    description
    severity
    frequencyPerWeek
    durationWeeks
    ageOfOnset
    impairmentDomains
    externalizedName
    strengths
    riskTier
    tags
    uniqueOutcomes {
      id
      characteristicId
      createdBy
      observedAt
      description
      createdAt
      updatedAt
    }
    behaviorObservations {
      id
      familyMemberId
      goalId
      characteristicId
      createdBy
      observedAt
      observationType
      frequency
      intensity
      context
      notes
      createdAt
      updatedAt
    }
    research {
      id
      goalId
      characteristicId
      title
      authors
      year
      journal
      doi
      url
      abstract
      keyFindings
      therapeuticTechniques
      evidenceLevel
      relevanceScore
      extractedBy
      extractionConfidence
      createdAt
    }
    createdAt
    updatedAt
  }
}
