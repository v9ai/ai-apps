query GetStory($id: Int!) {
  story(id: $id) {
    id
    goalId
    issueId
    feedbackId
    createdBy
    content
    language
    minutes
    audioKey
    audioUrl
    audioGeneratedAt
    createdAt
    updatedAt
    goal {
      id
      title
      slug
    }
    issue {
      id
      title
      familyMember {
        id
        firstName
        name
        slug
      }
    }
  }
}
