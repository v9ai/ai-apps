query GetFamilyMembers {
  familyMembers {
    id
    userId
    slug
    firstName
    name
    ageYears
    relationship
    email
    phone
    location
    occupation
    dateOfBirth
    bio
    createdAt
    updatedAt
    shares {
      familyMemberId
      email
      role
      createdAt
      createdBy
    }
    relationships {
      id
      subjectType
      subjectId
      relatedType
      relatedId
      relationshipType
      status
      related {
        id
        type
        slug
        firstName
        lastName
      }
    }
  }
}
