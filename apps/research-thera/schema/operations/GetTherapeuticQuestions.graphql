query GetTherapeuticQuestions($goalId: Int, $issueId: Int, $journalEntryId: Int) {
  therapeuticQuestions(goalId: $goalId, issueId: $issueId, journalEntryId: $journalEntryId) {
    id
    goalId
    issueId
    journalEntryId
    question
    researchId
    researchTitle
    rationale
    generatedAt
    createdAt
    updatedAt
  }
}
