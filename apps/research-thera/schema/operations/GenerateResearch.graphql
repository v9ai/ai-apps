mutation GenerateResearch($goalId: Int, $issueId: Int, $feedbackId: Int, $journalEntryId: Int, $medicationId: ID) {
  generateResearch(goalId: $goalId, issueId: $issueId, feedbackId: $feedbackId, journalEntryId: $journalEntryId, medicationId: $medicationId) {
    success
    message
    jobId
    count
  }
}
