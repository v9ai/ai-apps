query GetResearch($goalId: Int, $issueId: Int, $feedbackId: Int, $journalEntryId: Int, $medicationId: ID) {
  research(goalId: $goalId, issueId: $issueId, feedbackId: $feedbackId, journalEntryId: $journalEntryId, medicationId: $medicationId) {
    id
    goalId
    feedbackId
    journalEntryId
    medicationId
    title
    authors
    year
    journal
    doi
    url
    abstract
    keyFindings
    therapeuticTechniques
    evidenceLevel
    relevanceScore
    extractedBy
    extractionConfidence
    createdAt
  }
}
