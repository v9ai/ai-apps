query GetResearch($goalId: Int, $issueId: Int, $feedbackId: Int, $journalEntryId: Int) {
  research(goalId: $goalId, issueId: $issueId, feedbackId: $feedbackId, journalEntryId: $journalEntryId) {
    id
    goalId
    feedbackId
    journalEntryId
    title
    authors
    year
    journal
    doi
    url
    abstract
    keyFindings
    therapeuticTechniques
    evidenceLevel
    relevanceScore
    extractedBy
    extractionConfidence
    createdAt
  }
}
