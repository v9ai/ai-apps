query GetResearch($goalId: Int, $feedbackId: Int) {
  research(goalId: $goalId, feedbackId: $feedbackId) {
    id
    goalId
    feedbackId
    title
    authors
    year
    journal
    doi
    url
    abstract
    keyFindings
    therapeuticTechniques
    evidenceLevel
    relevanceScore
    extractedBy
    extractionConfidence
    createdAt
  }
}
