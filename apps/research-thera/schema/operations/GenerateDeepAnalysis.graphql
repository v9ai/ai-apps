mutation GenerateDeepAnalysis(
  $subjectType: DeepAnalysisSubjectType!
  $subjectId: Int!
  $triggerType: DeepAnalysisTriggerType
  $triggerId: Int
) {
  generateDeepAnalysis(
    subjectType: $subjectType
    subjectId: $subjectId
    triggerType: $triggerType
    triggerId: $triggerId
  ) {
    success
    message
    jobId
  }
}
