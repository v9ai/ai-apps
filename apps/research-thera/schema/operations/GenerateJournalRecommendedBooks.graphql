mutation GenerateJournalRecommendedBooks($journalEntryId: Int!) {
  generateRecommendedBooks(journalEntryId: $journalEntryId) {
    success
    message
    jobId
    books {
      id
      goalId
      journalEntryId
      title
      authors
      year
      isbn
      description
      whyRecommended
      category
      amazonUrl
      generatedAt
    }
  }
}
