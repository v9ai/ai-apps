query GetHabit($id: Int!) {
  habit(id: $id) {
    id
    title
    description
    frequency
    targetCount
    status
    goalId
    familyMemberId
    issueId
    createdAt
    updatedAt
    logs {
      id
      habitId
      loggedDate
      count
      notes
      createdAt
    }
    todayLog {
      id
      loggedDate
      count
    }
  }
}
