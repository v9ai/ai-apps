query ConditionDeepResearch($slug: String!, $memberSlug: String!, $language: String) {
  conditionDeepResearch(slug: $slug, memberSlug: $memberSlug, language: $language) {
    id
    conditionSlug
    conditionName
    language
    familyMember {
      id
      slug
      firstName
      ageYears
      dateOfBirth
    }
    proximityAssessment {
      score
      label
      confidence
      rationale
      supportingEvidence
      contradictingEvidence
      missingEvidence
      recommendedNextStep
    }
    criteriaMatch {
      framework
      presentation
      criterionAInattention {
        matchedSymptoms { symptom evidence }
        matchedCount
        thresholdMet
      }
      criterionAHyperactivityImpulsivity {
        matchedSymptoms { symptom evidence }
        matchedCount
        thresholdMet
      }
      criterionBAgeOnset { met evidence }
      criterionCSettings { met evidence }
      criterionDImpairment { met evidence }
      criterionEDifferential { ruledOut notes }
    }
    pathophysiology {
      summary
      mechanisms
    }
    ageManifestations {
      developmentalTier
      manifestations
      notes
    }
    evidenceBasedTreatments {
      name
      category
      evidenceLevel
      ageAppropriate
      notes
    }
    comorbidities {
      name
      prevalence
      notes
    }
    redFlags {
      flag
      action
    }
    sourceUrls
    freshUntil
    generatedAt
    updatedAt
  }
}
