query GetJournalEntry($id: Int!) {
  journalEntry(id: $id) {
    id
    createdBy
    familyMemberId
    familyMember {
      id
      firstName
      name
    }
    title
    content
    mood
    moodScore
    tags
    goalId
    goal {
      id
      title
      description
    }
    issue {
      id
      title
      category
      severity
      familyMember {
        id
        firstName
        name
        slug
      }
    }
    isPrivate
    entryDate
    createdAt
    updatedAt
    analysis {
      id
      journalEntryId
      summary
      emotionalLandscape {
        primaryEmotions
        underlyingEmotions
        emotionalRegulation
        attachmentPatterns
      }
      therapeuticInsights {
        title
        observation
        clinicalRelevance
        relatedResearchIds
      }
      actionableRecommendations {
        title
        description
        priority
        concreteSteps
        relatedResearchIds
      }
      reflectionPrompts
      model
      createdAt
    }
  }
}
