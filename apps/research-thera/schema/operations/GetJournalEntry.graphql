query GetJournalEntry($id: Int!) {
  journalEntry(id: $id) {
    id
    createdBy
    familyMemberId
    familyMember {
      id
      firstName
      name
    }
    title
    content
    mood
    moodScore
    tags
    goalId
    goal {
      id
      title
      description
    }
    issue {
      id
      title
      category
      severity
      familyMember {
        id
        firstName
        name
        slug
      }
    }
    isPrivate
    entryDate
    createdAt
    updatedAt
    analysis {
      id
      journalEntryId
      summary
      emotionalLandscape {
        primaryEmotions
        underlyingEmotions
        emotionalRegulation
        attachmentPatterns
      }
      therapeuticInsights {
        title
        observation
        clinicalRelevance
        relatedResearchIds
      }
      actionableRecommendations {
        title
        description
        priority
        concreteSteps
        relatedResearchIds
      }
      reflectionPrompts
      model
      createdAt
    }
    discussionGuide {
      id
      journalEntryId
      childAge
      behaviorSummary
      developmentalContext {
        stage
        explanation
        normalizedBehavior
        researchBasis
      }
      conversationStarters {
        opener
        context
        ageAppropriateNote
      }
      talkingPoints {
        point
        explanation
        researchBacking
        relatedResearchIds
      }
      languageGuide {
        whatToSay {
          phrase
          reason
          alternative
        }
        whatNotToSay {
          phrase
          reason
          alternative
        }
      }
      anticipatedReactions {
        reaction
        likelihood
        howToRespond
      }
      followUpPlan {
        action
        timing
        description
      }
      model
      createdAt
    }
  }
}
