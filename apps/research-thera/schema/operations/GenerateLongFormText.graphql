mutation GenerateLongFormText($goalId: Int, $issueId: Int, $feedbackId: Int, $language: String, $minutes: Int) {
  generateLongFormText(
    goalId: $goalId
    issueId: $issueId
    feedbackId: $feedbackId
    language: $language
    minutes: $minutes
  ) {
    success
    message
    jobId
    storyId
    text
    audioUrl
    manifestUrl
    segmentUrls
  }
}
