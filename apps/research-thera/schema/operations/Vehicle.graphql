query Vehicle($id: ID!) {
  vehicle(id: $id) {
    id
    make
    model
    year
    vin
    licensePlate
    nickname
    odometerMiles
    color
    notes
    createdAt
    updatedAt
    photos {
      id
      r2Key
      caption
      url
      createdAt
    }
    serviceRecords {
      id
      type
      serviceDate
      odometerMiles
      costCents
      vendor
      notes
    }
  }
}
