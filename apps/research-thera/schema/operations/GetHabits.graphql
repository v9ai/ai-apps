query GetHabits($status: String, $familyMemberId: Int) {
  habits(status: $status, familyMemberId: $familyMemberId) {
    id
    title
    description
    frequency
    targetCount
    status
    goalId
    familyMemberId
    createdAt
    updatedAt
    todayLog {
      id
      loggedDate
      count
    }
  }
}
