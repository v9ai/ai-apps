mutation UpdateGoal($id: Int!, $input: UpdateGoalInput!) {
  updateGoal(id: $id, input: $input) {
    id
    slug
    title
    description
    status
    tags
    familyMemberId
    familyMember {
      id
      firstName
      name
      relationship
    }
    storyLanguage
    createdAt
    updatedAt
  }
}
