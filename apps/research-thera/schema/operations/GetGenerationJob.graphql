query GetGenerationJob($id: String!) {
  generationJob(id: $id) {
    id
    type
    goalId
    storyId
    status
    progress
    createdAt
    result {
      audioUrl
      progress
      stage
      count
      message
      diagnostics {
        searchCount
        enrichedCount
        extractedCount
        qualifiedCount
        persistedCount
        searchUsedFallback
        enrichedDropped
      }
    }
    error {
      message
    }
    updatedAt
  }
}
