query GetGenerationJob($id: String!) {
  generationJob(id: $id) {
    id
    status
    progress
    result {
      audioUrl
      count
      diagnostics {
        searchCount
        enrichedCount
        extractedCount
        qualifiedCount
        persistedCount
        searchUsedFallback
        enrichedDropped
      }
    }
    error {
      message
    }
    updatedAt
  }
}
