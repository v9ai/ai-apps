query GetFamilyMember($id: Int, $slug: String) {
  familyMember(id: $id, slug: $slug) {
    id
    userId
    slug
    firstName
    name
    ageYears
    relationship
    email
    phone
    location
    occupation
    dateOfBirth
    bio
    allergies
    createdAt
    updatedAt
    shares {
      familyMemberId
      email
      role
      createdAt
      createdBy
    }
    goals {
      id
      title
      status
      description
      createdAt
    }
    behaviorObservations {
      id
      familyMemberId
      goalId
      createdBy
      observedAt
      observationType
      frequency
      intensity
      context
      notes
      createdAt
      updatedAt
    }
    teacherFeedbacks {
      id
      familyMemberId
      createdBy
      teacherName
      subject
      feedbackDate
      content
      tags
      source
      extracted
      createdAt
      updatedAt
    }
    issues {
      id
      feedbackId
      familyMemberId
      createdBy
      title
      description
      category
      severity
      recommendations
      createdAt
      updatedAt
    }
    relationships {
      id
      createdBy
      subjectType
      subjectId
      relatedType
      relatedId
      relationshipType
      context
      startDate
      status
      createdAt
      updatedAt
      related {
        id
        type
        slug
        firstName
        lastName
      }
    }
  }
}
