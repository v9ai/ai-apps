query LatestBogdanDiscussion {
  latestBogdanDiscussion {
    id
    familyMemberId
    childAge
    behaviorSummary
    developmentalContext {
      stage
      explanation
      normalizedBehavior
      researchBasis
    }
    conversationStarters {
      opener
      context
      ageAppropriateNote
    }
    talkingPoints {
      point
      explanation
      researchBacking
      citations {
        researchId
        doi
        title
        year
        authors
        url
      }
      microScript {
        parentOpener
        childResponse
        parentFollowUp
      }
    }
    languageGuide {
      whatToSay {
        phrase
        reason
        alternative
      }
      whatNotToSay {
        phrase
        reason
        alternative
      }
    }
    anticipatedReactions {
      reaction
      likelihood
      howToRespond
    }
    followUpPlan {
      action
      timing
      description
    }
    citations {
      researchId
      doi
      title
      year
      authors
      url
    }
    critique {
      scores {
        romanianFluency
        actionability
        citationCoverage
        ageAppropriateness
        internalConsistency
        microScriptDepth
      }
      weakSections
      refined
    }
    model
    createdAt
  }
}
