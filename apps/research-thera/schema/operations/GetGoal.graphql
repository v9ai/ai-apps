query GetGoal($id: Int, $slug: String) {
  goal(id: $id, slug: $slug) {
    id
    slug
    title
    description
    status
    priority
    targetDate
    tags
    familyMemberId
    familyMember {
      id
      slug
      firstName
      name
      ageYears
      relationship
    }
    createdBy
    parentGoalId
    parentGoal {
      id
      slug
      title
      status
    }
    therapeuticText
    therapeuticTextLanguage
    therapeuticTextGeneratedAt
    parentAdvice
    parentAdviceLanguage
    parentAdviceGeneratedAt
    storyLanguage
    subGoals {
      id
      slug
      title
      description
      status
      createdAt
      updatedAt
    }
    notes {
      id
      slug
      content
      noteType
      tags
      createdAt
      updatedAt
    }
    questions {
      id
      question
      researchId
      researchTitle
      rationale
      generatedAt
    }
    research {
      id
      title
      authors
      year
      journal
      doi
      url
      abstract
      keyFindings
      therapeuticTechniques
      evidenceLevel
      relevanceScore
      extractionConfidence
    }
    stories {
      id
      goalId
      issueId
      feedbackId
      createdBy
      content
      language
      minutes
      audioKey
      audioUrl
      audioGeneratedAt
      createdAt
      updatedAt
    }
    createdAt
    updatedAt
  }
}
