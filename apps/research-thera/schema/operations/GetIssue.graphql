query GetIssue($id: Int!) {
  issue(id: $id) {
    id
    feedbackId
    journalEntryId
    journalEntry {
      id
      title
      entryDate
    }
    familyMemberId
    createdBy
    title
    description
    category
    severity
    recommendations
    createdAt
    updatedAt
    feedback {
      id
      contactId
      familyMemberId
      subject
      feedbackDate
      content
      tags
      source
      extracted
      contact {
        id
        firstName
        lastName
        slug
      }
      familyMember {
        id
        firstName
        name
        slug
      }
    }
    familyMember {
      id
      firstName
      name
      slug
    }
    relatedFamilyMemberId
    relatedFamilyMember {
      id
      firstName
      name
      slug
    }
    stories {
      id
      language
      minutes
      createdAt
    }
    contacts {
      id
      firstName
      lastName
      role
      slug
    }
    relatedIssues {
      id
      linkType
      issue {
        id
        title
        category
        severity
        familyMemberId
        familyMember {
          id
          firstName
          name
          slug
        }
        createdAt
      }
    }
  }
}
