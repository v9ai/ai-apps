  # Healthcare — Conditions
  addCondition(input: AddConditionInput!): Condition!
  deleteCondition(id: ID!): DeleteConditionResult!

  # Healthcare — Medications
  addMedication(input: AddMedicationInput!): Medication!
  deleteMedication(id: ID!): DeleteMedicationResult!

  # Healthcare — Symptoms
  addSymptom(input: AddSymptomInput!): Symptom!
  deleteSymptom(id: ID!): DeleteSymptomResult!

  # Healthcare — Doctors
  addDoctor(input: AddDoctorInput!): Doctor!
  deleteDoctor(id: ID!): DeleteDoctorResult!

  # Healthcare — Appointments
  addAppointment(input: AddAppointmentInput!): Appointment!
  deleteAppointment(id: ID!): DeleteAppointmentResult!
}

