# ============================================
# Habits
# ============================================

type Habit {
  id: Int!
  userId: String!
  goalId: Int
  familyMemberId: Int
  issueId: Int
  title: String!
  description: String
  frequency: HabitFrequency!
  targetCount: Int!
  status: HabitStatus!
  createdAt: String!
  updatedAt: String!
  logs: [HabitLog!]!
  todayLog: HabitLog
}

type HabitLog {
  id: Int!
  habitId: Int!
  userId: String!
  loggedDate: String!
  count: Int!
  notes: String
  createdAt: String!
}

enum HabitFrequency {
  DAILY
  WEEKLY
}

enum HabitStatus {
  ACTIVE
  PAUSED
  ARCHIVED
}

input CreateHabitInput {
  goalId: Int
  familyMemberId: Int
  issueId: Int
  title: String!
  description: String
  frequency: HabitFrequency
  targetCount: Int
}

input UpdateHabitInput {
  goalId: Int
  title: String
  description: String
  frequency: HabitFrequency
  targetCount: Int
  status: HabitStatus
}

type DeleteHabitResult {
  success: Boolean!
  message: String
}

type GenerateHabitsResult {
  success: Boolean!
  message: String
  count: Int
  habits: [Habit!]
}

type Query {
  goals(familyMemberId: Int, status: String, tag: String): [Goal!]!
  goal(id: Int, slug: String): Goal
  allTags: [String!]!
  research(goalId: Int, issueId: Int, feedbackId: Int, journalEntryId: Int): [Research!]!
  therapeuticQuestions(goalId: Int, issueId: Int, journalEntryId: Int): [TherapeuticQuestion!]!
  notes(entityId: Int!, entityType: String!): [Note!]!
  allNotes: [Note!]!
  note(id: Int, slug: String): Note
  mySharedNotes: [Note!]!

  allStories: [Story!]!
  stories(goalId: Int!): [Story!]!
  story(id: Int!): Story
  generationJob(id: String!): GenerationJob
  generationJobs(goalId: Int, status: String): [GenerationJob!]!

  # Family Members
  familyMembers: [FamilyMember!]!
  familyMember(id: Int, slug: String): FamilyMember
  mySharedFamilyMembers: [FamilyMember!]!

  # Journal Entries
  journalEntries(familyMemberId: Int, goalId: Int, mood: String, tag: String, fromDate: String, toDate: String): [JournalEntry!]!
  journalEntry(id: Int!): JournalEntry

  # Behavior Observations
  behaviorObservations(familyMemberId: Int!, goalId: Int): [BehaviorObservation!]!
  behaviorObservation(id: Int!): BehaviorObservation

  # Teacher Feedbacks
  teacherFeedbacks(familyMemberId: Int!): [TeacherFeedback!]!
  teacherFeedback(id: Int!): TeacherFeedback

  # Contact Feedbacks
  contactFeedbacks(contactId: Int!, familyMemberId: Int!): [ContactFeedback!]!
  contactFeedback(id: Int!): ContactFeedback

  # Issues
  allIssues: [Issue!]!
  issues(familyMemberId: Int!, feedbackId: Int): [Issue!]!
  issue(id: Int!): Issue

  # Conversations
  conversation(id: Int!): Conversation
  conversationsForIssue(issueId: Int!): [Conversation!]!

  # Contacts
  contacts: [Contact!]!
  contact(id: Int, slug: String): Contact

  # Relationships
  relationships(subjectType: PersonType!, subjectId: Int!): [Relationship!]!
  relationship(id: Int!): Relationship

  # Deep Issue Analysis
  deepIssueAnalysis(id: Int!): DeepIssueAnalysis
  deepIssueAnalyses(familyMemberId: Int!): [DeepIssueAnalysis!]!

  # Claim Cards
  claimCard(id: ID!): ClaimCard
  claimCardsForNote(noteId: Int!): [ClaimCard!]!

  # R2 Audio
  audioFromR2(key: String!): AudioFromR2Result

  # User Settings
  userSettings: UserSettings!

  # Habits
  habits(status: String, familyMemberId: Int): [Habit!]!
  habit(id: Int!): Habit
}

type Mutation {
  # Goals
  createGoal(input: CreateGoalInput!): Goal!
  updateGoal(id: Int!, input: UpdateGoalInput!): Goal!
  unlinkGoalFamilyMember(id: Int!): Goal!
  deleteGoal(id: Int!): DeleteGoalResult!

  createSubGoal(goalId: Int!, input: CreateSubGoalInput!): Goal!

  # Async generation workflows
  generateResearch(goalId: Int, issueId: Int, feedbackId: Int, journalEntryId: Int): GenerateResearchResult!
  deleteResearch(goalId: Int!): DeleteResearchResult!
  generateTherapeuticQuestions(goalId: Int, issueId: Int, journalEntryId: Int): GenerateQuestionsResult!
  deleteTherapeuticQuestions(goalId: Int, issueId: Int, journalEntryId: Int): DeleteQuestionsResult!
  generateLongFormText(
    goalId: Int
    issueId: Int
    feedbackId: Int
    familyMemberId: Int
    userContext: String
    language: String
    minutes: Int
  ): GenerateLongFormTextResult!
  generateParentAdvice(goalId: Int!, language: String): GenerateParentAdviceResult!
  generateAudio(
    goalId: Int!
    storyId: Int
    text: String
    language: String
    voice: String
  ): GenerateAudioResult!

  # Notes
  createNote(input: CreateNoteInput!): Note!
  updateNote(id: Int!, input: UpdateNoteInput!): Note!
  deleteNote(id: Int!): DeleteNoteResult!
  setNoteVisibility(noteId: Int!, visibility: NoteVisibility!): Note!
  shareNote(noteId: Int!, email: String!, role: NoteShareRole): NoteShare!
  unshareNote(noteId: Int!, email: String!): Boolean!

  # Stories
  createStory(input: CreateStoryInput!): Story!
  updateStory(id: Int!, input: UpdateStoryInput!): Story!
  deleteStory(id: Int!): DeleteStoryResult!

  # Claim Cards
  buildClaimCards(input: BuildClaimCardsInput!): BuildClaimCardsResult!
  checkNoteClaims(input: CheckNoteClaimsInput!): CheckNoteClaimsResult!
  refreshClaimCard(id: ID!): ClaimCard!
  deleteClaimCard(id: ID!): Boolean!

  # OpenAI TTS
  generateOpenAIAudio(
    input: GenerateOpenAIAudioInput!
  ): GenerateOpenAIAudioResult!

  # Family Members
  createFamilyMember(input: CreateFamilyMemberInput!): FamilyMember!
  updateFamilyMember(id: Int!, input: UpdateFamilyMemberInput!): FamilyMember!
  deleteFamilyMember(id: Int!): DeleteFamilyMemberResult!
  shareFamilyMember(familyMemberId: Int!, email: String!, role: FamilyMemberShareRole): FamilyMemberShare!
  unshareFamilyMember(familyMemberId: Int!, email: String!): Boolean!

  # Journal Entries
  createJournalEntry(input: CreateJournalEntryInput!): JournalEntry!
  updateJournalEntry(id: Int!, input: UpdateJournalEntryInput!): JournalEntry!
  deleteJournalEntry(id: Int!): DeleteJournalEntryResult!

  # Behavior Observations
  updateBehaviorObservation(id: Int!, input: UpdateBehaviorObservationInput!): BehaviorObservation!
  deleteBehaviorObservation(id: Int!): DeleteBehaviorObservationResult!

  # Teacher Feedbacks
  createTeacherFeedback(input: CreateTeacherFeedbackInput!): TeacherFeedback!
  updateTeacherFeedback(id: Int!, input: UpdateTeacherFeedbackInput!): TeacherFeedback!
  deleteTeacherFeedback(id: Int!): DeleteTeacherFeedbackResult!
  markTeacherFeedbackExtracted(id: Int!): TeacherFeedback!

  # Contact Feedbacks
  createContactFeedback(input: CreateContactFeedbackInput!): ContactFeedback!
  updateContactFeedback(id: Int!, input: UpdateContactFeedbackInput!): ContactFeedback!
  deleteContactFeedback(id: Int!): DeleteContactFeedbackResult!
  extractContactFeedbackIssues(id: Int!): ContactFeedback!

  # Issues
  createIssue(input: CreateIssueInput!): Issue!
  updateIssue(id: Int!, input: UpdateIssueInput!): Issue!
  deleteIssue(id: Int!): DeleteIssueResult!
  convertIssueToGoal(id: Int!, input: CreateGoalInput!): Goal!
  createRelatedIssue(issueId: Int!, input: CreateIssueInput!, linkType: String): IssueLink!
  linkIssues(issueId: Int!, linkedIssueId: Int!, linkType: String): IssueLink!
  unlinkIssues(issueId: Int!, linkedIssueId: Int!): UnlinkIssuesResult!
  linkContactToIssue(issueId: Int!, contactId: Int!): IssueContactLink!
  unlinkContactFromIssue(issueId: Int!, contactId: Int!): UnlinkContactResult!
  deleteIssueScreenshot(id: Int!): DeleteIssueScreenshotResult!

  # Deep Issue Analysis
  generateDeepIssueAnalysis(familyMemberId: Int!, triggerIssueId: Int): GenerateDeepAnalysisResult!
  deleteDeepIssueAnalysis(id: Int!): DeleteDeepAnalysisResult!

  # Conversations
  createConversation(issueId: Int!, message: String!): Conversation!
  sendConversationMessage(conversationId: Int!, message: String!): Conversation!
  deleteConversation(id: Int!): DeleteConversationResult!

  # Journal → Issue conversion
  convertJournalEntryToIssue(id: Int!, input: ConvertJournalEntryToIssueInput!): Issue!

  # Contacts
  createContact(input: CreateContactInput!): Contact!
  updateContact(id: Int!, input: UpdateContactInput!): Contact!
  deleteContact(id: Int!): DeleteContactResult!

  # Relationships
  createRelationship(input: CreateRelationshipInput!): Relationship!
  updateRelationship(id: Int!, input: UpdateRelationshipInput!): Relationship!
  deleteRelationship(id: Int!): DeleteRelationshipResult!

  # User Settings
  updateUserSettings(storyLanguage: String!, storyMinutes: Int): UserSettings!

  # Habits
  createHabit(input: CreateHabitInput!): Habit!
  updateHabit(id: Int!, input: UpdateHabitInput!): Habit!
  deleteHabit(id: Int!): DeleteHabitResult!
  logHabit(habitId: Int!, loggedDate: String!, count: Int, notes: String): HabitLog!
  deleteHabitLog(id: Int!): Boolean!
  generateHabitsForFamilyMember(familyMemberId: Int!, count: Int): GenerateHabitsResult!
  generateHabitsFromIssue(issueId: Int!, count: Int): GenerateHabitsResult!
}

type Subscription {
  researchJobStatus(jobId: String!): GenerationJob!
  audioJobStatus(jobId: String!): GenerationJob!
}

