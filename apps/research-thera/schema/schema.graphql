  # Tag language rules
  setTagLanguage(tag: String!, language: String!): Boolean!

  # Games
  createGame(input: CreateGameInput!): Game!
  updateGame(id: Int!, input: UpdateGameInput!): Game!
  deleteGame(id: Int!): DeleteGameResult!
  logGameCompletion(input: LogGameCompletionInput!): GameCompletion!
