  TTS_1_HD
  GPT_4O_MINI_TTS
}

enum OpenAIAudioFormat {
  MP3
  OPUS
  AAC
  FLAC
  WAV
  PCM
}

enum OpenAIStreamFormat {
  SSE
  AUDIO
