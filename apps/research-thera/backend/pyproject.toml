[project]
name = "research-thera-agent"
version = "0.1.0"
description = "Therapeutic research and story generation agent (LangGraph port of Rust research crate)"
requires-python = ">=3.12"
dependencies = [
    "research-client[ml]",
    "langchain>=0.3",
    "langchain-openai>=0.2",
    "langgraph>=0.2",
    "openai>=1.0.0",
    "psycopg[binary]>=3.2",
    "python-dotenv>=1.0.0",
    "boto3>=1.35",
]

[project.scripts]
research-agent = "research_agent.cli:main"

[build-system]
requires = ["setuptools>=73.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["research_agent*"]

[dependency-groups]
dev = ["langgraph-cli[inmem]>=0.4.14", "pytest>=8.0", "pytest-asyncio>=0.23"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
