[project]
name = "research-thera-agent"
version = "0.1.0"
description = "Therapeutic research and story generation agent (LangGraph port of Rust research crate) + healthcare LlamaIndex pipeline"
requires-python = ">=3.12"
dependencies = [
    # Research-thera (LangGraph)
    "research-client[ml]",
    "langchain>=0.3",
    "langchain-openai>=0.2",
    "langgraph>=0.2",
    "openai>=1.0.0",
    "psycopg[binary]>=3.2",
    "python-dotenv>=1.0.0",
    "boto3>=1.35",
    # Healthcare (LlamaIndex / FastEmbed RAG, merged 2026-04-27)
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.29.0",
    "llama-index>=0.12.0",
    "llama-index-llms-openai-like>=0.3.0",
    "llama-index-readers-file>=0.4.0",
    "llama-index-embeddings-fastembed>=0.3.0",
    "llama-parse>=0.5.0",
    "fastembed>=0.4.0",
    "psycopg-pool>=3.2.0",
    "pgvector>=0.3.0",
    "pydantic-settings>=2.0.0",
    "python-multipart>=0.0.9",
    "httpx>=0.27.0",
    "rich>=13.0.0",
]

[project.scripts]
research-agent = "research_agent.cli:main"

[build-system]
requires = ["setuptools>=73.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["research_agent*", "healthcare*"]

[dependency-groups]
dev = [
    "langgraph-cli[inmem]>=0.4.14",
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "deepeval>=2.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
