[project]
name = "research-thera-evals"
version = "0.1.0"
description = "DeepEval quality evaluations for therapeutic audio scripts"
requires-python = ">=3.12"
dependencies = [
    "deepeval>=2.5.0",
    "openai>=1.0.0",
    "python-dotenv>=1.0.0",
]

[tool.pytest.ini_options]
env = [
    "DEEPEVAL_TELEMETRY_OPT_OUT=YES",
]
