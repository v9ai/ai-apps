[project]
name = "redteam-evals"
version = "0.1.0"
description = "Local adversarial safety evaluations for therapeutic audio script generation"
requires-python = ">=3.12"
dependencies = [
    "deepeval>=2.5.0",
    "deepteam>=0.1.0",
    "openai>=1.0.0",
    "pandas>=2.0.0",
    "python-dotenv>=1.0.0",
]

[tool.pytest.ini_options]
env = [
    "DEEPEVAL_TELEMETRY_OPT_OUT=YES",
]
