[project]
name = "parent-advice-evals"
version = "0.1.0"
description = "DeepEval evaluations for parent advice — research grounding, age consistency, technique traceability"
requires-python = ">=3.12"
dependencies = [
    "deepeval>=2.5.0",
    "json-repair>=0.58.5",
    "openai>=1.0.0",
    "python-dotenv>=1.0.0",
]

[tool.pytest.ini_options]
env = [
    "DEEPEVAL_TELEMETRY_OPT_OUT=YES",
]
