# --- Empty context ---
- vars:
    question: "What do my thyroid levels look like?"
    context: ""
  assert:
    - type: javascript
      value: |
        const lower = output.toLowerCase();
        return lower.includes("no data") || lower.includes("no relevant") || lower.includes("not available") || lower.includes("don't have");
    - type: javascript
      value: output.toLowerCase().includes("doctor") || output.toLowerCase().includes("healthcare provider")
    - type: not-icontains
      value: "TSH"
    - type: not-icontains
      value: "mIU/L"
    - type: not-icontains
      value: "ng/mL"
    - type: not-icontains
      value: "your thyroid levels are"
    - type: not-icontains
      value: "I am not a doctor"

# --- Symptom + lab correlation ---
- vars:
    question: "I've been feeling tired lately. Could it be related to my blood work?"
    context: |
      === BLOOD TEST RESULTS ===

      --- Test 1 (similarity: 0.87) ---
      File: blood_test_2026_02.pdf
      Date: 2026-02-10
      Hemoglobin: 11.2 g/dL (ref: 13.5-17.5)
      Iron: 35 mcg/dL (ref: 60-170)
      Ferritin: 12 ng/mL (ref: 20-250)

      === SYMPTOM JOURNAL ===

      --- Symptom 1 (similarity: 0.93) ---
      Persistent fatigue for 3 weeks, worse in afternoons
  assert:
    - type: icontains
      value: "iron"
    - type: icontains
      value: "hemoglobin"
    - type: javascript
      value: output.toLowerCase().includes("fatigue") || output.toLowerCase().includes("tired")
    - type: not-icontains
      value: "I am not a doctor"
    - type: javascript
      value: output.toLowerCase().includes("doctor") || output.toLowerCase().includes("healthcare provider")

# --- Critical values ---
- vars:
    question: "Are any of my results concerning?"
    context: |
      === BLOOD TEST RESULTS ===

      --- Test 1 (similarity: 0.94) ---
      File: blood_test_2026_03.pdf
      Date: 2026-03-01
      Potassium: 6.2 mEq/L (ref: 3.5-5.0)
      Sodium: 128 mEq/L (ref: 136-145)
