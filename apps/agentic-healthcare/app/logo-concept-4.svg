<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Shield body gradient: deep navy-indigo, lighter toward center -->
    <radialGradient id="shieldFill" cx="50%" cy="42%" r="58%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#2d2a6e"/>
      <stop offset="100%" stop-color="#0f0d2a"/>
    </radialGradient>

    <!-- Shield edge glow -->
    <linearGradient id="shieldStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#818cf8" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#4338ca" stop-opacity="0.4"/>
    </linearGradient>

    <!-- Waveform line gradient (indigo core → transparent tips) -->
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0.0"/>
      <stop offset="18%"  stop-color="#6366f1" stop-opacity="0.5"/>
      <stop offset="50%"  stop-color="#a5b4fc" stop-opacity="1.0"/>
      <stop offset="82%"  stop-color="#6366f1" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.0"/>
    </linearGradient>

    <!-- Shimmer sweep gradient -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="white" stop-opacity="0"/>
      <stop offset="40%"  stop-color="white" stop-opacity="0"/>
      <stop offset="50%"  stop-color="white" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow filter for the waveform -->
    <filter id="waveGlow" x="-30%" y="-80%" width="160%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft outer drop shadow for the shield -->
    <filter id="shieldShadow" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#6366f1" flood-opacity="0.35"/>
    </filter>

    <!-- Clip path: match the shield polygon exactly -->
    <clipPath id="shieldClip">
      <path d="M16 2.5 L27.5 7.5 L27.5 17.5 Q27.5 25.5 16 30 Q4.5 25.5 4.5 17.5 L4.5 7.5 Z"/>
    </clipPath>
  </defs>

  <!-- ── Shield body ── -->
  <path
    d="M16 2.5 L27.5 7.5 L27.5 17.5 Q27.5 25.5 16 30 Q4.5 25.5 4.5 17.5 L4.5 7.5 Z"
    fill="url(#shieldFill)"
    filter="url(#shieldShadow)"
  />

  <!-- Shield border -->
  <path
    d="M16 2.5 L27.5 7.5 L27.5 17.5 Q27.5 25.5 16 30 Q4.5 25.5 4.5 17.5 L4.5 7.5 Z"
    fill="none"
    stroke="url(#shieldStroke)"
    stroke-width="0.85"
    stroke-linejoin="round"
  />

  <!-- ── Waveform (ECG / heart-rate style) ── -->
  <!-- All drawing clipped to shield interior -->
  <g clip-path="url(#shieldClip)" filter="url(#waveGlow)">
    <!-- Main waveform path: flat → rise → ECG spike → flat continuation -->
    <path
      d="M5.5 16.5
         L8.5 16.5
         L9.5 19.5
         L10.5 13.5
         L11.5 20.5
         L12.5 16.5
         L14 16.5
         L14.5 14.5
         L15 11
         L15.5 23
         L16 14
         L16.5 16.5
         L18 16.5
         L18.5 19
         L19.5 14
         L20.5 16.5
         L26.5 16.5"
      stroke="url(#waveGrad)"
      stroke-width="1.35"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />

    <!-- Subtle secondary / echo line (lower opacity, slightly offset) -->
    <path
      d="M5.5 17
         L8.5 17
         L9.5 20
         L10.5 14
         L11.5 21
         L12.5 17
         L14 17
         L14.5 15
         L15 11.5
         L15.5 23.5
         L16 14.5
         L16.5 17
         L18 17
         L18.5 19.5
         L19.5 14.5
         L20.5 17
         L26.5 17"
      stroke="#6366f1"
      stroke-width="0.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-opacity="0.25"
      fill="none"
    />

    <!-- Shimmer sweep rect — animates left to right, 3s loop -->
    <rect
      x="-32" y="8" width="32" height="18"
      fill="url(#shimmer)"
      opacity="0.9"
    >
      <animateTransform
        attributeName="transform"
        type="translate"
        from="0 0"
        to="64 0"
        dur="3s"
        repeatCount="indefinite"
        calcMode="linear"
      />
    </rect>
  </g>

  <!-- ── Subtle inner highlight arc at top of shield ── -->
  <path
    d="M11 8 Q16 6 21 8"
    stroke="white"
    stroke-width="0.6"
    stroke-linecap="round"
    fill="none"
    stroke-opacity="0.12"
  />
</svg>
