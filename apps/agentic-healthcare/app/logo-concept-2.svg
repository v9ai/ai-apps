<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="Agentic Healthcare logo">
  <defs>
    <!-- Core radial glow behind the cell -->
    <radialGradient id="cellGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>

    <!-- Cell body gradient: indigo deep to violet -->
    <radialGradient id="cellFill" cx="38%" cy="36%" r="62%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="55%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </radialGradient>

    <!-- Rim glow stroke gradient -->
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- Node fill: bright center -->
    <radialGradient id="nodeFill" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </radialGradient>

    <!-- Pulsing node fill -->
    <radialGradient id="pingFill" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </radialGradient>

    <!-- Inner bar chart glow -->
    <linearGradient id="barGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#c7d2fe" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Soft drop shadow for the whole mark -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Ping node outer ring filter -->
    <filter id="pingGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.4"/>
    </filter>

    <!-- Connector edge subtle filter -->
    <filter id="edgeBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.3"/>
    </filter>
  </defs>

  <!-- ── Background ambient glow ── -->
  <circle cx="16" cy="16" r="14" fill="url(#cellGlow)"/>

  <!--
    Six nodes placed on a regular hexagon (r=10.5) centered at 16,16.
    Angles: 90°, 30°, 330°, 270°, 210°, 150° → top, upper-right, lower-right,
    bottom, lower-left, upper-left.

    Node coordinates (cx + r·cos θ, cy − r·sin θ), r=10.5:
      N0 top          16,    5.5
      N1 upper-right  25.09, 10.75
      N2 lower-right  25.09, 21.25
      N3 bottom       16,    26.5
      N4 lower-left    6.91, 21.25
      N5 upper-left    6.91, 10.75
  -->

  <!-- ── Connector edges (drawn first, behind nodes) ── -->
  <!-- Full hexagon rim -->
  <g stroke="#6366f1" stroke-opacity="0.45" stroke-width="0.9" filter="url(#edgeBlur)">
    <line x1="16"    y1="5.5"  x2="25.09" y2="10.75"/>
    <line x1="25.09" y1="10.75" x2="25.09" y2="21.25"/>
    <line x1="25.09" y1="21.25" x2="16"    y2="26.5"/>
    <line x1="16"    y1="26.5"  x2="6.91"  y2="21.25"/>
    <line x1="6.91"  y1="21.25" x2="6.91"  y2="10.75"/>
    <line x1="6.91"  y1="10.75" x2="16"    y2="5.5"/>
  </g>

  <!-- Diagonal spokes: alternate nodes to center (structural web) -->
  <g stroke="#8b5cf6" stroke-opacity="0.35" stroke-width="0.75" filter="url(#edgeBlur)">
    <!-- N0 → N3 (top–bottom vertical) -->
    <line x1="16"    y1="5.5"   x2="16"    y2="26.5"/>
    <!-- N1 → N4 (upper-right → lower-left) -->
    <line x1="25.09" y1="10.75" x2="6.91"  y2="21.25"/>
    <!-- N2 → N5 (lower-right → upper-left) -->
    <line x1="25.09" y1="21.25" x2="6.91"  y2="10.75"/>
  </g>

  <!-- ── Central cell body (filled hexagon) ── -->
  <!--
    Inner hex, r=6.8, same angles.
    cx=16 cy=16, r=6.8:
      top         16, 9.2
      upper-right 21.89, 12.6
      lower-right 21.89, 19.4
      bottom      16, 22.8
      lower-left  10.11, 19.4
      upper-left  10.11, 12.6
  -->
  <polygon
    points="16,9.2 21.89,12.6 21.89,19.4 16,22.8 10.11,19.4 10.11,12.6"
    fill="url(#cellFill)"
    stroke="url(#rimGrad)"
    stroke-width="0.7"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- ── Inner bar chart (health data visualization) ── -->
  <!--
    Three bars centered at x=16, y-base=20.4, spaced 2.1px apart.
    Heights: 4.4, 6.6, 3.3 — to give an organic chart feel.
    Bar width: 1.3px. rounded caps via rx.
  -->
  <!-- bar left -->
  <rect x="12.35" y="16.0" width="1.3" height="4.4" rx="0.55" fill="url(#barGrad)" fill-opacity="0.88"/>
  <!-- bar center (tallest) -->
  <rect x="14.95" y="13.8" width="1.3" height="6.6" rx="0.55" fill="#e0e7ff" fill-opacity="0.95"/>
  <!-- bar right -->
  <rect x="17.55" y="17.1" width="1.3" height="3.3" rx="0.55" fill="url(#barGrad)" fill-opacity="0.75"/>

  <!-- ── Six peripheral nodes ── -->
  <!-- N0 top — this is the PING node, animated -->
  <!-- Ping aura (blurred, animated opacity+scale) -->
  <circle cx="16" cy="5.5" r="3.2" fill="#818cf8" fill-opacity="0" filter="url(#pingGlow)">
    <animate attributeName="r"          values="3.2;5.4;3.2"        dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    <animate attributeName="fill-opacity" values="0;0.55;0"          dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
  </circle>
  <!-- N0 outer ring (animated scale via r) -->
  <circle cx="16" cy="5.5" r="2.0" fill="none" stroke="#a5b4fc" stroke-width="0.55" stroke-opacity="0">
    <animate attributeName="r"            values="2.0;3.6;2.0"      dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    <animate attributeName="stroke-opacity" values="0.9;0;0.9"      dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
  </circle>
  <!-- N0 solid core -->
  <circle cx="16" cy="5.5" r="1.9" fill="url(#pingFill)" stroke="#c7d2fe" stroke-width="0.4"/>

  <!-- N1 upper-right -->
  <circle cx="25.09" cy="10.75" r="1.6" fill="url(#nodeFill)" stroke="#818cf8" stroke-width="0.35"/>
  <!-- N2 lower-right -->
  <circle cx="25.09" cy="21.25" r="1.6" fill="url(#nodeFill)" stroke="#818cf8" stroke-width="0.35"/>
  <!-- N3 bottom -->
  <circle cx="16" cy="26.5" r="1.6" fill="url(#nodeFill)" stroke="#818cf8" stroke-width="0.35"/>
  <!-- N4 lower-left -->
  <circle cx="6.91" cy="21.25" r="1.6" fill="url(#nodeFill)" stroke="#818cf8" stroke-width="0.35"/>
  <!-- N5 upper-left -->
  <circle cx="6.91" cy="10.75" r="1.6" fill="url(#nodeFill)" stroke="#818cf8" stroke-width="0.35"/>

  <!-- ── Center node (AI core) ── -->
  <circle cx="16" cy="16" r="1.35" fill="#e0e7ff" stroke="#c7d2fe" stroke-width="0.3" fill-opacity="0.9"/>
</svg>
