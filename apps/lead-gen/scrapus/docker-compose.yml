# Scrapus local deployment — M1 16GB, zero cloud dependency
# Usage:
#   docker compose up -d          # start ollama
#   docker compose up scrapus     # run pipeline (after ollama healthy)

services:
  ollama:
    image: ollama/ollama:latest
    container_name: scrapus-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=1
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8g

  scrapus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scrapus-pipeline
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - SCRAPUS_REPORT_LLM_BACKEND=ollama
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./scrapus_data:/app/scrapus_data
      - ./output:/app/output
    profiles:
      - pipeline

volumes:
  ollama-models:
