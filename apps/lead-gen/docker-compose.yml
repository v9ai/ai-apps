# Scrapus local deployment — M1 16GB, zero cloud dependency
# Usage:
#   docker compose up -d                    # start ollama
#   docker compose run --rm model-pull      # pull required model (once)
#   docker compose --profile pipeline up    # run pipeline

services:
  ollama:
    image: ollama/ollama:latest
    container_name: scrapus-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=1
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8g

  model-pull:
    image: curlimages/curl:latest
    container_name: scrapus-model-pull
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c '
        echo "Pulling llama3.1:8b-instruct-q4_K_M..." &&
        curl -sf http://ollama:11434/api/pull -d "{\"name\":\"llama3.1:8b-instruct-q4_K_M\"}" &&
        echo "Model ready."
      '
    profiles:
      - setup

  scrapus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scrapus-pipeline
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./scrapus_data:/app/scrapus_data
      - ./output:/app/output
    deploy:
      resources:
        limits:
          memory: 12g
    profiles:
      - pipeline

volumes:
  ollama-models:
