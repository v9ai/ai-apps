# ── Crawl Logs (persisted BFS crawl traces from Chrome extension) ────

type CrawlLog {
  id: Int!
  seedUrl: String!
  companySlug: String!
  status: String!
  saved: Int!
  skipped: Int!
  filtered: Int!
  targets: Int!
  visited: Int!
  totalRemoteJobs: Int!
  durationMs: Int!
  entries: JSON
  error: String
  startedAt: String!
  completedAt: String
  createdAt: String!
}

input SaveCrawlLogInput {
  seedUrl: String!
  companySlug: String!
  status: String!
  saved: Int!
  skipped: Int!
  filtered: Int!
  targets: Int!
  visited: Int!
  totalRemoteJobs: Int
  durationMs: Int!
  entries: [String!]!
  error: String
  startedAt: String!
  completedAt: String
}

type SaveCrawlLogResult {
  success: Boolean!
  crawlLogId: Int
  error: String
}

extend type Query {
  crawlLogs(limit: Int, offset: Int): [CrawlLog!]!
  crawlLog(id: Int!): CrawlLog
}

extend type Mutation {
  saveCrawlLog(input: SaveCrawlLogInput!): SaveCrawlLogResult!
}
