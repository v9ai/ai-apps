extend type Query {
  linkedinPost(id: Int!): LinkedInPost
  linkedinPosts(type: LinkedInPostType, companyId: Int, limit: Int, offset: Int): [LinkedInPost!]!
  similarPosts(postId: Int!, limit: Int, minScore: Float): [SimilarPost!]!
}

extend type Mutation {
  upsertLinkedInPost(input: UpsertLinkedInPostInput!): LinkedInPost!
  upsertLinkedInPosts(inputs: [UpsertLinkedInPostInput!]!): UpsertLinkedInPostsResult!
  deleteLinkedInPost(id: Int!): Boolean!
  analyzeLinkedInPosts(postIds: [Int!], limit: Int): AnalyzePostsResult!
}

type UpsertLinkedInPostsResult {
  success: Boolean!
  inserted: Int!
  updated: Int!
  errors: [String!]!
}

type AnalyzePostsResult {
  success: Boolean!
  analyzed: Int!
  failed: Int!
  errors: [String!]!
}

type SimilarPost {
  post: LinkedInPost!
  similarity: Float!
}

type ExtractedSkill {
  tag: String!
  label: String!
  confidence: Float!
}

enum LinkedInPostType {
  post
  job
}

type LinkedInPost {
  id: Int!
  type: LinkedInPostType!
  url: String!
  companyId: Int
  contactId: Int
  title: String
  content: String
  authorName: String
  authorUrl: String
  location: String
  employmentType: String
  postedAt: String
  scrapedAt: String!
  rawData: JSON
  skills: [ExtractedSkill!]
  analyzedAt: String
  createdAt: String!
}

input UpsertLinkedInPostInput {
  url: String!
  type: LinkedInPostType!
  companyId: Int
  contactId: Int
  title: String
  content: String
  authorName: String
  authorUrl: String
  location: String
  employmentType: String
  postedAt: String
  rawData: JSON
}
