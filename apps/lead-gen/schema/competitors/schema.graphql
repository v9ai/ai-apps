enum CompetitorAnalysisStatus {
  pending_approval
  scraping
  done
  failed
}

enum CompetitorStatus {
  suggested
  approved
  scraping
  done
  failed
}

type CompetitorAnalysis {
  id: Int!
  product: Product!
  status: CompetitorAnalysisStatus!
  createdBy: String
  error: String
  competitors: [Competitor!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Competitor {
  id: Int!
  analysisId: Int!
  name: String!
  url: String!
  domain: String
  logoUrl: URL
  description: String
  positioningHeadline: String
  positioningTagline: String
  targetAudience: String
  status: CompetitorStatus!
  scrapedAt: DateTime
  scrapeError: String
  pricingTiers: [PricingTier!]!
  features: [CompetitorFeature!]!
  integrations: [CompetitorIntegration!]!
  createdAt: DateTime!
}

type PricingTier {
  id: Int!
  tierName: String!
  monthlyPriceUsd: Float
  annualPriceUsd: Float
  seatPriceUsd: Float
  currency: String!
  includedLimits: JSON
  isCustomQuote: Boolean!
  sortOrder: Int!
}

type CompetitorFeature {
  id: Int!
  tierName: String
  featureText: String!
  category: String
}

type CompetitorIntegration {
  id: Int!
  integrationName: String!
  integrationUrl: URL
  category: String
}

input CompetitorInput {
  name: String!
  url: String!
}

"""
Tier shape written by the Product team's Pricing Analyst (Claude agent).
Mirrors PricingTier but as an input. Null numeric fields mean "not disclosed";
set isCustomQuote=true for 'Contact Sales' tiers.
"""
input PricingTierInput {
  tierName: String!
  monthlyPriceUsd: Float
  annualPriceUsd: Float
  seatPriceUsd: Float
  currency: String = "USD"
  includedLimits: JSON
  isCustomQuote: Boolean = false
  sortOrder: Int = 0
}

extend type Query {
  competitorAnalysis(id: Int!): CompetitorAnalysis
  competitorAnalyses(limit: Int, offset: Int): [CompetitorAnalysis!]!
}

extend type Product {
  "Latest (by created_at) competitor_analyses row for this product, if any. Used by the /products/[slug]/competitors UI."
  latestCompetitorAnalysis: CompetitorAnalysis
}

extend type Mutation {
  createCompetitorAnalysis(productId: Int!): CompetitorAnalysis!
  approveCompetitors(analysisId: Int!, competitors: [CompetitorInput!]!): CompetitorAnalysis!
  rescrapeCompetitor(competitorId: Int!): Competitor!
  deleteCompetitorAnalysis(id: Int!): Boolean!
  """
  Replace a competitor's pricing tiers in bulk. Used by the Product team's
  Pricing Analyst (Claude agent) to write hand-extracted tiers without going
  through the deep_competitor scraper.
  """
  setCompetitorPricingTiers(competitorId: Int!, tiers: [PricingTierInput!]!): Competitor!
}
