extend type Query {
  companies(
    filter: CompanyFilterInput
    order_by: CompanyOrderBy
    limit: Int
    offset: Int
  ): CompaniesResponse!
  company(id: Int, key: String): Company
  company_facts(
    company_id: Int!
    field: String
    limit: Int
    offset: Int
  ): [CompanyFact!]!
  company_snapshots(
    company_id: Int!
    limit: Int
    offset: Int
  ): [CompanySnapshot!]!
  allCompanyTags: [String!]!
  findCompany(name: String, website: String, linkedinUrl: String): FindCompanyResult!
  existingCompanyLinkedinUrls(linkedinUrls: [String!]!): [String!]!

  # Semantic ICP matching (intervention #4). Cosine similarity via pgvector
  # HNSW against companies.profile_embedding / products.icp_embedding
  # (both 1024-dim BGE-M3). Only returns companies with a profile_embedding
  # set — run `backend/scripts/backfill_embeddings.py` first if empty.
  #
  # Distinct from the ml.schema `similarCompanies(query: String!)` (NL search)
  # and `companiesLike(companyId)` (legacy 384-dim embedding).
  similarCompaniesByProfile(companyId: Int!, limit: Int = 10): [Company!]!
  topCompaniesForProduct(productId: Int!, limit: Int = 20, minScore: Float = 0.6): [Company!]!
}

extend type Mutation {
  createCompany(input: CreateCompanyInput!): Company!
  updateCompany(id: Int!, input: UpdateCompanyInput!): Company!
  deleteCompany(id: Int!): DeleteCompanyResponse!
  add_company_facts(
    company_id: Int!
    facts: [CompanyFactInput!]!
  ): [CompanyFact!]!
  ingest_company_snapshot(
    company_id: Int!
    source_url: String!
    crawl_id: String
    capture_timestamp: String
    fetched_at: String!
    http_status: Int
    mime: String
    content_hash: String
    text_sample: String
    jsonld: JSON
    extracted: JSON
    evidence: EvidenceInput!
  ): CompanySnapshot!
  mergeDuplicateCompanies(companyIds: [Int!]!): MergeCompaniesResult!
  deleteCompanies(companyIds: [Int!]!): DeleteCompaniesResult!
  importCompanyWithContacts(input: ImportCompanyWithContactsInput!): ImportCompanyResult!
  importCompanies(companies: [CompanyImportInput!]!): ImportCompaniesResult!

  enhanceCompany(id: Int, key: String): EnhanceCompanyResponse!
  analyzeCompany(id: Int, key: String): AnalyzeCompanyResponse!
  findDecisionMaker(id: Int, key: String): FindDecisionMakerResponse!
  blockCompany(id: Int!): Company!
  unblockCompany(id: Int!): Company!
}

enum CompanyCategory {
  CONSULTANCY
  STAFFING
  AGENCY
  PRODUCT
  UNKNOWN
}

enum CompanyOrderBy {
  NAME_ASC
  SCORE_DESC
  UPDATED_AT_DESC
  CREATED_AT_DESC
}

# Evidence / Provenance
type WarcPointer {
  filename: String!
  offset: Int!
  length: Int!
  digest: String
}

type Evidence {
  source_type: SourceType!
  source_url: String!
  crawl_id: String
  capture_timestamp: String
  observed_at: String!
  method: ExtractMethod!
  extractor_version: String
  http_status: Int
  mime: String
  content_hash: String
  warc: WarcPointer
}

# Company Facts (MDM)
type CompanyFact {
  id: Int!
  company_id: Int!
  field: String!
  value_json: JSON
  value_text: String
  normalized_value: JSON
  confidence: Float!
  evidence: Evidence!
  created_at: String!
}

# Company Snapshots
type CompanySnapshot {
  id: Int!
  company_id: Int!
  source_url: String!
  crawl_id: String
  capture_timestamp: String
  fetched_at: String!
  http_status: Int
  mime: String
  content_hash: String
  text_sample: String
  jsonld: JSON
  extracted: JSON
  evidence: Evidence!
  created_at: String!
}

# Company (Golden Record)
type Company {
  id: Int!
  key: String!
  name: String!
  logo_url: String
  website: String
  description: String
  industry: String
  size: String
  location: String
  linkedin_url: String
  job_board_url: String
  email: String
  emailsList: [String!]!
  githubUrl: String
  created_at: String!
  updated_at: String!

  # Golden record fields
  category: CompanyCategory!
  tags: [String!]!
  services: [String!]!
  service_taxonomy: [String!]!
  industries: [String!]!
  score: Float!
  score_reasons: [String!]!
  last_seen_crawl_id: String
  last_seen_capture_timestamp: String
  last_seen_source_url: String

  # AI company tier: 0 = not AI, 1 = ai_first, 2 = ai_native
  ai_tier: Int!
  ai_classification_reason: String
  ai_classification_confidence: Float!

  # Pipeline blocklist
  blocked: Boolean!

  # Deep company analysis (Markdown narrative)
  deep_analysis: String

  # Related data
  facts(limit: Int, offset: Int, field: String): [CompanyFact!]!
  facts_count: Int!
  snapshots(limit: Int, offset: Int): [CompanySnapshot!]!
  snapshots_count: Int!
  contacts: [Contact!]!
  opportunities: [Opportunity!]!

  # Intent signal scoring
  intentScore: Float!
  intentScoreUpdatedAt: String
  intentSignalsCount: Int!
  intentScoreDetails(productId: Int): IntentScore
}

type CompaniesResponse {
  companies: [Company!]!
  totalCount: Int!
}

input CreateCompanyInput {
  key: String!
  name: String!
  logo_url: String
  website: String
  linkedin_url: String
  description: String
  industry: String
  size: String
  location: String
  category: CompanyCategory
  tags: [String!]
  services: [String!]
  service_taxonomy: [String!]
  industries: [String!]
  ai_tier: Int
  ai_classification_reason: String
  ai_classification_confidence: Float
  email: String
  emails: [String!]
  github_url: String
}

input UpdateCompanyInput {
  key: String
  name: String
  logo_url: String
  website: String
  description: String
  industry: String
  size: String
  location: String
  linkedin_url: String
  job_board_url: String
  category: CompanyCategory
  tags: [String!]
  services: [String!]
  service_taxonomy: [String!]
  industries: [String!]
  score: Float
  score_reasons: [String!]
  ai_tier: Int
  ai_classification_reason: String
  ai_classification_confidence: Float
  email: String
  emails: [String!]
  github_url: String
}

input WarcPointerInput {
  filename: String!
  offset: Int!
  length: Int!
  digest: String
}

input EvidenceInput {
  source_type: SourceType!
  source_url: String!
  crawl_id: String
  capture_timestamp: String
  observed_at: String!
  method: ExtractMethod!
  extractor_version: String
  http_status: Int
  mime: String
  content_hash: String
  warc: WarcPointerInput
}

input CompanyFactInput {
  field: String!
  value_json: JSON
  value_text: String
  normalized_value: JSON
  confidence: Float!
  evidence: EvidenceInput!
}

input CompanyFilterInput {
  text: String
  category: CompanyCategory
  min_score: Float
  service_taxonomy_any: [String!]
  tags_any: [String!]
  min_ai_tier: Int
}

type DeleteCompanyResponse {
  success: Boolean!
  message: String
}

type EnhanceCompanyResponse {
  success: Boolean!
  message: String
  companyId: Int
  companyKey: String
}

type AnalyzeCompanyResponse {
  success: Boolean!
  message: String
  companyId: Int
  companyKey: String
}

type DecisionMakerCandidate {
  id: Int!
  firstName: String!
  lastName: String!
  email: String
  position: String
  seniority: String
  department: String
  isDecisionMaker: Boolean!
  authorityScore: Float!
  dmReasons: [String!]!
  rankScore: Float!
}

type FindDecisionMakerResponse {
  success: Boolean!
  message: String
  companyId: Int
  companyKey: String
  topDecisionMaker: DecisionMakerCandidate
  decisionMakers: [DecisionMakerCandidate!]!
  ranked: [DecisionMakerCandidate!]!
  classifyCount: Int!
  summary: String
}

type MergeCompaniesResult {
  success: Boolean!
  message: String!
  keptCompanyId: Int
  merged: Int!
}

type DeleteCompaniesResult {
  success: Boolean!
  message: String!
  deleted: Int!
}

input ImportCompanyWithContactsInput {
  companyName: String!
  companyId: Int
  website: String
  linkedinUrl: String
  contacts: [ImportContactInput!]!
  skillFilter: [String!]
}

input ImportContactInput {
  name: String!
  linkedinUrl: String
  workEmail: String
  headline: String
}

type ImportCompanyResult {
  success: Boolean!
  company: Company
  contactsImported: Int!
  contactsSkipped: Int!
  errors: [String!]!
}

type FindCompanyResult {
  found: Boolean!
  company: Company
}

input CompanyImportInput {
  name: String!
  website: String
  email: String
  linkedin_url: String
  location: String
  size: String
  description: String
  industry: String
}

type ImportCompaniesResult {
  success: Boolean!
  imported: Int!
  failed: Int!
  errors: [String!]!
}
