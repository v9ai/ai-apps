type Opportunity {
  id: String!
  title: String!
  url: String
  source: String
  status: String!
  rewardUsd: Float
  rewardText: String
  startDate: String
  endDate: String
  deadline: String
  firstSeen: String
  lastSeen: String
  score: Int
  applied: Boolean!
  appliedAt: String
  applicationStatus: String
  applicationNotes: String
  tags: [String!]!
  companyId: Int
  contactId: Int
  companyName: String
  createdAt: String!
  updatedAt: String!
}

input CreateOpportunityInput {
  title: String!
  url: String
  source: String
  status: String
  rewardText: String
  rawContext: String
  metadata: String
  applied: Boolean
  appliedAt: String
  tags: [String!]
  companyId: Int
  contactId: Int
}

type OpportunityListItem {
  id: String!
  title: String!
  url: String
  source: String
  status: String!
  rewardText: String
  rewardUsd: Float
  score: Int
  tags: [String!]!
  applied: Boolean!
  appliedAt: String
  applicationStatus: String
  firstSeen: String
  createdAt: String!
  companyName: String
  companyKey: String
  contactFirstName: String
  contactLastName: String
  contactSlug: String
  contactPosition: String
}

type D1OpportunityItem {
  id: String!
  title: String!
  url: String
  source: String
  status: String!
  tags: String
  location: String
  salary: String
  archived: Int!
  createdAt: String!
  updatedAt: String!
  companyName: String
  companyKey: String
}

type OpportunityScoringMetrics {
  accuracy: Float!
  precision: Float!
  recall: Float!
  f1: Float!
  aucRoc: Float!
  ndcgAt10: Float!
}

type OpportunitySourceStat {
  source: String!
  total: Int!
  positive: Int!
  negative: Int!
  precision: Float!
  avgScore: Float!
}

type OpportunityEvalReport {
  scoring: OpportunityScoringMetrics!
  sourceBreakdown: [OpportunitySourceStat!]!
  goldenCount: Int!
  excludedCount: Int!
  nullScoreCount: Int!
  timestamp: String!
}

type OpportunitiesPagePayload {
  opportunities: [OpportunityListItem!]!
  d1Pending: [D1OpportunityItem!]!
  evalReport: OpportunityEvalReport
}

extend type Query {
  contactOpportunities(contactId: Int!): [Opportunity!]!
  opportunityByUrl(url: String!): Opportunity
  opportunitiesPage: OpportunitiesPagePayload!
}

extend type Mutation {
  createOpportunity(input: CreateOpportunityInput!): Opportunity!
  updateOpportunityTags(id: String!, tags: [String!]!): Opportunity!
}
