type Opportunity {
  id: String!
  title: String!
  url: String
  source: String
  status: String!
  rewardUsd: Float
  rewardText: String
  startDate: String
  endDate: String
  deadline: String
  firstSeen: String
  lastSeen: String
  score: Int
  applied: Boolean!
  appliedAt: String
  applicationStatus: String
  applicationNotes: String
  tags: [String!]!
  companyId: Int
  contactId: Int
  companyName: String
  createdAt: String!
  updatedAt: String!
}

input CreateOpportunityInput {
  title: String!
  url: String
  source: String
  status: String
  rewardText: String
  rawContext: String
  metadata: String
  applied: Boolean
  appliedAt: String
  tags: [String!]
  companyId: Int
  contactId: Int
}

extend type Query {
  contactOpportunities(contactId: Int!): [Opportunity!]!
  opportunityByUrl(url: String!): Opportunity
}

extend type Mutation {
  createOpportunity(input: CreateOpportunityInput!): Opportunity!
}
