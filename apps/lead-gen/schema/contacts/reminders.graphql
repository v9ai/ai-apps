type Reminder {
  id: Int!
  entityType: String!
  entityId: Int!
  remindAt: String!
  recurrence: String!
  note: String
  status: String!
  snoozedUntil: String
  createdAt: String!
  updatedAt: String!
}

type ReminderWithContact {
  reminder: Reminder!
  contact: Contact!
}

type ComputeNextTouchScoresResult {
  success: Boolean!
  message: String!
  contactsUpdated: Int!
  topContacts: [ContactNextTouch!]!
}

type ContactNextTouch {
  contactId: Int!
  firstName: String!
  lastName: String!
  position: String
  nextTouchScore: Float!
  lastContactedAt: String
}

input CreateReminderInput {
  entityType: String!
  entityId: Int!
  remindAt: String!
  recurrence: String
  note: String
}

input UpdateReminderInput {
  remindAt: String
  recurrence: String
  note: String
  status: String
}

extend type Query {
  reminders(entityType: String!, entityId: Int!): [Reminder!]!
  dueReminders: [ReminderWithContact!]!
}

extend type Mutation {
  createReminder(input: CreateReminderInput!): Reminder!
  updateReminder(id: Int!, input: UpdateReminderInput!): Reminder!
  snoozeReminder(id: Int!, days: Int!): Reminder!
  dismissReminder(id: Int!): Reminder!
  computeNextTouchScores(companyId: Int!): ComputeNextTouchScoresResult!
}
