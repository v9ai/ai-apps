extend type Query {
  contacts(companyId: Int, search: String, limit: Int, offset: Int): ContactsResult!
  contact(id: Int!): Contact
  contactByEmail(email: String!): Contact
  contactEmails(contactId: Int!): [ContactEmail!]!
  companyContactEmails(companyId: Int!): [CompanyContactEmail!]!
  resendEmail(resendId: String!): ResendEmailDetail
}

type ResendEmailDetail {
  id: String!
  from: String!
  to: [String!]!
  subject: String
  text: String
  html: String
  lastEvent: String
  createdAt: String!
  scheduledAt: String
  cc: [String!]
  bcc: [String!]
}

extend type Mutation {
  createContact(input: CreateContactInput!): Contact!
  updateContact(id: Int!, input: UpdateContactInput!): Contact!
  deleteContact(id: Int!): DeleteContactResult!
  importContacts(contacts: [ContactInput!]!): ImportContactsResult!
  findContactEmail(contactId: Int!): FindContactEmailResult!
  findCompanyEmails(companyId: Int!): EnhanceAllContactsResult!
  enhanceAllContacts: EnhanceAllContactsResult!
  applyEmailPattern(companyId: Int!): ApplyEmailPatternResult!
  unverifyCompanyContacts(companyId: Int!): UnverifyContactsResult!
  mergeDuplicateContacts(companyId: Int!): MergeDuplicateContactsResult!
  markContactEmailVerified(contactId: Int!, verified: Boolean!): Contact!
  verifyContactEmail(contactId: Int!): VerifyEmailResult!
  scoreContactsML(companyId: Int!): ScoreContactsMLResult!
  enrichAIContactProfile(contactId: Int!): EnrichAIContactResult!
  enrichAIContactsForCompany(companyId: Int!): EnrichAIContactsBulkResult!
  computeContactDeletionScores(companyId: Int): BatchOperationResult!
  flagContactsForDeletion(threshold: Float): BatchOperationResult!
  unflagContactForDeletion(id: Int!): Contact!
  purgeDeletedContacts(companyId: Int): BatchOperationResult!
}

type MergeDuplicateContactsResult {
  success: Boolean!
  message: String!
  mergedCount: Int!
  removedCount: Int!
}

type Contact {
  id: Int!
  firstName: String!
  lastName: String!
  linkedinUrl: String
  email: String
  emails: [String!]!
  bouncedEmails: [String!]!
  company: String
  companyId: Int
  position: String
  userId: String
  nbStatus: String
  nbResult: String
  nbFlags: [String!]!
  nbSuggestedCorrection: String
  nbRetryToken: String
  nbExecutionTimeMs: Int
  emailVerified: Boolean
  githubHandle: String
  telegramHandle: String
  doNotContact: Boolean!
  tags: [String!]!
  # ML-derived decision-maker fields
  seniority: String
  department: String
  isDecisionMaker: Boolean
  authorityScore: Float
  dmReasons: [String!]!
  # ML touch score (urgency to re-engage)
  nextTouchScore: Float
  lastContactedAt: String
  aiProfile: ContactAIProfile
  # ML deletion scoring
  toBeDeleted: Boolean!
  deletionScore: Float
  deletionReasons: [String!]!
  deletionFlaggedAt: String
  createdAt: String!
  updatedAt: String!
}

type ContactAIGitHubRepo {
  name: String!
  description: String
  stars: Int!
  topics: [String!]!
}

type ContactAIProfile {
  trigger: String!
  enrichedAt: String!
  linkedinHeadline: String
  linkedinBio: String
  githubBio: String
  githubTopLanguages: [String!]!
  githubAiRepos: [ContactAIGitHubRepo!]!
  githubTotalStars: Int!
  specialization: String
  skills: [String!]!
  researchAreas: [String!]!
  experienceLevel: String!
  synthesisConfidence: Float!
  synthesisRationale: String
}

type EnrichAIContactResult {
  success: Boolean!
  message: String!
  contactId: Int!
  aiProfile: ContactAIProfile
}

type EnrichAIContactsBulkResult {
  success: Boolean!
  message: String!
  enriched: Int!
  skipped: Int!
  errors: [String!]!
}

type ScoreContactsMLResult {
  success: Boolean!
  message: String!
  contactsScored: Int!
  decisionMakersFound: Int!
  results: [ContactMLScore!]!
}

type ContactMLScore {
  contactId: Int!
  seniority: String!
  department: String!
  isDecisionMaker: Boolean!
  authorityScore: Float!
  dmReasons: [String!]!
}

type ContactsResult {
  contacts: [Contact!]!
  totalCount: Int!
}

type DeleteContactResult {
  success: Boolean!
  message: String!
}

type ImportContactsResult {
  success: Boolean!
  imported: Int!
  failed: Int!
  errors: [String!]!
}

input ContactInput {
  firstName: String!
  lastName: String!
  linkedinUrl: String
  email: String
  emails: [String!]
  company: String
  companyId: Int
  position: String
  githubHandle: String
  telegramHandle: String
  tags: [String!]
}

input CreateContactInput {
  firstName: String!
  lastName: String
  email: String
  emails: [String!]
  linkedinUrl: String
  position: String
  githubHandle: String
  telegramHandle: String
  companyId: Int
  tags: [String!]
}

input UpdateContactInput {
  firstName: String
  lastName: String
  email: String
  emails: [String!]
  linkedinUrl: String
  position: String
  githubHandle: String
  telegramHandle: String
  doNotContact: Boolean
  tags: [String!]
}

type FindContactEmailResult {
  success: Boolean!
  emailFound: Boolean!
  email: String
  verified: Boolean
  message: String!
  candidatesTried: Int!
}

type EnhanceAllContactsResult {
  success: Boolean!
  message: String!
  companiesProcessed: Int!
  totalContactsProcessed: Int!
  totalEmailsFound: Int!
  errors: [String!]!
}

type ApplyEmailPatternResult {
  success: Boolean!
  message: String!
  contactsUpdated: Int!
  pattern: String
  contacts: [Contact!]!
}

type UnverifyContactsResult {
  success: Boolean!
  count: Int!
}

type VerifyEmailResult {
  success: Boolean!
  verified: Boolean
  rawResult: String
  flags: [String!]
  suggestedCorrection: String
  message: String!
}

type ContactEmail {
  id: Int!
  contactId: Int!
  resendId: String!
  fromEmail: String!
  toEmails: [String!]!
  subject: String!
  textContent: String
  status: String!
  sentAt: String
  scheduledAt: String
  deliveredAt: String
  openedAt: String
  recipientName: String
  errorMessage: String
  parentEmailId: Int
  sequenceType: String
  sequenceNumber: String
  replyReceived: Boolean!
  replyReceivedAt: String
  followupStatus: String
  companyId: Int
  ccEmails: [String!]!
  replyToEmails: [String!]!
  htmlContent: String
  attachments: JSON
  tags: [String!]!
  headers: JSON
  idempotencyKey: String
  createdAt: String!
  updatedAt: String!
}

type CompanyContactEmail {
  id: Int!
  contactId: Int!
  resendId: String!
  fromEmail: String!
  toEmails: [String!]!
  subject: String!
  textContent: String
  status: String!
  sentAt: String
  scheduledAt: String
  deliveredAt: String
  openedAt: String
  recipientName: String
  errorMessage: String
  sequenceType: String
  sequenceNumber: String
  replyReceived: Boolean!
  followupStatus: String
  createdAt: String!
  updatedAt: String!
  contactFirstName: String!
  contactLastName: String!
  contactPosition: String
}
