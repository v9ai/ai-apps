extend type Query {
  # `includeFlagged: false` (default) excludes contacts with `to_be_deleted = true` —
  # outreach paths must keep the default. Admin/debug list views pass `true`
  # so flagged rows remain visible in the UI.
  contacts(companyId: Int, search: String, tag: String, limit: Int, offset: Int, includeFlagged: Boolean = false): ContactsResult!
  contact(id: Int, slug: String): Contact
  contactByEmail(email: String!): Contact
  contactByLinkedinUrl(linkedinUrl: String!): Contact
  contactEmails(contactId: Int!): [ContactEmail!]!
  contactReceivedEmails(contactId: Int!): [ReceivedEmail!]!
  contactMessages(contactId: Int!): [ContactMessage!]!
  companyContactEmails(companyId: Int!): [CompanyContactEmail!]!
  resendEmail(resendId: String!): ResendEmailDetail
}

type ContactMessage {
  id: Int!
  channel: String!
  direction: String!
  contactId: Int
  companyId: Int
  contactEmailId: Int
  senderName: String
  senderProfileUrl: String
  content: String
  subject: String
  sentAt: String!
  classification: String
  classificationConfidence: Float
  createdAt: String!
  updatedAt: String!
}

type ResendEmailDetail {
  id: String!
  from: String!
  to: [String!]!
  subject: String
  text: String
  html: String
  lastEvent: String
  createdAt: String!
  scheduledAt: String
  cc: [String!]
  bcc: [String!]
}

extend type Mutation {
  createContact(input: CreateContactInput!): Contact!
  updateContact(id: Int!, input: UpdateContactInput!): Contact!
  deleteContact(id: Int!): DeleteContactResult!
  importContacts(contacts: [ContactInput!]!): ImportContactsResult!
  findContactEmail(contactId: Int!): FindContactEmailResult!
  findCompanyEmails(companyId: Int!): EnhanceAllContactsResult!
  enhanceAllContacts: EnhanceAllContactsResult!
  applyEmailPattern(companyId: Int!): ApplyEmailPatternResult!
  unverifyCompanyContacts(companyId: Int!): UnverifyContactsResult!
  mergeDuplicateContacts(companyId: Int!): MergeDuplicateContactsResult!
  markContactEmailVerified(contactId: Int!, verified: Boolean!): Contact!
  verifyContactEmail(contactId: Int!): VerifyEmailResult!
  scoreContactsML(companyId: Int!): ScoreContactsMLResult!
  scoreContactLora(contactId: Int!): Contact!
  batchScoreContactsLora(companyId: Int!, limit: Int = 50): ScoreContactsLoraResult!
  enrichAIContactProfile(contactId: Int!): EnrichAIContactResult!
  enrichAIContactsForCompany(companyId: Int!): EnrichAIContactsBulkResult!
  enrichContactPapersAndTags(contactId: Int!): EnrichContactPapersResult!
  computeContactDeletionScores(companyId: Int): BatchOperationResult!
  flagContactsForDeletion(threshold: Float): BatchOperationResult!
  unflagContactForDeletion(id: Int!): Contact!
  purgeDeletedContacts(companyId: Int): BatchOperationResult!
  enrichOpportunityCandidates(opportunityId: String!): EnrichAIContactsBulkResult!
}

type MergeDuplicateContactsResult {
  success: Boolean!
  message: String!
  mergedCount: Int!
  removedCount: Int!
}

type Contact {
  id: Int!
  slug: String
  firstName: String!
  lastName: String!
  linkedinUrl: String
  email: String
  emails: [String!]!
  bouncedEmails: [String!]!
  company: String
  companyId: Int
  position: String
  userId: String
  nbStatus: String
  nbResult: String
  nbFlags: [String!]!
  nbSuggestedCorrection: String
  nbRetryToken: String
  nbExecutionTimeMs: Int
  emailVerified: Boolean
  githubHandle: String
  telegramHandle: String
  doNotContact: Boolean!
  tags: [String!]!
  notes: String
  # Cloudflare email routing: `{forwardingAlias}@vadim.blog` → email
  forwardingAlias: String
  forwardingAliasRuleId: String
  # ML-derived decision-maker fields
  seniority: String
  department: String
  isDecisionMaker: Boolean
  authorityScore: Float
  dmReasons: [String!]!
  # ML touch score (urgency to re-engage)
  nextTouchScore: Float
  lastContactedAt: String
  aiProfile: ContactAIProfile
  # ML deletion scoring
  toBeDeleted: Boolean!
  deletionScore: Float
  deletionReasons: [String!]!
  deletionFlaggedAt: String
  # Fake account detection
  authenticityVerdict: String
  authenticityScore: Float
  authenticityFlags: [String!]!
  # Semantic LoRA tier (Llama-3.1-8B LoRA on CF Workers AI)
  loraTier: String
  loraReasons: [String!]!
  loraScoredAt: String
  # Paper + tag enrichment (populated by enrichContactPapersAndTags)
  papers: [ContactPaper!]!
  papersEnrichedAt: String
  createdAt: String!
  updatedAt: String!
}

type ContactPaper {
  title: String!
  authors: [String!]!
  year: Int
  venue: String
  doi: String
  url: String
  citationCount: Int
  source: String
}

type EnrichContactPapersResult {
  success: Boolean!
  message: String!
  contactId: Int!
  papers: [ContactPaper!]!
  tags: [String!]!
  tagsAdded: [String!]!
  papersEnrichedAt: String
}

type ContactAIGitHubRepo {
  name: String!
  description: String
  stars: Int!
  topics: [String!]!
}

type ContactWorkExperience {
  company: String!
  companyLogo: String
  title: String!
  employmentType: String
  startDate: String!
  endDate: String
  duration: String
  location: String
  description: String
  skills: [String!]!
}

type ContactAIProfile {
  trigger: String!
  enrichedAt: String!
  linkedinHeadline: String
  linkedinBio: String
  githubBio: String
  githubTopLanguages: [String!]!
  githubAiRepos: [ContactAIGitHubRepo!]!
  githubTotalStars: Int!
  specialization: String
  skills: [String!]!
  researchAreas: [String!]!
  experienceLevel: String!
  synthesisConfidence: Float!
  synthesisRationale: String
  workExperience: [ContactWorkExperience!]!
}

type EnrichAIContactResult {
  success: Boolean!
  message: String!
  contactId: Int!
  aiProfile: ContactAIProfile
}

type EnrichAIContactsBulkResult {
  success: Boolean!
  message: String!
  enriched: Int!
  skipped: Int!
  errors: [String!]!
}

type ScoreContactsMLResult {
  success: Boolean!
  message: String!
  contactsScored: Int!
  decisionMakersFound: Int!
  results: [ContactMLScore!]!
}

type ContactMLScore {
  contactId: Int!
  seniority: String!
  department: String!
  isDecisionMaker: Boolean!
  authorityScore: Float!
  dmReasons: [String!]!
}

type ScoreContactsLoraResult {
  success: Boolean!
  message: String!
  contactsScored: Int!
  tierBreakdown: LoraTierBreakdown!
  results: [ContactLoraScore!]!
}

type ContactLoraScore {
  contactId: Int!
  tier: String!
  score: Float!
  reasons: [String!]!
}

type LoraTierBreakdown {
  a: Int!
  b: Int!
  c: Int!
  d: Int!
}

type ContactsResult {
  contacts: [Contact!]!
  totalCount: Int!
}

type DeleteContactResult {
  success: Boolean!
  message: String!
}

type BatchOperationResult {
  success: Boolean!
  affected: Int!
  message: String
}

type ImportContactsResult {
  success: Boolean!
  imported: Int!
  updated: Int!
  failed: Int!
  errors: [String!]!
}

input ContactInput {
  firstName: String!
  lastName: String!
  linkedinUrl: String
  email: String
  emails: [String!]
  company: String
  companyId: Int
