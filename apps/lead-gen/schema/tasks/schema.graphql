extend type Query {
  tasks(status: String, priority: String, limit: Int, offset: Int): TasksResult!
  task(id: Int!): Task
}

extend type Mutation {
  createTask(input: CreateTaskInput!): Task!
  updateTask(id: Int!, input: UpdateTaskInput!): Task!
  completeTask(id: Int!): Task!
  deleteTask(id: Int!): DeleteTaskResult!
}

type Task {
  id: Int!
  title: String!
  description: String
  status: String!
  priority: String!
  dueDate: String
  completedAt: String
  entityType: String
  entityId: String
  tags: [String!]!
  createdAt: String!
  updatedAt: String!
}

type TasksResult {
  tasks: [Task!]!
  totalCount: Int!
}

type DeleteTaskResult {
  success: Boolean!
  message: String
}

input CreateTaskInput {
  title: String!
  description: String
  status: String
  priority: String
  dueDate: String
  entityType: String
  entityId: String
  tags: [String!]
}

input UpdateTaskInput {
  title: String
  description: String
  status: String
  priority: String
  dueDate: String
  entityType: String
  entityId: String
  tags: [String!]
}
