type Product {
  id: Int!
  slug: String!
  name: String!
  url: URL!
  domain: String
  description: String
  highlights: JSON
  icpAnalysis: JSON
  icpAnalyzedAt: DateTime
  createdBy: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

input ProductInput {
  name: String!
  url: String!
  description: String
}

extend type Query {
  products(limit: Int, offset: Int): [Product!]!
  product(id: Int!): Product
  productBySlug(slug: String!): Product
}

extend type Mutation {
  upsertProduct(input: ProductInput!): Product!
  deleteProduct(id: Int!): Boolean!
  analyzeProductICP(id: Int!): Product!
}
