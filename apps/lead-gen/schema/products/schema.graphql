type Product {
  id: Int!
  slug: String!
  name: String!
  url: URL!
  domain: String
  description: String
  highlights: JSON
  icpAnalysis: JSON
  icpAnalyzedAt: DateTime
  pricingAnalysis: JSON
  pricingAnalyzedAt: DateTime
  gtmAnalysis: JSON
  gtmAnalyzedAt: DateTime
  intelReport: JSON
  intelReportAt: DateTime
  positioningAnalysis: JSON
  publishedAt: DateTime
  createdBy: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

input ProductInput {
  name: String!
  url: String!
  description: String
}

type IntelRun {
  id: ID!
  productId: Int!
  kind: String!
  status: String!
  startedAt: DateTime!
  finishedAt: DateTime
  error: String
  output: JSON
  "Streaming progress snapshot written by graph nodes as they execute. See migration 0063."
  progress: JSON
  "Aggregate USD cost across all LLM calls in this run. See migration 0066."
  totalCostUsd: Float
}

type IntelRunAccepted {
  runId: ID!
  productId: Int!
  kind: String!
  status: String!
}

"One scored company for a given product — a row in company_product_signals joined with its company."
type ProductLead {
  companyId: Int!
  companyKey: String!
  companyName: String!
  companyDomain: String
  companyLogoUrl: String
  companyDescription: String
  companyIndustry: String
  companySize: String
  companyLocation: String
  "'hot' | 'warm' | 'cold' | null"
  tier: String
  score: Float!
  regexScore: Float!
  semanticScore: Float
  "Vertical-specific signal payload; always includes schema_version."
  signals: JSON
  updatedAt: DateTime!
}

type ProductLeadsConnection {
  leads: [ProductLead!]!
  totalCount: Int!
  hotCount: Int!
  warmCount: Int!
  coldCount: Int!
}

extend type Query {
  products(limit: Int, offset: Int): [Product!]!
  product(id: Int!): Product
  productBySlug(slug: String!): Product
  productIntelRun(id: ID!): IntelRun
  productIntelRuns(productId: Int!, kind: String, minSchemaVersion: String, graphVersion: String): [IntelRun!]!
  "Scored leads for a product, ordered by tier then score desc. Backed by company_product_signals."
  productLeads(slug: String!, tier: String, limit: Int = 50, offset: Int = 0): ProductLeadsConnection!
}

extend type Subscription {
  "Live status of IntelRuns for a product. Pushed by the lead-gen GraphQL gateway when langgraph webhooks update run state. Replaces 2s polling."
  intelRunStatus(productId: Int!, kind: String): IntelRun!
}

extend type Mutation {
  upsertProduct(input: ProductInput!): Product!
  deleteProduct(id: Int!): Boolean!
  analyzeProductICP(id: Int!): Product!
  enhanceProductIcp(id: Int!): Product!
  analyzeProductPricing(id: Int!): Product!
  analyzeProductGTM(id: Int!): Product!
  runFullProductIntel(id: Int!): Product!
  analyzeProductPricingAsync(id: Int!, resumeFromRunId: ID): IntelRunAccepted!
  analyzeProductGTMAsync(id: Int!, resumeFromRunId: ID): IntelRunAccepted!
  runFullProductIntelAsync(id: Int!, forceRefresh: Boolean, resumeFromRunId: ID): IntelRunAccepted!
  setProductPublished(id: Int!, published: Boolean!): Product!
}
