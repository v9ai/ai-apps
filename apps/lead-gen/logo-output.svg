<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="magnetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E53E3E"/>
      <stop offset="100%" stop-color="#C53030"/>
    </linearGradient>
    <linearGradient id="tipSGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F6E05E"/>
      <stop offset="100%" stop-color="#D69E2E"/>
    </linearGradient>
    <linearGradient id="tipNGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#63B3ED"/>
      <stop offset="100%" stop-color="#2B6CB0"/>
    </linearGradient>
    <filter id="magnetShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#C53030" flood-opacity="0.25"/>
    </filter>
    <marker id="arrowRed" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <path d="M0,1 L0,6 L6,3.5 Z" fill="#E53E3E" opacity="0.75"/>
    </marker>
    <marker id="arrowBlue" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <path d="M0,1 L0,6 L6,3.5 Z" fill="#4299E1" opacity="0.75"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect width="300" height="200" fill="#FFFFFF"/>

  <!-- Magnetic field arcs (dashed, from floating icons curving toward poles) -->
  <path d="M 46 151 Q 30 110 46 72" fill="none" stroke="#FC8181" stroke-width="1.4" stroke-dasharray="4 3" opacity="0.4"/>
  <path d="M 62 151 Q 42 110 60 76" fill="none" stroke="#FC8181" stroke-width="1.4" stroke-dasharray="4 3" opacity="0.5"/>
  <path d="M 238 151 Q 258 110 240 76" fill="none" stroke="#63B3ED" stroke-width="1.4" stroke-dasharray="4 3" opacity="0.5"/>
  <path d="M 254 151 Q 270 110 254 72" fill="none" stroke="#63B3ED" stroke-width="1.4" stroke-dasharray="4 3" opacity="0.4"/>
  <!-- Wide bottom field arc -->
  <path d="M 54 155 Q 150 194 246 155" fill="none" stroke="#FC8181" stroke-width="1.1" stroke-dasharray="5 4" opacity="0.28"/>

  <!-- Horseshoe magnet: thick red U-shape -->
  <!-- Outer stroke = red body -->
  <path d="M 54 153 L 54 98 A 96 96 0 0 1 246 98 L 246 153"
        fill="none" stroke="url(#magnetGrad)" stroke-width="34" stroke-linecap="butt"
        filter="url(#magnetShadow)"/>
  <!-- White inner cutout creates hollow horseshoe appearance -->
  <path d="M 54 153 L 54 98 A 96 96 0 0 1 246 98 L 246 153"
        fill="none" stroke="#FFFFFF" stroke-width="18" stroke-linecap="butt"/>

  <!-- S pole tip (left, yellow) -->
  <rect x="36" y="147" width="36" height="23" rx="5" fill="url(#tipSGrad)"/>
  <text x="54" y="163" font-family="'Arial Black',Arial,sans-serif" font-size="11" font-weight="900"
        fill="#7B341E" text-anchor="middle">S</text>

  <!-- N pole tip (right, blue) -->
  <rect x="228" y="147" width="36" height="23" rx="5" fill="url(#tipNGrad)"/>
  <text x="246" y="163" font-family="'Arial Black',Arial,sans-serif" font-size="11" font-weight="900"
        fill="#1A365D" text-anchor="middle">N</text>

  <!-- Person icon — left mid, pulled toward S -->
  <circle cx="13" cy="102" r="7.5" fill="#E53E3E"/>
  <path d="M 5 121 Q 13 111 21 121 L 23 133 L 3 133 Z" fill="#E53E3E"/>
  <line x1="22" y1="113" x2="35" y2="122" stroke="#E53E3E" stroke-width="2"
        marker-end="url(#arrowRed)" opacity="0.8"/>

  <!-- Person icon — upper-left, farther away -->
  <circle cx="9" cy="57" r="5.5" fill="#FC8181" opacity="0.85"/>
  <path d="M 3 73 Q 9 65 15 73 L 16 82 L 2 82 Z" fill="#FC8181" opacity="0.85"/>
  <line x1="16" y1="66" x2="30" y2="75" stroke="#FC8181" stroke-width="1.5"
        marker-end="url(#arrowRed)" opacity="0.6"/>

  <!-- Company building — right mid, pulled toward N -->
  <rect x="265" y="96" width="16" height="19" rx="2.5" fill="#4299E1"/>
  <rect x="268" y="90" width="10" height="7" rx="1.5" fill="#2B6CB0"/>
  <rect x="267" y="100" width="4" height="4" rx="0.8" fill="#FFFFFF" opacity="0.9"/>
  <rect x="275" y="100" width="4" height="4" rx="0.8" fill="#FFFFFF" opacity="0.9"/>
  <rect x="267" y="107" width="4" height="4" rx="0.8" fill="#FFFFFF" opacity="0.9"/>
  <rect x="275" y="107" width="4" height="4" rx="0.8" fill="#FFFFFF" opacity="0.9"/>
  <line x1="263" y1="109" x2="249" y2="118" stroke="#4299E1" stroke-width="2"
        marker-end="url(#arrowBlue)" opacity="0.8"/>

  <!-- Company building — upper-right, farther away -->
  <rect x="273" y="53" width="14" height="15" rx="2" fill="#63B3ED" opacity="0.85"/>
  <rect x="275" y="48" width="10" height="6" rx="1" fill="#4299E1" opacity="0.85"/>
  <rect x="275" y="57" width="3.5" height="3.5" rx="0.5" fill="#FFFFFF" opacity="0.85"/>
  <rect x="282" y="57" width="3.5" height="3.5" rx="0.5" fill="#FFFFFF" opacity="0.85"/>
  <rect x="275" y="63" width="3.5" height="3.5" rx="0.5" fill="#FFFFFF" opacity="0.85"/>
  <rect x="282" y="63" width="3.5" height="3.5" rx="0.5" fill="#FFFFFF" opacity="0.85"/>
  <line x1="271" y1="65" x2="257" y2="74" stroke="#63B3ED" stroke-width="1.5"
        marker-end="url(#arrowBlue)" opacity="0.6"/>

  <!-- Wordmark -->
  <text x="150" y="181" font-family="'Arial Black',Arial,sans-serif" font-size="14" font-weight="900"
        fill="#1A202C" text-anchor="middle" letter-spacing="1">AGENTIC</text>
  <text x="150" y="196" font-family="Arial,sans-serif" font-size="9.5" font-weight="500"
        fill="#E53E3E" text-anchor="middle" letter-spacing="3">LEAD  GEN</text>
</svg>
