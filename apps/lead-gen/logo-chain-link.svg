<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="metalGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8d8e8;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#7fa8cc;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#4a7fa5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a5a7a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="metalGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d0e4f0;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#8ab4d0;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#5590b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e4a68;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="linkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0eef8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#5a8fb5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3d5c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="personGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a6f96;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="buildingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c5d8ec;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5f84;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#0a2035" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="200" fill="#0d1f2d" rx="10"/>

  <!-- Grid -->
  <g opacity="0.2" stroke="#1a3348" stroke-width="0.5">
    <line x1="0" y1="20" x2="300" y2="20"/>
    <line x1="0" y1="40" x2="300" y2="40"/>
    <line x1="0" y1="60" x2="300" y2="60"/>
    <line x1="0" y1="80" x2="300" y2="80"/>
    <line x1="0" y1="100" x2="300" y2="100"/>
    <line x1="0" y1="120" x2="300" y2="120"/>
    <line x1="0" y1="140" x2="300" y2="140"/>
    <line x1="0" y1="160" x2="300" y2="160"/>
    <line x1="0" y1="180" x2="300" y2="180"/>
    <line x1="20" y1="0" x2="20" y2="200"/>
    <line x1="40" y1="0" x2="40" y2="200"/>
    <line x1="60" y1="0" x2="60" y2="200"/>
    <line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="120" y1="0" x2="120" y2="200"/>
    <line x1="140" y1="0" x2="140" y2="200"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="180" y1="0" x2="180" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="220" y1="0" x2="220" y2="200"/>
    <line x1="240" y1="0" x2="240" y2="200"/>
    <line x1="260" y1="0" x2="260" y2="200"/>
    <line x1="280" y1="0" x2="280" y2="200"/>
  </g>

  <!-- LEFT CHAIN LINK — Person silhouette -->
  <g filter="url(#shadow)">
    <ellipse cx="108" cy="90" rx="44" ry="30" fill="none" stroke="url(#metalGrad1)" stroke-width="11" />
    <ellipse cx="108" cy="90" rx="44" ry="30" fill="none" stroke="#ddeeff" stroke-width="2" stroke-dasharray="60 200" stroke-dashoffset="0" opacity="0.5"/>
  </g>
  <!-- Person head -->
  <circle cx="108" cy="80" r="7.5" fill="url(#personGrad)" />
  <!-- Person body/shoulders -->
  <path d="M94 103 Q94 91 108 91 Q122 91 122 103 Z" fill="url(#personGrad)" />

  <!-- RIGHT CHAIN LINK — Company building -->
  <g filter="url(#shadow)">
    <ellipse cx="192" cy="90" rx="44" ry="30" fill="none" stroke="url(#metalGrad2)" stroke-width="11" />
    <ellipse cx="192" cy="90" rx="44" ry="30" fill="none" stroke="#ddeeff" stroke-width="2" stroke-dasharray="60 200" stroke-dashoffset="120" opacity="0.5"/>
  </g>
  <!-- Building body -->
  <rect x="178" y="82" width="28" height="21" fill="url(#buildingGrad)" />
  <!-- Roof bar -->
  <rect x="175" y="80" width="34" height="4" fill="url(#buildingGrad)" />
  <!-- Antenna -->
  <rect x="191" y="73" width="2" height="8" fill="#7ab2d0" />
  <!-- Windows row 1 -->
  <rect x="181" y="85" width="5" height="4" fill="#0d1f2d" opacity="0.7" rx="0.5"/>
  <rect x="189" y="85" width="5" height="4" fill="#0d1f2d" opacity="0.7" rx="0.5"/>
  <rect x="197" y="85" width="5" height="4" fill="#0d1f2d" opacity="0.7" rx="0.5"/>
  <!-- Windows row 2 -->
  <rect x="181" y="92" width="5" height="4" fill="#0d1f2d" opacity="0.7" rx="0.5"/>
  <rect x="189" y="92" width="5" height="4" fill="#0d1f2d" opacity="0.7" rx="0.5"/>
  <rect x="197" y="92" width="5" height="4" fill="#0d1f2d" opacity="0.7" rx="0.5"/>
  <!-- Door -->
  <rect x="187" y="97" width="10" height="6" fill="#0d1f2d" opacity="0.8" rx="0.5"/>

  <!-- INTERLOCKING — left arc behind -->
  <path d="M148 61 Q165 60 152 90 Q165 120 148 119"
        fill="none" stroke="#1a3a52" stroke-width="13" />
  <!-- INTERLOCKING — right arc in front -->
  <path d="M152 61 Q135 60 148 90 Q135 120 152 119"
        fill="none" stroke="url(#linkGrad)" stroke-width="11" />
  <path d="M152 61 Q135 60 148 90 Q135 120 152 119"
        fill="none" stroke="#ddeeff" stroke-width="1.5" opacity="0.4"/>

  <!-- Connection spark -->
  <circle cx="150" cy="90" r="5" fill="#5ab0e0" opacity="0.7">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;7;4" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="90" r="2.5" fill="#c8eaff" opacity="0.95"/>

  <!-- AGENTIC wordmark -->
  <text x="150" y="143"
        font-family="'Arial', 'Helvetica', sans-serif"
        font-size="18"
        font-weight="700"
        letter-spacing="3"
        text-anchor="middle"
        fill="url(#metalGrad1)">AGENTIC</text>

  <!-- Decorative rules -->
  <line x1="42" y1="150" x2="106" y2="150" stroke="#2a5a7a" stroke-width="0.8"/>
  <line x1="194" y1="150" x2="258" y2="150" stroke="#2a5a7a" stroke-width="0.8"/>

  <!-- LEAD GEN sub-label -->
  <text x="150" y="160"
        font-family="'Arial', 'Helvetica', sans-serif"
        font-size="11"
        font-weight="400"
        letter-spacing="5"
        text-anchor="middle"
        fill="#6a9fc0">LEAD GEN</text>

  <!-- Tagline -->
  <text x="150" y="176"
        font-family="'Arial', 'Helvetica', sans-serif"
        font-size="7"
        font-weight="300"
        letter-spacing="2.5"
        text-anchor="middle"
        fill="#3a6a8a">B2B CONNECTIONS FORGED</text>

</svg>
