<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <style>
      .gb { fill: #2a2d35; stroke: #3d4149; stroke-width: 1.5; }
      .is { stroke: #4da6ff; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .if { fill: #4da6ff; }
      .hub { fill: #1a8cff; stroke: #4da6ff; stroke-width: 1; }
      .hub2 { fill: #0d1117; }
    </style>
    <radialGradient id="gl" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a8cff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#1a8cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gm" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a8cff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#1a8cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gs" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a8cff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#1a8cff" stop-opacity="0"/>
    </radialGradient>
    <filter id="fg" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="200" fill="#0d1117" rx="8"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#4da6ff" stroke-width="0.5">
    <line x1="0" y1="50" x2="300" y2="50"/><line x1="0" y1="100" x2="300" y2="100"/>
    <line x1="0" y1="150" x2="300" y2="150"/><line x1="75" y1="0" x2="75" y2="200"/>
    <line x1="150" y1="0" x2="150" y2="200"/><line x1="225" y1="0" x2="225" y2="200"/>
  </g>

  <!-- LARGE GEAR cx=78 cy=105 outer=50 inner=40 10-teeth -->
  <path class="gb" d="M78,55 L83,57.5 L89,54 L90.5,60 L97,61 L96,67 L102,70 L99,76 L104,81 L100,85 L103,91 L98,93 L99,100 L93,100.5 L92.5,107 L87,106 L84.5,112 L79,110 L76,116 L71,113 L67,118 L63,114 L58,117 L56,112 L50,112 L50.5,106 L45,104 L46.5,98 L42,94 L45.5,90 L42.5,85 L47,82 L45,76 L50.5,75 L50,68 L56,68.5 L57.5,62.5 L63,64 L66.5,59 L71.5,61.5 Z"/>
  <circle cx="78" cy="105" r="40" fill="url(#gl)"/>
  <circle cx="78" cy="105" r="40" fill="none" stroke="#1a8cff" stroke-width="0.8" opacity="0.35"/>
  <circle cx="78" cy="105" r="33" fill="none" stroke="#2a2d35" stroke-width="1.5"/>
  <!-- DISCOVER icon: magnifying glass + radar arcs -->
  <circle cx="74" cy="101" r="9" class="is"/>
  <line x1="81" y1="108" x2="89" y2="116" class="is" stroke-width="2.8"/>
  <path d="M65,92 Q67,86 74,85" class="is" stroke-width="1.2" opacity="0.65"/>
  <path d="M62,90 Q64,82 74,80" class="is" stroke-width="0.9" opacity="0.4"/>
  <text x="78" y="150" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="7" font-weight="600" fill="#c9d1d9" letter-spacing="0.04em" opacity="0.65">DISCOVER</text>
  <circle cx="78" cy="105" r="7" class="hub"/>
  <circle cx="78" cy="105" r="4" class="hub2"/>

  <!-- MEDIUM GEAR cx=158 cy=85 outer=36 inner=28 9-teeth -->
  <path class="gb" d="M158,49 L162.5,51 L167.5,48 L168.5,54 L174.5,56 L173,62 L178.5,65.5 L175.5,71 L180,76 L176,79.5 L179,85.5 L175,88 L177,94 L172,95 L171,101 L166,100 L163,105.5 L158.5,103.5 L154.5,108 L150,105.5 L145.5,109 L142,105.5 L137,108 L136,102.5 L130.5,102 L131,96 L126,93 L128.5,87.5 L125.5,82 L129.5,79.5 L127.5,74 L132,72.5 L131.5,66 L137,66.5 L137.5,60.5 L143,62 L145.5,56.5 L150.5,59.5 L153,54.5 L157.5,56.5 Z"/>
  <circle cx="158" cy="85" r="28" fill="url(#gm)"/>
  <circle cx="158" cy="85" r="28" fill="none" stroke="#1a8cff" stroke-width="0.8" opacity="0.35"/>
  <circle cx="158" cy="85" r="22" fill="none" stroke="#2a2d35" stroke-width="1.5"/>
  <!-- ENRICH icon: stacked data layers -->
  <ellipse cx="158" cy="94" rx="9.5" ry="2.8" class="is"/>
  <ellipse cx="158" cy="89" rx="9.5" ry="2.8" class="is"/>
  <ellipse cx="158" cy="84" rx="9.5" ry="2.8" class="is"/>
  <line x1="148.5" y1="89" x2="148.5" y2="94" class="is"/>
  <line x1="167.5" y1="89" x2="167.5" y2="94" class="is"/>
  <line x1="148.5" y1="84" x2="148.5" y2="89" class="is"/>
  <line x1="167.5" y1="84" x2="167.5" y2="89" class="is"/>
  <line x1="158" y1="78" x2="158" y2="82.5" class="is" stroke-width="1.5"/>
  <line x1="155.5" y1="80" x2="160.5" y2="80" class="is" stroke-width="1.5"/>
  <text x="158" y="125" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="7" font-weight="600" fill="#c9d1d9" letter-spacing="0.04em" opacity="0.65">ENRICH</text>
  <circle cx="158" cy="85" r="6" class="hub"/>
  <circle cx="158" cy="85" r="3.5" class="hub2"/>

  <!-- SMALL GEAR cx=222 cy=113 outer=26 inner=20 8-teeth -->
  <path class="gb" d="M222,87 L226,89.5 L230.5,87 L231,93 L236.5,95.5 L234.5,101 L239.5,105.5 L236.5,110 L240.5,115.5 L237,119 L239.5,124.5 L235.5,126.5 L236,133 L230.5,133 L228,138.5 L223,137 L220,142 L215.5,140 L212.5,144.5 L208.5,142 L204.5,145.5 L202,141 L196.5,142 L197,136.5 L192,134 L194,128.5 L190.5,124 L194.5,121 L191.5,116 L195.5,113.5 L193.5,108 L198.5,107.5 L199,102 L204,103.5 L206,98.5 L210.5,101 L214,97 L218,100 Z"/>
  <circle cx="222" cy="113" r="20" fill="url(#gs)"/>
  <circle cx="222" cy="113" r="20" fill="none" stroke="#1a8cff" stroke-width="0.8" opacity="0.35"/>
  <circle cx="222" cy="113" r="15" fill="none" stroke="#2a2d35" stroke-width="1.5"/>
  <!-- OUTREACH icon: paper plane -->
  <path d="M213,121 L233,108 L220,126 Z" class="is"/>
  <path d="M220,126 L218,119 L233,108" class="is"/>
  <line x1="218" y1="119" x2="222.5" y2="116.5" class="is" stroke-width="1.2"/>
  <circle cx="230" cy="110" r="1.5" class="if" opacity="0.8"/>
  <text x="222" y="151" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="7" font-weight="600" fill="#c9d1d9" letter-spacing="0.04em" opacity="0.65">OUTREACH</text>
  <circle cx="222" cy="113" r="5" class="hub"/>
  <circle cx="222" cy="113" r="3" class="hub2"/>

  <!-- Gear mesh dots -->
  <circle cx="118" cy="97" r="2.2" fill="#1a8cff" opacity="0.45" filter="url(#fg)"/>
  <circle cx="190" cy="101" r="1.8" fill="#1a8cff" opacity="0.45" filter="url(#fg)"/>

  <!-- Divider -->
  <line x1="18" y1="165" x2="282" y2="165" stroke="#1a8cff" stroke-width="0.5" opacity="0.25"/>

  <!-- Wordmark -->
  <text x="150" y="180" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="700" letter-spacing="0.08em"><tspan fill="#4da6ff">AGENTIC</tspan><tspan fill="#c9d1d9"> LEAD GEN</tspan></text>

  <!-- Tagline -->
  <text x="150" y="193" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="6" fill="#c9d1d9" opacity="0.38" letter-spacing="0.14em">AUTOMATED PIPELINE MACHINERY</text>
</svg>
