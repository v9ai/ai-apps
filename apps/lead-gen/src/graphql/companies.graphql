#import "./company-fragments.graphql"

query AllCompanyTags {
  allCompanyTags
}

query FindCompany($name: String, $website: String, $linkedinUrl: String) {
  findCompany(name: $name, website: $website, linkedinUrl: $linkedinUrl) {
    found
    company {
      id
      key
      name
      website
      email
      location
      linkedin_url
    }
  }
}
