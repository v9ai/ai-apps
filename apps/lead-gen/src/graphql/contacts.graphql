query GetContact($id: Int, $slug: String) {
  contact(id: $id, slug: $slug) {
    id
    slug
    firstName
    lastName
    email
    emails
    bouncedEmails
    linkedinUrl
    company
    companyId
    position
    emailVerified
    doNotContact
    githubHandle
    telegramHandle
    tags
    forwardingAlias
    forwardingAliasRuleId
    nbStatus
    nbResult
    nbFlags
    nbSuggestedCorrection
    createdAt
    updatedAt
    aiProfile {
      trigger
      enrichedAt
      linkedinHeadline
      linkedinBio
      specialization
      skills
      researchAreas
      experienceLevel
      synthesisConfidence
      synthesisRationale
      githubBio
      githubTopLanguages
      githubTotalStars
      githubAiRepos {
        name
        description
        stars
        topics
      }
      workExperience {
        company
        companyLogo
        title
        employmentType
        startDate
        endDate
        duration
        location
        description
        skills
      }
    }
  }
}

mutation UpdateContact($id: Int!, $input: UpdateContactInput!) {
  updateContact(id: $id, input: $input) {
    id
    firstName
    lastName
    email
    emails
    linkedinUrl
    position
    githubHandle
    telegramHandle
    doNotContact
    tags
    emailVerified
    updatedAt
  }
}

mutation DeleteContact($id: Int!) {
  deleteContact(id: $id) {
    success
    message
  }
}

query GetResendEmail($resendId: String!) {
  resendEmail(resendId: $resendId) {
    id
    from
    to
    subject
    text
    html
    lastEvent
    createdAt
    scheduledAt
    cc
    bcc
  }
}

query GetContactMessages($contactId: Int!) {
  contactMessages(contactId: $contactId) {
    id
    channel
    direction
    contactId
    senderName
    senderProfileUrl
    content
    subject
    sentAt
    classification
    createdAt
  }
}

query GetContactOpportunities($contactId: Int!) {
  contactOpportunities(contactId: $contactId) {
    id
    title
    url
    source
    status
    rewardText
    rewardUsd
    score
    tags
    applied
    appliedAt
    applicationStatus
    companyName
    createdAt
  }
}

query GetContactEmails($contactId: Int!) {
  contactEmails(contactId: $contactId) {
    id
    resendId
    fromEmail
    toEmails
    subject
    textContent
    status
    sentAt
    recipientName
    replyReceived
    createdAt
    updatedAt
  }
  contactReceivedEmails(contactId: $contactId) {
    id
    fromEmail
    subject
    textContent
    classification
    classificationConfidence
    receivedAt
    createdAt
  }
}

query GetCompanyContactEmails($companyId: Int!) {
  companyContactEmails(companyId: $companyId) {
    id
    contactId
    resendId
    fromEmail
    toEmails
    subject
    textContent
    status
    sentAt
    scheduledAt
    recipientName
    createdAt
    updatedAt
    contactFirstName
    contactLastName
    contactPosition
    sequenceType
    sequenceNumber
    replyReceived
    followupStatus
  }
}

mutation SyncResendEmails($companyId: Int) {
  syncResendEmails(companyId: $companyId) {
    success
    updatedCount
    skippedCount
    totalCount
    error
  }
}

mutation ImportResendEmails($maxEmails: Int) {
  importResendEmails(maxEmails: $maxEmails) {
    success
    totalFetched
    newCount
    updatedCount
    skippedCount
    errorCount
    contactMatchCount
    companyMatchCount
    durationMs
    error
  }
}

mutation CancelCompanyEmails($companyId: Int!) {
  cancelCompanyEmails(companyId: $companyId) {
    success
    message
    cancelledCount
    failedCount
  }
}

mutation SendScheduledEmailNow($resendId: String!) {
  sendScheduledEmailNow(resendId: $resendId) {
    success
    resendId
    error
  }
}

mutation CancelScheduledEmail($resendId: String!) {
  cancelScheduledEmail(resendId: $resendId) {
    success
    error
  }
}

query GetContacts($companyId: Int, $search: String, $limit: Int, $offset: Int) {
  contacts(companyId: $companyId, search: $search, limit: $limit, offset: $offset) {
    contacts {
      id
      slug
      firstName
      lastName
      email
      bouncedEmails
      linkedinUrl
      position
      company
      companyId
      githubHandle
      telegramHandle
      emailVerified
      doNotContact
      nbResult
      tags
      createdAt
      seniority
      department
      isDecisionMaker
      authorityScore
      nextTouchScore
      lastContactedAt
    }
    totalCount
  }
}

mutation ImportContacts($contacts: [ContactInput!]!) {
  importContacts(contacts: $contacts) {
    success
    imported
    failed
    errors
  }
}

mutation FindContactEmail($contactId: Int!) {
  findContactEmail(contactId: $contactId) {
    success
    emailFound
    email
    verified
    message
    candidatesTried
  }
}

mutation FindCompanyEmails($companyId: Int!) {
  findCompanyEmails(companyId: $companyId) {
    success
    message
    companiesProcessed
    totalContactsProcessed
    totalEmailsFound
    errors
  }
}

mutation EnhanceAllContacts {
  enhanceAllContacts {
    success
    message
    companiesProcessed
    totalContactsProcessed
    totalEmailsFound
    errors
  }
}

mutation ApplyEmailPattern($companyId: Int!) {
  applyEmailPattern(companyId: $companyId) {
    success
    message
    contactsUpdated
    pattern
    contacts {
      id
      email
      emailVerified
    }
  }
}

mutation UnverifyCompanyContacts($companyId: Int!) {
  unverifyCompanyContacts(companyId: $companyId) {
    success
    count
  }
}

mutation CreateContact($input: CreateContactInput!) {
  createContact(input: $input) {
    id
    slug
    firstName
    lastName
    email
    linkedinUrl
    position
    companyId
    githubHandle
    telegramHandle
    tags
  }
}

mutation MergeDuplicateContacts($companyId: Int!) {
  mergeDuplicateContacts(companyId: $companyId) {
    success
    message
    mergedCount
    removedCount
  }
}

mutation MarkContactEmailVerified($contactId: Int!, $verified: Boolean!) {
  markContactEmailVerified(contactId: $contactId, verified: $verified) {
    id
    email
    emailVerified
  }
}

mutation VerifyContactEmail($contactId: Int!) {
  verifyContactEmail(contactId: $contactId) {
    success
    verified
    rawResult
    flags
    suggestedCorrection
    message
  }
}
