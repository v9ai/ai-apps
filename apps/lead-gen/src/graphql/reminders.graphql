query DueReminders {
  dueReminders {
    reminder {
      id
      entityType
      entityId
      remindAt
      recurrence
      note
      status
      snoozedUntil
      createdAt
      updatedAt
    }
    contact {
      id
      slug
      firstName
      lastName
      position
      tags
    }
  }
}

query Reminders($entityType: String!, $entityId: Int!) {
  reminders(entityType: $entityType, entityId: $entityId) {
    id
    entityType
    entityId
    remindAt
    recurrence
    note
    status
    snoozedUntil
    createdAt
    updatedAt
  }
}

mutation CreateReminder($input: CreateReminderInput!) {
  createReminder(input: $input) {
    id
    entityType
    entityId
    remindAt
    recurrence
    note
    status
    createdAt
  }
}

mutation UpdateReminder($id: Int!, $input: UpdateReminderInput!) {
  updateReminder(id: $id, input: $input) {
    id
    entityType
    entityId
    remindAt
    recurrence
    note
    status
    updatedAt
  }
}

mutation SnoozeReminder($id: Int!, $days: Int!) {
  snoozeReminder(id: $id, days: $days) {
    id
    entityType
    entityId
    remindAt
    status
    snoozedUntil
    updatedAt
  }
}

mutation DismissReminder($id: Int!) {
  dismissReminder(id: $id) {
    id
    entityType
    entityId
    status
    updatedAt
  }
}

mutation ComputeNextTouchScores($companyId: Int!) {
  computeNextTouchScores(companyId: $companyId) {
    success
    message
    contactsUpdated
    topContacts {
      contactId
      firstName
      lastName
      position
      nextTouchScore
      lastContactedAt
    }
  }
}

mutation ScoreContactsML($companyId: Int!) {
  scoreContactsML(companyId: $companyId) {
    success
    message
    contactsScored
    decisionMakersFound
    results {
      contactId
      seniority
      department
      authorityScore
      isDecisionMaker
      dmReasons
    }
  }
}
