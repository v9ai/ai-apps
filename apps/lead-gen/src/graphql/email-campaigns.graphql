query GetEmailCampaigns($status: String, $limit: Int, $offset: Int) {
  emailCampaigns(status: $status, limit: $limit, offset: $offset) {
    campaigns {
      id
      companyId
      name
      status
      mode
      fromEmail
      totalRecipients
      emailsSent
      emailsScheduled
      emailsFailed
      createdAt
      updatedAt
    }
    totalCount
  }
}

query GetEmailCampaign($id: String!) {
  emailCampaign(id: $id) {
    id
    companyId
    name
    status
    sequence
    delayDays
    startAt
    mode
    fromEmail
    replyTo
    totalRecipients
    emailsSent
    emailsScheduled
    emailsFailed
    recipientEmails
    createdAt
    updatedAt
  }
}

mutation CreateDraftCampaign($input: CreateCampaignInput!) {
  createDraftCampaign(input: $input) {
    id
    name
    status
    createdAt
  }
}

mutation UpdateCampaign($id: String!, $input: UpdateCampaignInput!) {
  updateCampaign(id: $id, input: $input) {
    id
    name
    status
    updatedAt
  }
}

mutation DeleteCampaign($id: String!) {
  deleteCampaign(id: $id) {
    success
    message
  }
}

mutation LaunchEmailCampaign($id: String!) {
  launchEmailCampaign(id: $id) {
    id
    name
    status
    emailsSent
    emailsScheduled
    emailsFailed
    updatedAt
  }
}

mutation SendEmail($input: SendEmailInput!) {
  sendEmail(input: $input) {
    success
    id
    error
  }
}

mutation GenerateEmail($input: GenerateEmailInput!) {
  generateEmail(input: $input) {
    subject
    html
    text
  }
}

mutation GenerateReply($input: GenerateReplyInput!) {
  generateReply(input: $input) {
    subject
    body
  }
}

query GetEmailStats {
  emailStats {
    sentToday
    sentThisWeek
    sentThisMonth
    scheduledToday
    scheduledFuture
    totalSent
    deliveredToday
    deliveredThisWeek
    deliveredThisMonth
    bouncedToday
    bouncedThisWeek
    bouncedThisMonth
    openedToday
    openedThisWeek
    openedThisMonth
  }
}

query GetReceivedEmails($limit: Int, $offset: Int, $archived: Boolean) {
  receivedEmails(limit: $limit, offset: $offset, archived: $archived) {
    emails {
      id
      resendId
      fromEmail
      toEmails
      subject
      receivedAt
      archivedAt
      createdAt
    }
    totalCount
  }
}

query GetReceivedEmail($id: Int!) {
  receivedEmail(id: $id) {
    id
    resendId
    fromEmail
    toEmails
    ccEmails
    replyToEmails
    subject
    messageId
    htmlContent
    textContent
    attachments
    receivedAt
    archivedAt
    createdAt
    updatedAt
  }
}

mutation ArchiveEmail($id: Int!) {
  archiveEmail(id: $id) {
    success
    message
  }
}

mutation UnarchiveEmail($id: Int!) {
  unarchiveEmail(id: $id) {
    success
    message
  }
}

mutation PreviewEmail($input: PreviewEmailInput!) {
  previewEmail(input: $input) {
    htmlContent
    subject
    drySendResult
  }
}

mutation SendOutreachEmail($input: SendOutreachEmailInput!) {
  sendOutreachEmail(input: $input) {
    success
    emailId
    subject
    error
  }
}

query GetEmailsNeedingFollowUp($limit: Int, $offset: Int) {
  emailsNeedingFollowUp(limit: $limit, offset: $offset) {
    emails {
      id
      contactId
      resendId
      fromEmail
      toEmails
      subject
      status
      sentAt
      sequenceType
      sequenceNumber
      followupStatus
      companyId
      recipientName
      createdAt
    }
    totalCount
  }
}
