[project]
name = "salescue"
version = "0.3.0"
description = "Sales intelligence library with 16 ML modules"
requires-python = ">=3.9"
dependencies = [
    "torch>=2.0",
    "transformers>=4.30",
    "huggingface-hub>=0.20",
    "numpy>=1.24",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "rich>=13.0",
    "httpx>=0.27",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.backends._legacy:_Backend"

[tool.setuptools.packages.find]
include = ["salescue*"]
where = ["."]
