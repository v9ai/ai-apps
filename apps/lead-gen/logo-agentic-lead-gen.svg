<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0052FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4DA6FF;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF3B30;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FF7A5A;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- White background -->
  <rect width="300" height="200" fill="#FFFFFF"/>

  <!--
    ICON: Dual interlocking triangles (Star of David / diamond)
    Center: cx=68, cy=100
    Up triangle:   apex (68,38)   base-left (26,110)  base-right (110,110)
    Down triangle: apex (68,162)  base-left (26,90)   base-right (110,90)

    Overlap hexagon (6 intersection points):
      top-left  (37.67, 90)   top-right  (98.33, 90)
      right     (104.17, 100)
      bot-right (98.33, 110)  bot-left   (37.67, 110)
      left      (31.83, 100)
  -->

  <!-- Up-pointing triangle — electric blue (drawn first, partial opacity) -->
  <polygon
    points="68,38 110,110 26,110"
    fill="url(#blueGrad)"
    opacity="0.88"
    filter="url(#glow)"
  />

  <!-- Down-pointing triangle — coral red (drawn on top, partial opacity) -->
  <polygon
    points="68,162 110,90 26,90"
    fill="url(#redGrad)"
    opacity="0.88"
    filter="url(#glow)"
  />

  <!-- Overlap hexagon — neutral blended tone to show interlocking -->
  <polygon
    points="37.67,90 98.33,90 104.17,100 98.33,110 37.67,110 31.83,100"
    fill="#7B2FBE"
    opacity="0.30"
  />

  <!-- Crisp outline: up triangle blue -->
  <polygon
    points="68,38 110,110 26,110"
    fill="none"
    stroke="#0052FF"
    stroke-width="2"
    stroke-linejoin="round"
  />

  <!-- Crisp outline: down triangle red -->
  <polygon
    points="68,162 110,90 26,90"
    fill="none"
    stroke="#FF3B30"
    stroke-width="2"
    stroke-linejoin="round"
  />

  <!-- Center precision dot -->
  <circle cx="68" cy="100" r="4.5" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="1.5"/>
  <circle cx="68" cy="100" r="1.8" fill="#1A1A2E"/>

  <!-- ===== WORDMARK ===== -->
  <text
    x="132"
    y="88"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="24"
    font-weight="800"
    letter-spacing="-0.8"
    fill="#0A0A1A"
  >Agentic</text>

  <!-- Divider rule -->
  <line x1="132" y1="95" x2="286" y2="95" stroke="#E0E4F0" stroke-width="1"/>

  <!-- "Lead" in blue -->
  <text
    x="132"
    y="118"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="24"
    font-weight="300"
    letter-spacing="0.5"
    fill="#0052FF"
  >Lead</text>

  <!-- "Gen" in coral red -->
  <text
    x="196"
    y="118"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="24"
    font-weight="300"
    letter-spacing="0.5"
    fill="#FF3B30"
  > Gen</text>

  <!-- Tagline -->
  <text
    x="132"
    y="138"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="8"
    font-weight="500"
    letter-spacing="2.5"
    fill="#9999BB"
  >PRECISION  ·  PIPELINE  ·  AI</text>

</svg>
