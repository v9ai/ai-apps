[project]
name = "leadgen-agent"
version = "0.1.0"
description = "LangGraph backend for lead-gen email composition, replies, admin chat, and text-to-SQL"
requires-python = ">=3.12"
dependencies = [
    "langchain>=0.3",
    "langchain-openai>=0.3",
    "langchain-core>=0.3",
    "langgraph>=0.4",
    "pydantic>=2.0",
    "python-dotenv>=1.0.0",
    "psycopg[binary]>=3.2",
]

[build-system]
requires = ["setuptools>=73.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["leadgen_agent*"]

[dependency-groups]
dev = ["langgraph-cli[inmem]>=0.4.14", "pytest>=8.0", "pytest-asyncio>=0.23"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
