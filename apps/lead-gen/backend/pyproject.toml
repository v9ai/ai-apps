[project]
name = "leadgen-agent"
version = "0.1.0"
description = "LangGraph backend for lead-gen email composition, replies, admin chat, and text-to-SQL"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "langchain>=0.3",
    "langchain-openai>=0.3",
    "langchain-core>=0.3",
    "langchain-community>=0.3",
    "langgraph>=0.4",
    "langgraph-checkpoint-postgres>=2.0",
    "pydantic>=2.0",
    "python-dotenv>=1.0.0",
    "psycopg[binary,pool]>=3.2",
    "httpx>=0.27",
    "beautifulsoup4>=4.12",
    "lxml>=5.3",
    "playwright>=1.48",
    "unstructured[html]>=0.16",
    "json-repair>=0.59.4",
    "rapidfuzz>=3.14",
    "research-client @ file:///Users/vadimnicolai/Public/ai-apps/pypackages/research",
    "aiosmtplib>=5.1.0",
    "dnspython>=2.8.0",
    "numpy>=2.4.4",
    "warcio>=1.8.1",
]

[project.optional-dependencies]
# ML deps (torch / transformers / sentence-transformers) ~3 GB compressed.
# Only the `ml` CF Container installs them — core and research stay lean.
# `pip install -e .[ml]` on the user's Mac when running jobbert_infer or
# scripts/bge_m3_server.py locally.
ml = [
    "sentence-transformers>=5.4.1",
    "transformers>=5.5.4",
    "torch>=2.11.0",
]
# Docling is ~1GB of IBM models; opt-in only when image budget allows.
# `pip install -e .[docling]` to enable richer markdown in competitor_loader.
docling = ["docling>=2.0"]

[build-system]
requires = ["setuptools>=73.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["leadgen_agent*"]

[dependency-groups]
dev = [
    "langgraph-cli[inmem]>=0.4.14",
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "deepeval>=1.4",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "hypothesis: property-based tests using the Hypothesis library",
    "live: live e2e probes against a deployed LangGraph URL — gated by RUN_LIVE_E2E=1",
]
