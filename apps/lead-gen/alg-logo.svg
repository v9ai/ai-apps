<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <!-- Dark navy starfield background -->
    <radialGradient id="bgGrad" cx="70%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0f1c3a"/>
      <stop offset="100%" stop-color="#060d1f"/>
    </radialGradient>

    <!-- Target star glow -->
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8e7" stop-opacity="1"/>
      <stop offset="25%" stop-color="#ffd060" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#ff8c00" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff4400" stop-opacity="0"/>
    </radialGradient>

    <!-- Brass telescope body -->
    <linearGradient id="brassBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0d060"/>
      <stop offset="30%" stop-color="#f8e07a"/>
      <stop offset="55%" stop-color="#c8a020"/>
      <stop offset="80%" stop-color="#ddb830"/>
      <stop offset="100%" stop-color="#9a7010"/>
    </linearGradient>

    <linearGradient id="brassBarrel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8c030"/>
      <stop offset="35%" stop-color="#f8e070"/>
      <stop offset="65%" stop-color="#c09018"/>
      <stop offset="100%" stop-color="#8a6008"/>
    </linearGradient>

    <linearGradient id="brassObjective" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d0a828"/>
      <stop offset="50%" stop-color="#f0cc50"/>
      <stop offset="100%" stop-color="#886010"/>
    </linearGradient>

    <!-- Eyepiece lens -->
    <radialGradient id="eyeLens" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#8ad8f0" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#1a5878" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#081828" stop-opacity="1"/>
    </radialGradient>

    <!-- Objective lens -->
    <radialGradient id="objLens" cx="42%" cy="30%" r="58%">
      <stop offset="0%" stop-color="#a8e0f8" stop-opacity="0.7"/>
      <stop offset="45%" stop-color="#1e6888" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#081820" stop-opacity="1"/>
    </radialGradient>

    <!-- Dew shield -->
    <linearGradient id="dew" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c0900c"/>
      <stop offset="50%" stop-color="#e0b828"/>
      <stop offset="100%" stop-color="#785006"/>
    </linearGradient>

    <!-- Tripod -->
    <linearGradient id="tripod" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d0a828"/>
      <stop offset="100%" stop-color="#785010"/>
    </linearGradient>

    <!-- Light beam -->
    <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd060" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#ffd060" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#fff4c0" stop-opacity="0.18"/>
    </linearGradient>

    <!-- ALG text gradient -->
    <linearGradient id="algText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8e07a"/>
      <stop offset="100%" stop-color="#c8a020"/>
    </linearGradient>

    <!-- Star glow filter -->
    <filter id="glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="6" result="b1"/>
      <feGaussianBlur stdDeviation="3" result="b2"/>
      <feGaussianBlur stdDeviation="1" result="b3"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="b3"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft metal sheen -->
    <filter id="metalSheen" x="-5%" y="-15%" width="110%" height="130%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="200" fill="url(#bgGrad)" rx="10"/>

  <!-- Stars -->
  <g>
    <circle cx="14"  cy="12"  r="0.7" fill="#fff" opacity="0.65"/>
    <circle cx="38"  cy="8"   r="1.1" fill="#fff" opacity="0.85"/>
    <circle cx="62"  cy="18"  r="0.6" fill="#e8f0ff" opacity="0.55"/>
    <circle cx="82"  cy="7"   r="0.9" fill="#fff" opacity="0.75"/>
    <circle cx="105" cy="20"  r="0.7" fill="#ffeedd" opacity="0.6"/>
    <circle cx="128" cy="10"  r="0.8" fill="#fff" opacity="0.7"/>
    <circle cx="152" cy="16"  r="0.6" fill="#e0e8ff" opacity="0.55"/>
    <circle cx="174" cy="8"   r="1.0" fill="#fff" opacity="0.8"/>
    <circle cx="196" cy="22"  r="0.7" fill="#fff8e8" opacity="0.6"/>
    <circle cx="218" cy="12"  r="0.8" fill="#fff" opacity="0.72"/>
    <circle cx="244" cy="25"  r="0.6" fill="#e8e8ff" opacity="0.5"/>
    <circle cx="268" cy="14"  r="1.0" fill="#fff" opacity="0.78"/>
    <circle cx="285" cy="30"  r="0.7" fill="#fff" opacity="0.6"/>
    <circle cx="20"  cy="42"  r="0.8" fill="#fff" opacity="0.55"/>
    <circle cx="48"  cy="50"  r="0.6" fill="#e0eeff" opacity="0.5"/>
    <circle cx="70"  cy="35"  r="0.7" fill="#fff" opacity="0.62"/>
    <circle cx="95"  cy="46"  r="0.5" fill="#ffeedd" opacity="0.5"/>
    <circle cx="122" cy="38"  r="0.9" fill="#fff" opacity="0.68"/>
    <circle cx="148" cy="44"  r="0.5" fill="#fff" opacity="0.48"/>
    <circle cx="232" cy="36"  r="0.6" fill="#fff8e8" opacity="0.55"/>
    <circle cx="270" cy="42"  r="0.7" fill="#fff" opacity="0.6"/>
    <circle cx="285" cy="52"  r="0.5" fill="#e8e8ff" opacity="0.5"/>
    <circle cx="18"  cy="80"  r="0.6" fill="#fff" opacity="0.4"/>
    <circle cx="10"  cy="105" r="0.7" fill="#e0eeff" opacity="0.38"/>
    <circle cx="22"  cy="125" r="0.5" fill="#fff" opacity="0.35"/>
    <!-- Bright accent stars -->
    <circle cx="52"  cy="14"  r="1.4" fill="#fff" opacity="0.92"/>
    <circle cx="190" cy="30"  r="1.2" fill="#ffeedd" opacity="0.82"/>
    <circle cx="280" cy="20"  r="1.3" fill="#fff" opacity="0.88"/>
    <circle cx="110" cy="30"  r="1.1" fill="#e8f0ff" opacity="0.78"/>
  </g>

  <!-- Light beam cone from objective toward star -->
  <polygon points="244,68 244,76 278,62 278,58" fill="url(#beam)" opacity="0.55"/>

  <!-- Target star halo rings -->
  <circle cx="282" cy="58" r="30" fill="url(#starGlow)" opacity="0.28"/>
  <circle cx="282" cy="58" r="18" fill="url(#starGlow)" opacity="0.38"/>
  <circle cx="282" cy="58" r="9"  fill="url(#starGlow)" opacity="0.5"/>

  <!-- Target star -->
  <g filter="url(#glow)">
    <g transform="translate(282,58)">
      <polygon points="0,-11 2.2,-2.2 11,0 2.2,2.2 0,11 -2.2,2.2 -11,0 -2.2,-2.2"
        fill="#ffe890" opacity="0.92"/>
      <circle r="4.5" fill="#fff8e0" opacity="1"/>
      <circle r="2.2" fill="#ffffff" opacity="1"/>
    </g>
  </g>

  <!-- Targeting reticle -->
  <g transform="translate(282,58)" stroke="#ffd060" stroke-width="0.75" fill="none" opacity="0.65">
    <circle r="15" stroke-dasharray="3,3.5"/>
    <line x1="-20" y1="0"   x2="-16" y2="0"/>
    <line x1="16"  y1="0"   x2="20"  y2="0"/>
    <line x1="0"   y1="-20" x2="0"   y2="-16"/>
    <line x1="0"   y1="16"  x2="0"   y2="20"/>
  </g>

  <!-- ===== TELESCOPE ===== -->
  <g filter="url(#metalSheen)">

    <!-- Tripod legs -->
    <line x1="130" y1="115" x2="100" y2="152" stroke="url(#tripod)" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="130" y1="115" x2="160" y2="152" stroke="url(#tripod)" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="130" y1="115" x2="130" y2="154" stroke="url(#tripod)" stroke-width="2.6" stroke-linecap="round"/>
    <!-- Spreader brace -->
    <line x1="106" y1="140" x2="154" y2="140" stroke="url(#tripod)" stroke-width="1.8" stroke-linecap="round" opacity="0.65"/>

    <!-- Pivot mount head -->
    <ellipse cx="130" cy="113" rx="7.5" ry="5.5" fill="url(#brassBody)" stroke="#906808" stroke-width="0.9"/>
    <ellipse cx="130" cy="113" rx="4"   ry="2.8" fill="#d8b030" opacity="0.6"/>

    <!-- Barrel group rotated -25 deg -->
    <g transform="rotate(-25, 130, 112)">

      <!-- Main barrel tube -->
      <rect x="127" y="105" width="120" height="15" rx="3.5"
        fill="url(#brassBarrel)" stroke="#886008" stroke-width="0.9"/>

      <!-- Top highlight -->
      <rect x="127" y="105" width="120" height="5" rx="2"
        fill="#f8e07a" opacity="0.28"/>

      <!-- Band rings -->
      <rect x="168" y="105" width="5" height="15" rx="1.2"
        fill="#b89018" opacity="0.55"/>
      <rect x="200" y="105" width="5" height="15" rx="1.2"
        fill="#b89018" opacity="0.55"/>

      <!-- Focus knob -->
      <rect x="176" y="99" width="13" height="9" rx="2.5"
        fill="url(#brassBody)" stroke="#886008" stroke-width="0.8"/>
      <line x1="179" y1="99" x2="179" y2="108" stroke="#886008" stroke-width="0.65"/>
      <line x1="182" y1="99" x2="182" y2="108" stroke="#886008" stroke-width="0.65"/>
      <line x1="185" y1="99" x2="185" y2="108" stroke="#886008" stroke-width="0.65"/>

      <!-- Eyepiece drawtube -->
      <rect x="107" y="108" width="22" height="9" rx="2.5"
        fill="url(#brassBody)" stroke="#886008" stroke-width="0.8"/>

      <!-- Eyepiece rubber cap -->
      <ellipse cx="108" cy="112.5" rx="5.5" ry="6.5"
        fill="#1a1a22" stroke="#c8a020" stroke-width="1.1"/>
      <!-- Eyepiece lens -->
      <ellipse cx="108" cy="112.5" rx="4"   ry="5"
        fill="url(#eyeLens)"/>
      <!-- Lens flare -->
      <ellipse cx="106" cy="109.5" rx="1.8" ry="1.2"
        fill="#b0e4f8" opacity="0.42" transform="rotate(-15,106,109.5)"/>

      <!-- Dew shield at front -->
      <rect x="243" y="102" width="10" height="21" rx="2"
        fill="url(#dew)" stroke="#664400" stroke-width="0.8"/>

      <!-- Objective cell ring -->
      <ellipse cx="247" cy="112.5" rx="6"   ry="11.5"
        fill="url(#brassObjective)" stroke="#886008" stroke-width="1.1"/>
      <!-- Objective lens glass -->
      <ellipse cx="247" cy="112.5" rx="4.5" ry="9.5"
        fill="url(#objLens)"/>
      <!-- Objective flare -->
      <ellipse cx="244" cy="107" rx="1.8" ry="1.3"
        fill="#b0e0f8" opacity="0.4" transform="rotate(-12,244,107)"/>

    </g>
  </g>

  <!-- ===== ALG MONOGRAM ===== -->
  <text
    x="150" y="177"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="27" font-weight="700" letter-spacing="7"
    fill="url(#algText)"
    text-anchor="middle" dominant-baseline="middle">ALG</text>

  <!-- Tagline -->
  <text
    x="150" y="192"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="6.5" font-weight="400" letter-spacing="3.8"
    fill="#6888b0" opacity="0.85"
    text-anchor="middle" dominant-baseline="middle">AGENTIC LEAD GEN</text>

  <!-- Rule line -->
  <line x1="58" y1="160" x2="242" y2="160"
    stroke="#1e3a6a" stroke-width="0.7" opacity="0.55"/>
  <circle cx="58"  cy="160" r="1.2" fill="#c8a020" opacity="0.55"/>
  <circle cx="242" cy="160" r="1.2" fill="#c8a020" opacity="0.55"/>
</svg>
