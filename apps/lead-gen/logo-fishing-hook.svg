<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d2d5e"/>
    </linearGradient>
    <linearGradient id="hookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="streamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#bae6fd"/>
      <stop offset="60%" stop-color="#38bdf8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="fishGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="fishGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="fishGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hookGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fishShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0ea5e9" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="200" rx="16" ry="16" fill="url(#bgGrad)"/>

  <!-- Subtle data grid -->
  <g opacity="0.06" stroke="#38bdf8" stroke-width="0.5">
    <line x1="0" y1="40" x2="300" y2="40"/>
    <line x1="0" y1="80" x2="300" y2="80"/>
    <line x1="0" y1="120" x2="300" y2="120"/>
    <line x1="0" y1="160" x2="300" y2="160"/>
    <line x1="60" y1="0" x2="60" y2="200"/>
    <line x1="120" y1="0" x2="120" y2="200"/>
    <line x1="180" y1="0" x2="180" y2="200"/>
    <line x1="240" y1="0" x2="240" y2="200"/>
  </g>

  <!-- ====== HOOK EYE / SPOOL ====== -->
  <circle cx="105" cy="22" r="7.5" fill="none" stroke="#38bdf8" stroke-width="2.5" filter="url(#hookGlow)"/>
  <circle cx="105" cy="22" r="3.5" fill="#38bdf8" opacity="0.9"/>

  <!-- ====== FISHING LINE TRANSITIONING TO DATA STREAM ====== -->
  <!-- Solid top line -->
  <line x1="105" y1="30" x2="105" y2="44" stroke="#bae6fd" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Dashed break (line becoming data) -->
  <line x1="105" y1="44" x2="105" y2="58" stroke="#7dd3fc" stroke-width="2" stroke-dasharray="3 3" stroke-linecap="round" opacity="0.8"/>
  <!-- Data dot stream -->
  <g filter="url(#glow)">
    <circle cx="105" cy="63" r="2.2" fill="#38bdf8"/>
    <circle cx="105" cy="71" r="1.7" fill="#7dd3fc" opacity="0.8"/>
    <circle cx="105" cy="78" r="2.2" fill="#38bdf8"/>
    <circle cx="105" cy="85" r="1.7" fill="#7dd3fc" opacity="0.7"/>
  </g>
  <!-- Binary labels -->
  <g font-family="'Courier New', monospace" font-size="5.5" fill="#38bdf8" opacity="0.55">
    <text x="110" y="64">01</text>
    <text x="110" y="72">10</text>
    <text x="110" y="79">11</text>
    <text x="110" y="86">00</text>
  </g>

  <!-- ====== HOOK SHAFT + CURVE + BARB ====== -->
  <line x1="105" y1="89" x2="105" y2="127" stroke="url(#hookGrad)" stroke-width="4.5" stroke-linecap="round" filter="url(#hookGlow)"/>
  <path d="M105,127 Q105,151 88,151 Q70,151 70,132 Q70,118 83,115" fill="none" stroke="url(#hookGrad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#hookGlow)"/>
  <path d="M83,115 L76,125" stroke="url(#hookGrad)" stroke-width="3.5" stroke-linecap="round" filter="url(#hookGlow)"/>

  <!-- ====== FISH 1 — main catch (green, hooked) ====== -->
  <g transform="translate(83,129) rotate(-18)" filter="url(#fishShadow)">
    <ellipse cx="0" cy="0" rx="21" ry="9.5" fill="url(#fishGrad1)"/>
    <polygon points="-21,0 -33,-9 -33,9" fill="#059669" opacity="0.9"/>
    <circle cx="13" cy="-2.5" r="3.2" fill="white"/>
    <circle cx="14.2" cy="-2.5" r="1.6" fill="#064e3b"/>
    <path d="M-2,-9.5 Q3,-18 11,-9.5" fill="#34d399" opacity="0.65"/>
    <ellipse cx="3" cy="-3" rx="5.5" ry="2.5" fill="white" opacity="0.18"/>
    <path d="M2,3 Q5,0 8,3" fill="none" stroke="#059669" stroke-width="0.8" opacity="0.5"/>
    <path d="M-4,3 Q-1,0 2,3" fill="none" stroke="#059669" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- ====== FISH 2 — approaching (purple) ====== -->
  <g transform="translate(50,97) rotate(12)" filter="url(#fishShadow)" opacity="0.88">
    <ellipse cx="0" cy="0" rx="15" ry="6.5" fill="url(#fishGrad2)"/>
    <polygon points="-15,0 -23,-7 -23,7" fill="#7c3aed" opacity="0.85"/>
    <circle cx="9" cy="-1.5" r="2.2" fill="white"/>
    <circle cx="10" cy="-1.5" r="1.1" fill="#3b0764"/>
    <path d="M-2,-6.5 Q2,-12 7,-6.5" fill="#a78bfa" opacity="0.6"/>
    <ellipse cx="2" cy="-2" rx="3.5" ry="1.7" fill="white" opacity="0.18"/>
  </g>

  <!-- ====== FISH 3 — distant swimmer (gold) ====== -->
  <g transform="translate(45,148) rotate(7)" filter="url(#fishShadow)" opacity="0.75">
    <ellipse cx="0" cy="0" rx="12" ry="5.5" fill="url(#fishGrad3)"/>
    <polygon points="-12,0 -19,-6 -19,6" fill="#d97706" opacity="0.85"/>
    <circle cx="7.5" cy="-1.2" r="1.9" fill="white"/>
    <circle cx="8.5" cy="-1.2" r="0.95" fill="#78350f"/>
    <ellipse cx="2" cy="-1.5" rx="2.8" ry="1.3" fill="white" opacity="0.18"/>
  </g>

  <!-- ====== AMBIENT DATA PARTICLES ====== -->
  <g fill="#38bdf8">
    <circle cx="142" cy="52" r="1.5" opacity="0.5"/>
    <circle cx="150" cy="44" r="1" opacity="0.4"/>
    <circle cx="136" cy="42" r="1.2" opacity="0.45"/>
    <circle cx="155" cy="58" r="1.5" opacity="0.4"/>
    <circle cx="146" cy="68" r="1" opacity="0.35"/>
    <circle cx="28" cy="72" r="1.5" opacity="0.45"/>
    <circle cx="36" cy="62" r="1" opacity="0.4"/>
    <circle cx="20" cy="83" r="1.5" opacity="0.4"/>
    <circle cx="32" cy="88" r="1" opacity="0.35"/>
  </g>

  <!-- Hex data node badges -->
  <g stroke="#0ea5e9" stroke-width="1" fill="none" opacity="0.35">
    <polygon points="147,28 151,21 159,21 163,28 159,35 151,35"/>
    <polygon points="26,52 30,45 38,45 42,52 38,59 30,59"/>
  </g>
  <text x="155" y="32" font-family="'Courier New', monospace" font-size="5" fill="#7dd3fc" opacity="0.65" text-anchor="middle">AI</text>
  <text x="34" y="56" font-family="'Courier New', monospace" font-size="5" fill="#7dd3fc" opacity="0.65" text-anchor="middle">ML</text>

  <!-- ====== WATER SURFACE WAVES ====== -->
  <path d="M0,160 Q25,153 50,160 Q75,167 100,160 Q125,153 150,160 Q175,167 200,160 Q225,153 250,160 Q275,167 300,160" fill="none" stroke="#1e40af" stroke-width="1.2" opacity="0.35"/>
  <path d="M0,166 Q30,159 60,166 Q90,173 120,166 Q150,159 180,166 Q210,173 240,166 Q270,159 300,166" fill="none" stroke="#1e40af" stroke-width="0.8" opacity="0.2"/>

  <!-- ====== BRAND TYPOGRAPHY ====== -->
  <text x="168" y="100" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="23" font-weight="700" fill="url(#textGrad)" letter-spacing="-0.5" filter="url(#glow)">Agentic</text>
  <text x="168" y="124" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="17.5" font-weight="400" fill="#7dd3fc" letter-spacing="1">Lead Gen</text>
  <line x1="168" y1="130" x2="292" y2="130" stroke="#1e40af" stroke-width="0.8" opacity="0.55"/>
  <text x="168" y="142" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="8" font-weight="300" fill="#38bdf8" letter-spacing="2.2" opacity="0.72">CATCH · ENRICH · CONVERT</text>

  <!-- ====== MINI BAR CHART ====== -->
  <g transform="translate(175,153)" opacity="0.5">
    <rect x="0" y="13" width="7" height="8" rx="1" fill="#0ea5e9"/>
    <rect x="10" y="9" width="7" height="12" rx="1" fill="#38bdf8"/>
    <rect x="20" y="5" width="7" height="16" rx="1" fill="#7dd3fc"/>
    <rect x="30" y="10" width="7" height="11" rx="1" fill="#38bdf8"/>
    <rect x="40" y="2" width="7" height="19" rx="1" fill="#bae6fd"/>
    <polyline points="3,21 13,17 23,13 33,14 47,7" fill="none" stroke="#34d399" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="47" cy="7" r="2" fill="#34d399"/>
  </g>
</svg>
