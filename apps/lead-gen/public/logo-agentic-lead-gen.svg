<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" fill="#ffffff"/>

  <!-- ============================================================
       UNIFIED MARK — THE FINAL FORM
       Concept: person silhouette + circuit node + forward arrow
       All fused into one bold geometric icon
       Electric blue #0066FF on white
  ============================================================ -->

  <!-- HEAD: filled circle — the human/lead element -->
  <circle cx="150" cy="43" r="14" fill="#0066ff"/>

  <!-- TORSO: clean upright rectangle, rounded corners -->
  <rect x="134" y="61" width="32" height="30" rx="5" fill="#0066ff"/>

  <!-- AI NODE INDICATOR: white outer ring + blue inner dot on torso -->
  <circle cx="150" cy="76" r="5.5" fill="#ffffff"/>
  <circle cx="150" cy="76" r="2.2" fill="#0066ff"/>

  <!-- LEFT CIRCUIT ARM -->
  <line x1="134" y1="76" x2="114" y2="76" stroke="#0066ff" stroke-width="3" stroke-linecap="round"/>
  <circle cx="107" cy="76" r="6.5" fill="none" stroke="#0066ff" stroke-width="2.5"/>
  <circle cx="107" cy="76" r="2.5" fill="#0066ff"/>

  <!-- RIGHT CIRCUIT ARM -->
  <line x1="166" y1="76" x2="186" y2="76" stroke="#0066ff" stroke-width="3" stroke-linecap="round"/>
  <circle cx="193" cy="76" r="6.5" fill="none" stroke="#0066ff" stroke-width="2.5"/>
  <circle cx="193" cy="76" r="2.5" fill="#0066ff"/>

  <!-- FORWARD ARROW: shaft + bold arrowhead, right-pointing -->
  <rect x="134" y="91" width="32" height="12" rx="2" fill="#0055ee"/>
  <polygon points="166,85 189,97 166,109" fill="#0044cc"/>

  <!-- ============================================================
       WORDMARK
  ============================================================ -->
  <text
    x="150"
    y="132"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, Helvetica, sans-serif"
    font-size="15.5"
    font-weight="800"
    letter-spacing="4"
    fill="#0066ff"
  >AGENTIC LEAD GEN</text>

  <!-- Hairline rule under wordmark -->
  <line x1="86" y1="140" x2="214" y2="140" stroke="#0066ff" stroke-width="0.7" opacity="0.2"/>
</svg>
