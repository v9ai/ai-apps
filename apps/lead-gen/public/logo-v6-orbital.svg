<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 140" width="300" height="140">
  <title>Agentic Lead Gen</title>
  <defs>
    <!-- Background gradient -->
    <linearGradient id="orb-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020818"/>
      <stop offset="50%" stop-color="#061030"/>
      <stop offset="100%" stop-color="#040c20"/>
    </linearGradient>

    <!-- Core radial glow -->
    <radialGradient id="orb-core-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#66ffee" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#1199aa" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#061030" stop-opacity="0"/>
    </radialGradient>

    <!-- Core inner gradient -->
    <radialGradient id="orb-core-inner" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#aaffee"/>
      <stop offset="35%" stop-color="#33ddcc"/>
      <stop offset="70%" stop-color="#0099aa"/>
      <stop offset="100%" stop-color="#005566"/>
    </radialGradient>

    <!-- Agent node gradients -->
    <radialGradient id="orb-node-1" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#88ffee"/>
      <stop offset="100%" stop-color="#33bbcc"/>
    </radialGradient>
    <radialGradient id="orb-node-2" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#99ddff"/>
      <stop offset="100%" stop-color="#3388dd"/>
    </radialGradient>
    <radialGradient id="orb-node-3" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#ccbbff"/>
      <stop offset="100%" stop-color="#7755cc"/>
    </radialGradient>
    <radialGradient id="orb-node-4" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#77eebb"/>
      <stop offset="100%" stop-color="#22aa77"/>
    </radialGradient>
    <radialGradient id="orb-node-5" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#ffbb88"/>
      <stop offset="100%" stop-color="#cc7733"/>
    </radialGradient>

    <!-- Orbit path gradients -->
    <linearGradient id="orb-path-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#33ddcc" stop-opacity="0.05"/>
      <stop offset="30%" stop-color="#33ddcc" stop-opacity="0.45"/>
      <stop offset="70%" stop-color="#33ddcc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#33ddcc" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="orb-path-2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5599ff" stop-opacity="0.08"/>
      <stop offset="40%" stop-color="#5599ff" stop-opacity="0.4"/>
      <stop offset="80%" stop-color="#5599ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#5599ff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="orb-path-3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9977dd" stop-opacity="0.06"/>
      <stop offset="25%" stop-color="#9977dd" stop-opacity="0.35"/>
      <stop offset="65%" stop-color="#9977dd" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#9977dd" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="orb-path-4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#44cc88" stop-opacity="0.05"/>
      <stop offset="35%" stop-color="#44cc88" stop-opacity="0.35"/>
      <stop offset="75%" stop-color="#44cc88" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#44cc88" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="orb-path-5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ee9944" stop-opacity="0.04"/>
      <stop offset="30%" stop-color="#ee9944" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#ee9944" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#ee9944" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="orb-glow-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="orb-glow-core" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b1"/>
      <feGaussianBlur stdDeviation="12" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="orb-glow-node" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="orb-glow-trail" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="orb-glow-ambient" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>

    <!-- Connection line gradient -->
    <linearGradient id="orb-conn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#33ddcc" stop-opacity="0"/>
      <stop offset="50%" stop-color="#33ddcc" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#33ddcc" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="140" fill="url(#orb-bg)" rx="4"/>

  <!-- Subtle star field -->
  <circle cx="22"  cy="18"  r="0.6" fill="white" opacity="0.4"/>
  <circle cx="55"  cy="32"  r="0.4" fill="white" opacity="0.25"/>
  <circle cx="275" cy="15"  r="0.7" fill="white" opacity="0.45"/>
  <circle cx="255" cy="52"  r="0.4" fill="white" opacity="0.3"/>
  <circle cx="288" cy="82"  r="0.5" fill="white" opacity="0.35"/>
  <circle cx="30"  cy="72"  r="0.4" fill="white" opacity="0.25"/>
  <circle cx="16"  cy="125" r="0.6" fill="white" opacity="0.35"/>
  <circle cx="270" cy="118" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="78"  cy="12"  r="0.5" fill="white" opacity="0.3"/>
  <circle cx="240" cy="130" r="0.4" fill="white" opacity="0.25"/>
  <circle cx="42"  cy="108" r="0.5" fill="white" opacity="0.3"/>
  <circle cx="195" cy="10"  r="0.4" fill="white" opacity="0.2"/>

  <!-- Ambient core glow (large, soft) -->
  <circle cx="150" cy="70" r="45" fill="#22ccbb" opacity="0.06" filter="url(#orb-glow-ambient)"/>

  <!-- Core radial glow field -->
  <circle cx="150" cy="70" r="55" fill="url(#orb-core-glow)"/>

  <!-- ============================================ -->
  <!-- ORBITAL PATHS (back half - behind core)      -->
  <!-- Each orbit is an ellipse at a different tilt  -->
  <!-- ============================================ -->

  <!-- Orbit 1: Wide horizontal, slight tilt - BACK ARC -->
  <g opacity="0.4">
    <ellipse cx="150" cy="70" rx="120" ry="38"
      fill="none" stroke="url(#orb-path-1)" stroke-width="0.8"
      stroke-dasharray="4 3"
      transform="rotate(-8, 150, 70)"/>
  </g>

  <!-- Orbit 2: Medium, steeper tilt - BACK ARC -->
  <g opacity="0.35">
    <ellipse cx="150" cy="70" rx="95" ry="48"
      fill="none" stroke="url(#orb-path-2)" stroke-width="0.8"
      stroke-dasharray="5 4"
      transform="rotate(25, 150, 70)"/>
  </g>

  <!-- Orbit 3: Narrow, steep - BACK ARC -->
  <g opacity="0.3">
    <ellipse cx="150" cy="70" rx="75" ry="55"
      fill="none" stroke="url(#orb-path-3)" stroke-width="0.7"
      stroke-dasharray="3 4"
      transform="rotate(-35, 150, 70)"/>
  </g>

  <!-- Orbit 4: Very wide, nearly flat - BACK ARC -->
  <g opacity="0.3">
    <ellipse cx="150" cy="70" rx="110" ry="25"
      fill="none" stroke="url(#orb-path-4)" stroke-width="0.7"
      stroke-dasharray="6 5"
      transform="rotate(15, 150, 70)"/>
  </g>

  <!-- Orbit 5: Medium-tight, reverse angle - BACK ARC -->
  <g opacity="0.25">
    <ellipse cx="150" cy="70" rx="85" ry="42"
      fill="none" stroke="url(#orb-path-5)" stroke-width="0.6"
      stroke-dasharray="4 5"
      transform="rotate(-55, 150, 70)"/>
  </g>

  <!-- ============================================ -->
  <!-- CENTRAL CORE                                 -->
  <!-- ============================================ -->

  <!-- Core outer ring -->
  <circle cx="150" cy="70" r="16" fill="none" stroke="#33ccbb" stroke-width="0.6" opacity="0.3"/>

  <!-- Core body -->
  <circle cx="150" cy="70" r="12" fill="url(#orb-core-inner)" filter="url(#orb-glow-core)"/>

  <!-- Core inner highlight -->
  <circle cx="147" cy="66" r="5" fill="white" opacity="0.15"/>

  <!-- Core center bright spot -->
  <circle cx="150" cy="70" r="3.5" fill="#aaffee" opacity="0.5"/>

  <!-- Database/pipeline icon inside core (3 horizontal lines = data layers) -->
  <line x1="144" y1="66" x2="156" y2="66" stroke="white" stroke-width="1.2" opacity="0.6" stroke-linecap="round"/>
  <line x1="143" y1="70" x2="157" y2="70" stroke="white" stroke-width="1.2" opacity="0.7" stroke-linecap="round"/>
  <line x1="144" y1="74" x2="156" y2="74" stroke="white" stroke-width="1.2" opacity="0.6" stroke-linecap="round"/>

  <!-- ============================================ -->
  <!-- AGENT NODES on orbital paths                 -->
  <!-- Positioned using parametric ellipse coords   -->
  <!-- Each has: trail, glow halo, node sphere      -->
  <!-- ============================================ -->

  <!-- AGENT 1 (Orbit 1, ~315 degrees): Discovery Scout -->
  <!-- On orbit rx=120 ry=38 rotate=-8, at angle ~315deg -->
  <!-- x = 150 + 120*cos(315)*cos(-8) - 38*sin(315)*sin(-8) ~ 237 -->
  <!-- y = 70 + 120*cos(315)*sin(-8) + 38*sin(315)*cos(-8) ~ 44 -->
  <g>
    <!-- Motion trail -->
    <path d="M 227,39 Q 233,40 237,44" stroke="#33ddcc" stroke-width="2" fill="none"
      opacity="0.3" filter="url(#orb-glow-trail)" stroke-linecap="round"/>
    <!-- Connection to core (faint) -->
    <line x1="150" y1="70" x2="237" y2="44" stroke="#33ddcc" stroke-width="0.3" opacity="0.12"/>
    <!-- Glow halo -->
    <circle cx="237" cy="44" r="6" fill="#33ddcc" opacity="0.12" filter="url(#orb-glow-node)"/>
    <!-- Node -->
    <circle cx="237" cy="44" r="4" fill="url(#orb-node-1)" filter="url(#orb-glow-node)"/>
    <!-- Bright center -->
    <circle cx="236" cy="43" r="1.5" fill="white" opacity="0.8"/>
  </g>

  <!-- AGENT 2 (Orbit 2, ~135 degrees): Enrichment Specialist -->
  <!-- On orbit rx=95 ry=48 rotate=25, at angle ~135deg -->
  <!-- Approximate position after rotation: x~78, y~98 -->
  <g>
    <!-- Motion trail -->
    <path d="M 85,105 Q 81,102 78,98" stroke="#5599ff" stroke-width="2" fill="none"
      opacity="0.3" filter="url(#orb-glow-trail)" stroke-linecap="round"/>
    <!-- Connection to core -->
    <line x1="150" y1="70" x2="78" y2="98" stroke="#5599ff" stroke-width="0.3" opacity="0.12"/>
    <!-- Glow halo -->
    <circle cx="78" cy="98" r="6" fill="#5599ff" opacity="0.12" filter="url(#orb-glow-node)"/>
    <!-- Node -->
    <circle cx="78" cy="98" r="4" fill="url(#orb-node-2)" filter="url(#orb-glow-node)"/>
    <!-- Bright center -->
    <circle cx="77" cy="97" r="1.5" fill="white" opacity="0.8"/>
  </g>

  <!-- AGENT 3 (Orbit 3, ~60 degrees): Contact Hunter -->
  <!-- On orbit rx=75 ry=55 rotate=-35, at angle ~60deg -->
  <!-- Approximate position: x~195, y~30 -->
  <g>
    <!-- Motion trail -->
    <path d="M 203,25 Q 200,27 195,30" stroke="#9977dd" stroke-width="2" fill="none"
      opacity="0.3" filter="url(#orb-glow-trail)" stroke-linecap="round"/>
    <!-- Connection to core -->
    <line x1="150" y1="70" x2="195" y2="30" stroke="#9977dd" stroke-width="0.3" opacity="0.12"/>
    <!-- Glow halo -->
    <circle cx="195" cy="30" r="5.5" fill="#9977dd" opacity="0.12" filter="url(#orb-glow-node)"/>
    <!-- Node -->
    <circle cx="195" cy="30" r="3.5" fill="url(#orb-node-3)" filter="url(#orb-glow-node)"/>
    <!-- Bright center -->
    <circle cx="194" cy="29" r="1.3" fill="white" opacity="0.8"/>
  </g>

  <!-- AGENT 4 (Orbit 4, ~200 degrees): QA Auditor -->
  <!-- On orbit rx=110 ry=25 rotate=15, at angle ~200deg -->
  <!-- Approximate position: x~48, y~60 -->
  <g>
    <!-- Motion trail -->
    <path d="M 42,55 Q 44,57 48,60" stroke="#44cc88" stroke-width="1.8" fill="none"
      opacity="0.25" filter="url(#orb-glow-trail)" stroke-linecap="round"/>
    <!-- Connection to core -->
    <line x1="150" y1="70" x2="48" y2="60" stroke="#44cc88" stroke-width="0.3" opacity="0.1"/>
    <!-- Glow halo -->
    <circle cx="48" cy="60" r="5" fill="#44cc88" opacity="0.1" filter="url(#orb-glow-node)"/>
    <!-- Node -->
    <circle cx="48" cy="60" r="3.2" fill="url(#orb-node-4)" filter="url(#orb-glow-node)"/>
    <!-- Bright center -->
    <circle cx="47" cy="59" r="1.2" fill="white" opacity="0.75"/>
  </g>

  <!-- AGENT 5 (Orbit 5, ~270 degrees): Outreach Composer -->
  <!-- On orbit rx=85 ry=42 rotate=-55, at angle ~270deg -->
  <!-- Approximate position: x~116, y~112 -->
  <g>
    <!-- Motion trail -->
    <path d="M 122,119 Q 119,116 116,112" stroke="#ee9944" stroke-width="1.8" fill="none"
      opacity="0.25" filter="url(#orb-glow-trail)" stroke-linecap="round"/>
    <!-- Connection to core -->
    <line x1="150" y1="70" x2="116" y2="112" stroke="#ee9944" stroke-width="0.3" opacity="0.1"/>
    <!-- Glow halo -->
    <circle cx="116" cy="112" r="5" fill="#ee9944" opacity="0.1" filter="url(#orb-glow-node)"/>
    <!-- Node -->
    <circle cx="116" cy="112" r="3.2" fill="url(#orb-node-5)" filter="url(#orb-glow-node)"/>
    <!-- Bright center -->
    <circle cx="115" cy="111" r="1.2" fill="white" opacity="0.75"/>
  </g>

  <!-- ============================================ -->
  <!-- FOREGROUND ORBIT ARCS (in front of core)     -->
  <!-- Short arcs that cross over the core area     -->
  <!-- Creates depth illusion                       -->
  <!-- ============================================ -->

  <!-- Orbit 1 foreground arc segment -->
  <path d="M 60,92 Q 100,108 150,102 Q 200,96 240,85"
    fill="none" stroke="#33ddcc" stroke-width="1" opacity="0.2"
    stroke-linecap="round" filter="url(#orb-glow-trail)"/>

  <!-- Orbit 2 foreground arc segment -->
  <path d="M 200,105 Q 220,85 230,55"
    fill="none" stroke="#5599ff" stroke-width="0.9" opacity="0.18"
    stroke-linecap="round" filter="url(#orb-glow-trail)"/>

  <!-- Orbit 3 foreground arc segment -->
  <path d="M 95,115 Q 115,95 125,65"
    fill="none" stroke="#9977dd" stroke-width="0.8" opacity="0.15"
    stroke-linecap="round" filter="url(#orb-glow-trail)"/>

  <!-- ============================================ -->
  <!-- DATA PARTICLES along orbits                  -->
  <!-- Tiny dots suggesting data flowing to/from    -->
  <!-- ============================================ -->

  <!-- Particles near Agent 1 path -->
  <circle cx="218" cy="38" r="1" fill="#33ddcc" opacity="0.4" filter="url(#orb-glow-trail)"/>
  <circle cx="208" cy="35" r="0.7" fill="#33ddcc" opacity="0.25"/>
  <circle cx="250" cy="52" r="0.8" fill="#33ddcc" opacity="0.3"/>

  <!-- Particles near Agent 2 path -->
  <circle cx="92" cy="105" r="0.9" fill="#5599ff" opacity="0.35"/>
  <circle cx="100" cy="108" r="0.6" fill="#5599ff" opacity="0.2"/>
  <circle cx="65" cy="90" r="0.8" fill="#5599ff" opacity="0.3"/>

  <!-- Particles near Agent 3 path -->
  <circle cx="205" cy="26" r="0.7" fill="#9977dd" opacity="0.3"/>
  <circle cx="185" cy="35" r="0.6" fill="#9977dd" opacity="0.2"/>

  <!-- Particles near Agent 4 path -->
  <circle cx="38" cy="56" r="0.7" fill="#44cc88" opacity="0.25"/>
  <circle cx="58" cy="64" r="0.5" fill="#44cc88" opacity="0.2"/>

  <!-- Particles near Agent 5 path -->
  <circle cx="126" cy="118" r="0.7" fill="#ee9944" opacity="0.25"/>
  <circle cx="108" cy="105" r="0.5" fill="#ee9944" opacity="0.2"/>

  <!-- ============================================ -->
  <!-- INTER-AGENT COMMUNICATION ARCS               -->
  <!-- Faint curved lines between some agents       -->
  <!-- suggesting coordination                      -->
  <!-- ============================================ -->

  <!-- Agent 1 <-> Agent 3 -->
  <path d="M 237,44 Q 220,30 195,30"
    fill="none" stroke="white" stroke-width="0.3" opacity="0.08"
    stroke-dasharray="2 3"/>

  <!-- Agent 2 <-> Agent 5 -->
  <path d="M 78,98 Q 95,110 116,112"
    fill="none" stroke="white" stroke-width="0.3" opacity="0.08"
    stroke-dasharray="2 3"/>

  <!-- Agent 4 <-> Agent 2 -->
  <path d="M 48,60 Q 55,80 78,98"
    fill="none" stroke="white" stroke-width="0.3" opacity="0.06"
    stroke-dasharray="2 3"/>

  <!-- ============================================ -->
  <!-- PULSE RINGS from core (expanding)            -->
  <!-- ============================================ -->

  <circle cx="150" cy="70" r="22" fill="none" stroke="#33ccbb" stroke-width="0.4" opacity="0.15"/>
  <circle cx="150" cy="70" r="32" fill="none" stroke="#33ccbb" stroke-width="0.3" opacity="0.08"/>
  <circle cx="150" cy="70" r="44" fill="none" stroke="#33ccbb" stroke-width="0.2" opacity="0.04"/>

</svg>