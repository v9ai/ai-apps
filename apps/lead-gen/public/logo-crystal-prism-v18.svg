<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <!-- Deep dark background -->
    <radialGradient id="v18_bg" cx="25%" cy="50%" r="90%">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#080810"/>
    </radialGradient>

    <!-- Wide rainbow fan gradient — horizontal, spanning full height of the fan -->
    <linearGradient id="v18_fan_gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"    stop-color="#e8002e"/>
      <stop offset="16.6%" stop-color="#f57c00"/>
      <stop offset="33.3%" stop-color="#f5d800"/>
      <stop offset="50%"   stop-color="#22cc44"/>
      <stop offset="66.6%" stop-color="#00d4e8"/>
      <stop offset="83.3%" stop-color="#2255f5"/>
      <stop offset="100%"  stop-color="#9922ee"/>
    </linearGradient>

    <!-- Prism gradient (interior glass look) -->
    <linearGradient id="v18_prism_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#162050"/>
      <stop offset="60%" stop-color="#1e3070"/>
      <stop offset="100%" stop-color="#2a4090"/>
    </linearGradient>

    <!-- Fan edge fade mask — fades outer edges slightly -->
    <linearGradient id="v18_fan_opacity" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="5%" stop-color="white" stop-opacity="1"/>
      <stop offset="90%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.5"/>
    </linearGradient>

    <mask id="v18_fan_mask">
      <polygon points="138,100 300,10 300,190" fill="url(#v18_fan_opacity)"/>
    </mask>

    <!-- Glow for the prism -->
    <filter id="v18_prism_glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Fan glow/bloom -->
    <filter id="v18_fan_bloom" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="over"/>
    </filter>

    <!-- Soft inner glow on fan -->
    <filter id="v18_fan_soft" x="-2%" y="-2%" width="104%" height="104%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Incoming beam gradient -->
    <linearGradient id="v18_beam_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6688cc" stop-opacity="0"/>
      <stop offset="60%" stop-color="#8899dd" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#aabbff" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="200" fill="url(#v18_bg)"/>

  <!-- Subtle star field -->
  <circle cx="20" cy="15" r="0.8" fill="#ffffff" opacity="0.4"/>
  <circle cx="55" cy="8" r="0.6" fill="#ffffff" opacity="0.3"/>
  <circle cx="10" cy="55" r="0.7" fill="#ffffff" opacity="0.35"/>
  <circle cx="40" cy="170" r="0.8" fill="#ffffff" opacity="0.3"/>
  <circle cx="8" cy="130" r="0.6" fill="#ffffff" opacity="0.4"/>
  <circle cx="295" cy="40" r="0.7" fill="#ffffff" opacity="0.3"/>
  <circle cx="288" cy="165" r="0.8" fill="#ffffff" opacity="0.35"/>

  <!-- Incoming light beam (white/silver) -->
  <polygon points="0,97 0,103 138,101 138,99" fill="url(#v18_beam_grad)"/>
  <!-- Second beam layer for glow -->
  <polygon points="0,99 0,101 138,100.5 138,99.5" fill="#ccdaff" opacity="0.4"/>

  <!-- ===== WIDE GRADIENT FAN ===== -->
  <!-- Glow layer (blurred behind) -->
  <polygon points="138,100 300,10 300,190" fill="url(#v18_fan_gradient)" opacity="0.35" filter="url(#v18_fan_bloom)"/>

  <!-- Main fan shape with gradient fill -->
  <polygon points="138,100 300,10 300,190" fill="url(#v18_fan_gradient)" mask="url(#v18_fan_mask)" opacity="0.88" filter="url(#v18_fan_soft)"/>

  <!-- Fan overlay — second pass for richness -->
  <polygon points="138,100 300,10 300,190" fill="url(#v18_fan_gradient)" opacity="0.12"/>

  <!-- Fan edge lines (crisp boundary) -->
  <line x1="138" y1="100" x2="300" y2="10" stroke="#e8002e" stroke-width="0.8" opacity="0.6"/>
  <line x1="138" y1="100" x2="300" y2="190" stroke="#9922ee" stroke-width="0.8" opacity="0.6"/>

  <!-- Fan leading edge at right (subtle arc suggestion) -->
  <line x1="300" y1="10" x2="300" y2="190" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <!-- Prism body (on top of fan) -->
  <polygon points="72,42 138,100 72,158" fill="url(#v18_prism_grad)" stroke="#3a5aaa" stroke-width="1.8" filter="url(#v18_prism_glow)" opacity="0.95"/>

  <!-- Prism glass sheen — top face -->
  <polygon points="72,42 138,100 72,158" fill="none" stroke="#8aaae8" stroke-width="0.8" opacity="0.45"/>

  <!-- Prism face specular highlights -->
  <line x1="72" y1="42" x2="138" y2="100" stroke="#c0d4ff" stroke-width="1.2" opacity="0.5"/>
  <line x1="138" y1="100" x2="72" y2="158" stroke="#7090cc" stroke-width="0.8" opacity="0.4"/>
  <line x1="72" y1="42" x2="72" y2="158" stroke="#4060aa" stroke-width="1.5" opacity="0.6"/>

  <!-- Interior refraction lines in prism -->
  <line x1="78" y1="100" x2="136" y2="100" stroke="#aac8ff" stroke-width="0.7" opacity="0.35"/>
  <line x1="88" y1="74" x2="136" y2="98" stroke="#aac8ff" stroke-width="0.5" opacity="0.28"/>
  <line x1="88" y1="126" x2="136" y2="102" stroke="#aac8ff" stroke-width="0.5" opacity="0.28"/>

  <!-- Exit point glow at prism tip (where fan emerges) -->
  <circle cx="138" cy="100" r="4" fill="#ffffff" opacity="0.7"/>
  <circle cx="138" cy="100" r="8" fill="#ffffff" opacity="0.15"/>
  <circle cx="138" cy="100" r="14" fill="#aaccff" opacity="0.08"/>

  <!-- ===== TYPOGRAPHY ===== -->
  <!-- Main title -->
  <text x="75" y="183" font-family="'Arial', 'Helvetica', sans-serif" font-size="13" font-weight="800" fill="#ffffff" letter-spacing="4" text-anchor="middle" opacity="0.95">AGENTIC</text>

  <!-- Sub title -->
  <text x="75" y="194" font-family="'Arial', 'Helvetica', sans-serif" font-size="7.5" font-weight="300" fill="#6688cc" letter-spacing="5" text-anchor="middle" opacity="0.85">LEAD GEN</text>

  <!-- Crystal Prism caption (top left, subtle) -->
  <text x="75" y="16" font-family="'Arial', 'Helvetica', sans-serif" font-size="7" font-weight="300" fill="#4466aa" letter-spacing="2.5" text-anchor="middle" opacity="0.6">CRYSTAL PRISM</text>
</svg>
