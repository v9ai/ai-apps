<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 140" width="300" height="140">
  <title>Agentic Lead Gen</title>

  <!-- Deep space background -->
  <rect width="300" height="140" fill="#04060e" rx="4"/>

  <!--
    FACETED ORIGAMI BIRD-ARROW
    ===========================
    Forward-flying bird/arrow made of ~45 triangular facets.
    Beak points right. Wings sweep back and slightly up/down.
    Centered at x~150, y~55 in the viewbox.

    Color strategy:
    - Tail/wing tips: #06-#0c range (nearly black navy)
    - Mid wing: #0e-#18 range (dark navy)
    - Inner wing: #1a-#24 range (medium navy)
    - Body: #26-#32 range (rich blue)
    - Head/neck: #34-#40 range (bright blue)
    - Beak tip: #48-#5c range (bright cyan)
    - One gold accent: #d4a030
  -->

  <!-- ================================================================ -->
  <!-- TAIL — deepest navy, almost melting into background              -->
  <!-- ================================================================ -->
  <polygon points="32,55 44,42 52,55"  fill="#070e1c"/>
  <polygon points="32,55 52,55 44,68"  fill="#081020"/>
  <polygon points="44,42 58,35 52,55"  fill="#091224"/>
  <polygon points="44,68 52,55 58,75"  fill="#0a1326"/>

  <!-- ================================================================ -->
  <!-- LEFT WING UPPER — dark facets, shadow side                       -->
  <!-- ================================================================ -->
  <polygon points="58,35 88,22 75,42"  fill="#0b162c"/>
  <polygon points="75,42 88,22 105,32" fill="#0e1c36"/>
  <polygon points="75,42 105,32 92,48" fill="#112240"/>
  <polygon points="92,48 105,32 120,24" fill="#132848"/>
  <polygon points="92,48 120,24 118,44" fill="#162e52"/>

  <!-- ================================================================ -->
  <!-- LEFT WING LOWER — slightly lighter, catching ambient light       -->
  <!-- ================================================================ -->
  <polygon points="58,75 75,68 88,88"  fill="#0c1830"/>
  <polygon points="75,68 105,78 88,88" fill="#0f1e3a"/>
  <polygon points="75,68 92,62 105,78" fill="#122444"/>
  <polygon points="92,62 120,86 105,78" fill="#15294c"/>
  <polygon points="92,62 118,66 120,86" fill="#173054"/>

  <!-- ================================================================ -->
  <!-- LEFT WING CENTER — fold-line facets                              -->
  <!-- ================================================================ -->
  <polygon points="52,55 58,35 75,42"  fill="#0a1528"/>
  <polygon points="52,55 75,42 75,68"  fill="#0d1a34"/>
  <polygon points="75,42 92,48 75,68"  fill="#102040"/>
  <polygon points="75,68 92,48 92,62"  fill="#12264a"/>
  <polygon points="92,48 118,44 92,62" fill="#152c50"/>
  <polygon points="52,55 75,68 58,75"  fill="#0b1730"/>

  <!-- ================================================================ -->
  <!-- BODY — rich medium blues, the core mass                          -->
  <!-- ================================================================ -->
  <!-- Upper body -->
  <polygon points="118,44 120,24 148,20" fill="#1a3860"/>
  <polygon points="118,44 148,20 145,40" fill="#1e4270"/>

  <!-- *** GOLD ACCENT — single crest facet *** -->
  <polygon points="120,24 148,20 138,32" fill="#d4a030"/>

  <!-- Body center-top -->
  <polygon points="118,44 145,40 140,55" fill="#22507e"/>

  <!-- Body center — brightest body facet -->
  <polygon points="140,55 145,40 165,48" fill="#286098"/>

  <!-- Body center-bottom -->
  <polygon points="140,55 165,48 160,62" fill="#2c6aa5"/>

  <!-- Body lower half -->
  <polygon points="118,66 140,55 160,62" fill="#275c90"/>
  <polygon points="118,66 160,62 155,72" fill="#245688"/>
  <polygon points="118,66 92,62 140,55" fill="#1c4068"/>
  <polygon points="118,44 140,55 118,66" fill="#204a78"/>

  <!-- Lower body -->
  <polygon points="118,66 155,72 148,90" fill="#214c7a"/>
  <polygon points="118,66 148,90 120,86" fill="#1c4270"/>

  <!-- ================================================================ -->
  <!-- HEAD / NECK — bright blues, forward-facing surfaces              -->
  <!-- ================================================================ -->
  <!-- Upper neck -->
  <polygon points="145,40 148,20 180,30" fill="#1e4878"/>
  <polygon points="145,40 180,30 175,45" fill="#266098"/>
  <!-- Neck center — very bright -->
  <polygon points="145,40 175,45 165,48" fill="#3278b5"/>
  <!-- Neck-to-head -->
  <polygon points="165,48 175,45 190,50" fill="#3882c0"/>
  <polygon points="165,48 190,50 185,58" fill="#3c8cc8"/>
  <!-- Lower neck -->
  <polygon points="160,62 165,48 185,58" fill="#3580b8"/>
  <polygon points="160,62 185,58 190,66" fill="#3278b0"/>
  <!-- Lower head -->
  <polygon points="155,72 160,62 190,66" fill="#2c6aa0"/>
  <polygon points="155,72 190,66 180,80" fill="#28629a"/>
  <polygon points="155,72 180,80 148,90" fill="#245890"/>

  <!-- ================================================================ -->
  <!-- BEAK — the sharp convergent tip, brightest facets                -->
  <!-- ================================================================ -->
  <!-- Upper beak face -->
  <polygon points="190,50 218,55 185,58" fill="#48b0e0"/>
  <!-- Lower beak face -->
  <polygon points="185,58 218,55 190,66" fill="#3ea0d0"/>
  <!-- Beak tip highlight -->
  <polygon points="210,52 218,55 210,60" fill="#5cc8f0"/>
  <!-- Beak-to-wing bridge upper -->
  <polygon points="180,30 205,35 190,50" fill="#225488"/>
  <polygon points="190,50 205,35 218,55" fill="#2c6ca5"/>
  <!-- Beak-to-wing bridge lower -->
  <polygon points="180,80 205,82 190,66" fill="#225488"/>
  <polygon points="190,66 205,82 218,55" fill="#2c6ca5"/>

  <!-- ================================================================ -->
  <!-- RIGHT WING UPPER — forward sweep, medium-dark                    -->
  <!-- ================================================================ -->
  <polygon points="180,30 210,18 205,35" fill="#183c65"/>
  <polygon points="210,18 230,22 205,35" fill="#1a4270"/>
  <polygon points="205,35 230,22 225,40" fill="#1e4c7c"/>
  <polygon points="205,35 225,40 218,55" fill="#224e82"/>
  <!-- Wing tip upper -->
  <polygon points="230,22 248,28 225,40" fill="#143660"/>
  <polygon points="248,28 242,42 225,40" fill="#163c68"/>

  <!-- ================================================================ -->
  <!-- RIGHT WING LOWER — forward sweep, medium-dark                    -->
  <!-- ================================================================ -->
  <polygon points="180,80 210,92 205,82" fill="#183c65"/>
  <polygon points="210,92 230,88 205,82" fill="#1a4270"/>
  <polygon points="205,82 230,88 225,72" fill="#1e4c7c"/>
  <polygon points="205,82 225,72 218,55" fill="#224e82"/>
  <!-- Wing tip lower -->
  <polygon points="230,88 248,82 225,72" fill="#143660"/>
  <polygon points="248,82 242,68 225,72" fill="#163c68"/>

  <!-- ================================================================ -->
  <!-- DETACHED SPEED FRAGMENTS — behind tail                           -->
  <!-- ================================================================ -->
  <polygon points="18,50 24,47 22,54" fill="#08122a" opacity="0.45"/>
  <polygon points="16,60 22,57 20,64" fill="#070f24" opacity="0.35"/>
  <polygon points="24,38 30,35 28,42" fill="#091426" opacity="0.30"/>
  <polygon points="22,72 28,69 26,76" fill="#081220" opacity="0.25"/>

  <!-- ================================================================ -->
  <!-- CONVERGENCE PARTICLES — ahead of beak tip                        -->
  <!-- ================================================================ -->
  <polygon points="234,50 244,47 240,54" fill="#2878a8" opacity="0.28"/>
  <polygon points="238,58 248,56 244,62" fill="#3090c0" opacity="0.20"/>
  <polygon points="232,64 242,62 240,68" fill="#2470a0" opacity="0.24"/>

  <!-- Distant particles -->
  <polygon points="256,52 262,50 260,56" fill="#2070a0" opacity="0.12"/>
  <polygon points="254,60 260,58 258,64" fill="#2880a8" opacity="0.10"/>

  <!-- ================================================================ -->
  <!-- KEY CREASE HIGHLIGHTS — thin edges showing paper folds           -->
  <!-- ================================================================ -->
  <!-- Main horizontal spine -->
  <line x1="32" y1="55" x2="218" y2="55" stroke="#3898c8" stroke-width="0.35" opacity="0.12"/>

  <!-- Body crest line -->
  <line x1="118" y1="44" x2="190" y2="50" stroke="#48a8d8" stroke-width="0.4" opacity="0.18"/>

  <!-- Beak edges -->
  <line x1="190" y1="50" x2="218" y2="55" stroke="#60c8f0" stroke-width="0.5" opacity="0.28"/>
  <line x1="190" y1="66" x2="218" y2="55" stroke="#50b8e0" stroke-width="0.5" opacity="0.22"/>

  <!-- Gold accent edge -->
  <line x1="120" y1="24" x2="148" y2="20" stroke="#e8b840" stroke-width="0.4" opacity="0.30"/>

  <!-- Wing fold lines -->
  <line x1="52" y1="55" x2="118" y2="44" stroke="#2878a8" stroke-width="0.3" opacity="0.10"/>
  <line x1="52" y1="55" x2="118" y2="66" stroke="#2878a8" stroke-width="0.3" opacity="0.10"/>

  <!-- ================================================================ -->
  <!-- TEXT                                                              -->
  <!-- ================================================================ -->
  <text x="140" y="122" text-anchor="middle"
        font-family="'SF Pro Display','Inter',-apple-system,sans-serif"
        font-size="10.5" font-weight="600" letter-spacing="4.5"
        fill="#4898c8" opacity="0.75">
    AGENTIC LEAD GEN
  </text>

</svg>