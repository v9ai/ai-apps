<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <filter id="v4_glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="v4_rayGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="v4_topFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6ecc"/>
      <stop offset="100%" stop-color="#3a5aaa"/>
    </linearGradient>
    <linearGradient id="v4_leftFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a3f8e"/>
      <stop offset="100%" stop-color="#1e2e6e"/>
    </linearGradient>
    <linearGradient id="v4_rightFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#141e58"/>
      <stop offset="100%" stop-color="#0e1840"/>
    </linearGradient>
    <radialGradient id="v4_dotGrid" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a3f8e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#080e1a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="200" fill="#080e1a"/>

  <!-- Isometric grid dots -->
  <g opacity="0.25" fill="#3a5aaa">
    <!-- Row pattern of dots in isometric grid -->
    <circle cx="10" cy="20" r="1"/><circle cx="30" cy="20" r="1"/><circle cx="50" cy="20" r="1"/>
    <circle cx="70" cy="20" r="1"/><circle cx="90" cy="20" r="1"/><circle cx="110" cy="20" r="1"/>
    <circle cx="130" cy="20" r="1"/><circle cx="150" cy="20" r="1"/><circle cx="170" cy="20" r="1"/>
    <circle cx="190" cy="20" r="1"/><circle cx="210" cy="20" r="1"/><circle cx="230" cy="20" r="1"/>
    <circle cx="250" cy="20" r="1"/><circle cx="270" cy="20" r="1"/><circle cx="290" cy="20" r="1"/>
    <circle cx="20" cy="37" r="1"/><circle cx="40" cy="37" r="1"/><circle cx="60" cy="37" r="1"/>
    <circle cx="80" cy="37" r="1"/><circle cx="100" cy="37" r="1"/><circle cx="120" cy="37" r="1"/>
    <circle cx="140" cy="37" r="1"/><circle cx="160" cy="37" r="1"/><circle cx="180" cy="37" r="1"/>
    <circle cx="200" cy="37" r="1"/><circle cx="220" cy="37" r="1"/><circle cx="240" cy="37" r="1"/>
    <circle cx="260" cy="37" r="1"/><circle cx="280" cy="37" r="1"/>
    <circle cx="10" cy="54" r="1"/><circle cx="30" cy="54" r="1"/><circle cx="50" cy="54" r="1"/>
    <circle cx="70" cy="54" r="1"/><circle cx="90" cy="54" r="1"/><circle cx="110" cy="54" r="1"/>
    <circle cx="130" cy="54" r="1"/><circle cx="150" cy="54" r="1"/><circle cx="170" cy="54" r="1"/>
    <circle cx="190" cy="54" r="1"/><circle cx="210" cy="54" r="1"/><circle cx="230" cy="54" r="1"/>
    <circle cx="250" cy="54" r="1"/><circle cx="270" cy="54" r="1"/><circle cx="290" cy="54" r="1"/>
    <circle cx="20" cy="71" r="1"/><circle cx="40" cy="71" r="1"/><circle cx="60" cy="71" r="1"/>
    <circle cx="80" cy="71" r="1"/><circle cx="100" cy="71" r="1"/><circle cx="120" cy="71" r="1"/>
    <circle cx="140" cy="71" r="1"/><circle cx="160" cy="71" r="1"/><circle cx="180" cy="71" r="1"/>
    <circle cx="200" cy="71" r="1"/><circle cx="220" cy="71" r="1"/><circle cx="240" cy="71" r="1"/>
    <circle cx="260" cy="71" r="1"/><circle cx="280" cy="71" r="1"/>
    <circle cx="10" cy="88" r="1"/><circle cx="30" cy="88" r="1"/><circle cx="50" cy="88" r="1"/>
    <circle cx="70" cy="88" r="1"/><circle cx="90" cy="88" r="1"/><circle cx="110" cy="88" r="1"/>
    <circle cx="130" cy="88" r="1"/><circle cx="150" cy="88" r="1"/><circle cx="170" cy="88" r="1"/>
    <circle cx="190" cy="88" r="1"/><circle cx="210" cy="88" r="1"/><circle cx="230" cy="88" r="1"/>
    <circle cx="250" cy="88" r="1"/><circle cx="270" cy="88" r="1"/><circle cx="290" cy="88" r="1"/>
    <circle cx="20" cy="105" r="1"/><circle cx="40" cy="105" r="1"/><circle cx="60" cy="105" r="1"/>
    <circle cx="80" cy="105" r="1"/><circle cx="100" cy="105" r="1"/><circle cx="120" cy="105" r="1"/>
    <circle cx="140" cy="105" r="1"/><circle cx="160" cy="105" r="1"/><circle cx="180" cy="105" r="1"/>
    <circle cx="200" cy="105" r="1"/><circle cx="220" cy="105" r="1"/><circle cx="240" cy="105" r="1"/>
    <circle cx="260" cy="105" r="1"/><circle cx="280" cy="105" r="1"/>
    <circle cx="10" cy="122" r="1"/><circle cx="30" cy="122" r="1"/><circle cx="50" cy="122" r="1"/>
    <circle cx="70" cy="122" r="1"/><circle cx="90" cy="122" r="1"/><circle cx="110" cy="122" r="1"/>
    <circle cx="130" cy="122" r="1"/><circle cx="150" cy="122" r="1"/><circle cx="170" cy="122" r="1"/>
    <circle cx="190" cy="122" r="1"/><circle cx="210" cy="122" r="1"/><circle cx="230" cy="122" r="1"/>
    <circle cx="250" cy="122" r="1"/><circle cx="270" cy="122" r="1"/><circle cx="290" cy="122" r="1"/>
  </g>

  <!-- Incoming white beam (isometric left-to-prism) -->
  <line x1="18" y1="80" x2="82" y2="80" stroke="white" stroke-width="2.5" opacity="0.9" filter="url(#v4_rayGlow)"/>

  <!-- Isometric prism: apex top, base bottom-right -->
  <!-- Top face: parallelogram top -->
  <polygon points="82,55 140,38 165,60 107,77" fill="url(#v4_topFace)" filter="url(#v4_glow)"/>
  <!-- Left face: left trapezoid -->
  <polygon points="82,55 107,77 107,118 82,96" fill="url(#v4_leftFace)"/>
  <!-- Right face: right trapezoid -->
  <polygon points="107,77 165,60 165,101 107,118" fill="url(#v4_rightFace)"/>
  <!-- Edge highlights -->
  <line x1="82" y1="55" x2="140" y2="38" stroke="#6080dd" stroke-width="0.8" opacity="0.7"/>
  <line x1="82" y1="55" x2="107" y2="77" stroke="#5070cc" stroke-width="0.8" opacity="0.8"/>
  <line x1="140" y1="38" x2="165" y2="60" stroke="#4060bb" stroke-width="0.8" opacity="0.6"/>
  <line x1="107" y1="77" x2="165" y2="60" stroke="#3050aa" stroke-width="0.8" opacity="0.5"/>
  <line x1="82" y1="96" x2="107" y2="118" stroke="#2a3f8e" stroke-width="0.8" opacity="0.5"/>
  <line x1="107" y1="118" x2="165" y2="101" stroke="#1e2e6e" stroke-width="0.8" opacity="0.5"/>
  <line x1="165" y1="60" x2="165" y2="101" stroke="#1e2e6e" stroke-width="0.8" opacity="0.4"/>
  <line x1="82" y1="55" x2="82" y2="96" stroke="#4060bb" stroke-width="0.8" opacity="0.5"/>

  <!-- Spectrum rays exiting right face, isometric perspective -->
  <!-- Red -->
  <line x1="165" y1="65" x2="290" y2="50" stroke="#ff3333" stroke-width="2.2" opacity="0.95" filter="url(#v4_rayGlow)"/>
  <!-- Orange -->
  <line x1="165" y1="71" x2="290" y2="63" stroke="#ff8800" stroke-width="2" opacity="0.9" filter="url(#v4_rayGlow)"/>
  <!-- Yellow -->
  <line x1="165" y1="77" x2="290" y2="77" stroke="#ffee00" stroke-width="2" opacity="0.9" filter="url(#v4_rayGlow)"/>
  <!-- Green -->
  <line x1="165" y1="83" x2="290" y2="91" stroke="#44ee44" stroke-width="2" opacity="0.9" filter="url(#v4_rayGlow)"/>
  <!-- Cyan -->
  <line x1="165" y1="89" x2="290" y2="105" stroke="#00ccff" stroke-width="2" opacity="0.9" filter="url(#v4_rayGlow)"/>
  <!-- Blue -->
  <line x1="165" y1="95" x2="290" y2="119" stroke="#3366ff" stroke-width="2" opacity="0.9" filter="url(#v4_rayGlow)"/>
  <!-- Violet -->
  <line x1="165" y1="100" x2="290" y2="133" stroke="#cc44ff" stroke-width="2" opacity="0.9" filter="url(#v4_rayGlow)"/>

  <!-- Text -->
  <text x="150" y="158" font-family="'Courier New', monospace" font-size="18" font-weight="700" fill="#e0e8ff" letter-spacing="6" text-anchor="middle">AGENTIC</text>
  <text x="150" y="178" font-family="'Courier New', monospace" font-size="10" font-weight="400" fill="#5a7acc" letter-spacing="4" text-anchor="middle">LEAD GEN</text>
</svg>
