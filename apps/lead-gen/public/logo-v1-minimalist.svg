<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 140" width="300" height="140">
  <title>Agentic Lead Gen</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060618"/>
      <stop offset="100%" stop-color="#0a0a22"/>
    </linearGradient>
    <linearGradient id="mark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F7FFF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#4F7FFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="140" fill="url(#bg)" rx="4"/>

  <!-- Centered mark group -->
  <g transform="translate(150, 70)">

    <!-- Subtle ambient glow behind the mark -->
    <circle cx="0" cy="0" r="42" fill="url(#glow)" opacity="0.4"/>

    <!-- The Mark: Abstract funnel/targeting shape
         An upward-pointing chevron (like a stylized A / funnel mouth)
         with a convergence point below — data flows in, leads come out -->

    <!-- Outer chevron arms — the "funnel" opening / "A" shape -->
    <line x1="-28" y1="18" x2="0" y2="-30" stroke="url(#mark)" stroke-width="3" stroke-linecap="round"/>
    <line x1="28" y1="18" x2="0" y2="-30" stroke="url(#mark)" stroke-width="3" stroke-linecap="round"/>

    <!-- Crossbar — the classic "A" bar, also the funnel narrowing -->
    <line x1="-16" y1="0" x2="16" y2="0" stroke="url(#mark)" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>

    <!-- Convergence point — the "lead" output, a bright node -->
    <circle cx="0" cy="28" r="4" fill="#00D4FF" opacity="0.9"/>

    <!-- Flow lines from crossbar to convergence — agentic pathways -->
    <line x1="-8" y1="6" x2="0" y2="24" stroke="#4F7FFF" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="8" y1="6" x2="0" y2="24" stroke="#4F7FFF" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Orbital ring — autonomy / agentic behavior -->
    <ellipse cx="0" cy="-2" rx="36" ry="14" fill="none" stroke="#4F7FFF" stroke-width="1.2" opacity="0.25" stroke-dasharray="4 6"/>

    <!-- Three small nodes on orbit — agents working -->
    <circle cx="-34" cy="3" r="2.5" fill="#4F7FFF" opacity="0.7"/>
    <circle cx="26" cy="-12" r="2" fill="#00D4FF" opacity="0.6"/>
    <circle cx="32" cy="6" r="2" fill="#4F7FFF" opacity="0.5"/>

    <!-- Apex node — AI "eye" / decision point -->
    <circle cx="0" cy="-30" r="3.5" fill="#4F7FFF" opacity="0.9"/>
    <circle cx="0" cy="-30" r="1.5" fill="#00D4FF"/>

  </g>
</svg>