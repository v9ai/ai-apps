<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="v17_bg" cx="30%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0d1530"/>
      <stop offset="100%" stop-color="#04060f"/>
    </radialGradient>

    <!-- Node glow filters per color -->
    <filter id="v17_glow_red" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="v17_glow_orange" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="v17_glow_node" x="-80%" y="-80%" width="360%" height="360%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="v17_prism_glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Prism gradient -->
    <linearGradient id="v17_prism_fill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e3a7e"/>
      <stop offset="100%" stop-color="#2a5090"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="300" height="200" fill="url(#v17_bg)"/>

  <!-- Incoming beam -->
  <rect x="0" y="96" width="75" height="8" fill="#8899cc" opacity="0.5"/>
  <rect x="0" y="97" width="75" height="6" fill="#aabbee" opacity="0.3"/>

  <!-- ===== SPECTRUM RAYS AS NETWORK EDGES ===== -->

  <!-- RAY 1: Red (#e8314a) — from prism exit (140,100) -->
  <!-- edges to nodes -->
  <line x1="140" y1="100" x2="185" y2="38" stroke="#e8314a" stroke-width="1.5" opacity="0.7"/>
  <line x1="185" y1="38" x2="220" y2="22" stroke="#e8314a" stroke-width="1.2" opacity="0.6"/>
  <line x1="185" y1="38" x2="228" y2="50" stroke="#e8314a" stroke-width="1" opacity="0.5"/>
  <line x1="140" y1="100" x2="228" y2="50" stroke="#e8314a" stroke-width="0.8" opacity="0.35" stroke-dasharray="3,3"/>

  <!-- RAY 2: Orange (#f5820d) -->
  <line x1="140" y1="100" x2="192" y2="58" stroke="#f5820d" stroke-width="1.5" opacity="0.7"/>
  <line x1="192" y1="58" x2="248" y2="42" stroke="#f5820d" stroke-width="1.2" opacity="0.6"/>
  <line x1="192" y1="58" x2="258" y2="70" stroke="#f5820d" stroke-width="1" opacity="0.5"/>

  <!-- RAY 3: Yellow (#f0d020) -->
  <line x1="140" y1="100" x2="200" y2="80" stroke="#f0d020" stroke-width="1.5" opacity="0.7"/>
  <line x1="200" y1="80" x2="262" y2="72" stroke="#f0d020" stroke-width="1.2" opacity="0.6"/>
  <line x1="200" y1="80" x2="270" y2="90" stroke="#f0d020" stroke-width="1" opacity="0.5"/>
  <line x1="262" y1="72" x2="270" y2="90" stroke="#f0d020" stroke-width="0.7" opacity="0.35" stroke-dasharray="2,3"/>

  <!-- RAY 4: Green (#22cc66) -->
  <line x1="140" y1="100" x2="205" y2="100" stroke="#22cc66" stroke-width="1.5" opacity="0.7"/>
  <line x1="205" y1="100" x2="268" y2="95" stroke="#22cc66" stroke-width="1.2" opacity="0.6"/>
  <line x1="205" y1="100" x2="272" y2="110" stroke="#22cc66" stroke-width="1" opacity="0.5"/>

  <!-- RAY 5: Cyan (#14c8d4) -->
  <line x1="140" y1="100" x2="198" y2="120" stroke="#14c8d4" stroke-width="1.5" opacity="0.7"/>
  <line x1="198" y1="120" x2="260" y2="118" stroke="#14c8d4" stroke-width="1.2" opacity="0.6"/>
  <line x1="198" y1="120" x2="268" y2="132" stroke="#14c8d4" stroke-width="1" opacity="0.5"/>
  <line x1="260" y1="118" x2="268" y2="132" stroke="#14c8d4" stroke-width="0.7" opacity="0.35" stroke-dasharray="2,3"/>

  <!-- RAY 6: Blue (#3a7ef5) -->
  <line x1="140" y1="100" x2="192" y2="138" stroke="#3a7ef5" stroke-width="1.5" opacity="0.7"/>
  <line x1="192" y1="138" x2="248" y2="142" stroke="#3a7ef5" stroke-width="1.2" opacity="0.6"/>
  <line x1="192" y1="138" x2="252" y2="156" stroke="#3a7ef5" stroke-width="1" opacity="0.5"/>

  <!-- RAY 7: Violet (#b040f0) -->
  <line x1="140" y1="100" x2="185" y2="158" stroke="#b040f0" stroke-width="1.5" opacity="0.7"/>
  <line x1="185" y1="158" x2="228" y2="162" stroke="#b040f0" stroke-width="1.2" opacity="0.6"/>
  <line x1="185" y1="158" x2="222" y2="178" stroke="#b040f0" stroke-width="1" opacity="0.5"/>

  <!-- ===== DATA NODES ===== -->
  <!-- Red nodes -->
  <circle cx="185" cy="38" r="5" fill="#e8314a" filter="url(#v17_glow_node)" opacity="0.9"/>
  <circle cx="220" cy="22" r="4" fill="#e8314a" opacity="0.8"/>
  <circle cx="228" cy="50" r="3.5" fill="#e8314a" opacity="0.7"/>

  <!-- Orange nodes -->
  <circle cx="192" cy="58" r="5" fill="#f5820d" filter="url(#v17_glow_node)" opacity="0.9"/>
  <circle cx="248" cy="42" r="4" fill="#f5820d" opacity="0.8"/>
  <circle cx="258" cy="70" r="3.5" fill="#f5820d" opacity="0.7"/>

  <!-- Yellow nodes -->
  <circle cx="200" cy="80" r="5" fill="#f0d020" filter="url(#v17_glow_node)" opacity="0.9"/>
  <circle cx="262" cy="72" r="4" fill="#f0d020" opacity="0.8"/>
  <circle cx="270" cy="90" r="3.5" fill="#f0d020" opacity="0.7"/>

  <!-- Green nodes -->
  <circle cx="205" cy="100" r="5" fill="#22cc66" filter="url(#v17_glow_node)" opacity="0.9"/>
  <circle cx="268" cy="95" r="4" fill="#22cc66" opacity="0.8"/>
  <circle cx="272" cy="110" r="3.5" fill="#22cc66" opacity="0.7"/>

  <!-- Cyan nodes -->
  <circle cx="198" cy="120" r="5" fill="#14c8d4" filter="url(#v17_glow_node)" opacity="0.9"/>
  <circle cx="260" cy="118" r="4" fill="#14c8d4" opacity="0.8"/>
  <circle cx="268" cy="132" r="3.5" fill="#14c8d4" opacity="0.7"/>

  <!-- Blue nodes -->
  <circle cx="192" cy="138" r="5" fill="#3a7ef5" filter="url(#v17_glow_node)" opacity="0.9"/>
  <circle cx="248" cy="142" r="4" fill="#3a7ef5" opacity="0.8"/>
  <circle cx="252" cy="156" r="3.5" fill="#3a7ef5" opacity="0.7"/>

  <!-- Violet nodes -->
  <circle cx="185" cy="158" r="5" fill="#b040f0" filter="url(#v17_glow_node)" opacity="0.9"/>
  <circle cx="228" cy="162" r="4" fill="#b040f0" opacity="0.8"/>
  <circle cx="222" cy="178" r="3.5" fill="#b040f0" opacity="0.7"/>

  <!-- Cross-ray network connections (subtle graph mesh) -->
  <line x1="205" y1="100" x2="200" y2="80" stroke="#44ffaa" stroke-width="0.5" opacity="0.2" stroke-dasharray="2,4"/>
  <line x1="205" y1="100" x2="198" y2="120" stroke="#44ffaa" stroke-width="0.5" opacity="0.2" stroke-dasharray="2,4"/>
  <line x1="268" y1="95" x2="262" y2="72" stroke="#88eebb" stroke-width="0.4" opacity="0.15" stroke-dasharray="2,4"/>
  <line x1="268" y1="95" x2="260" y2="118" stroke="#88eebb" stroke-width="0.4" opacity="0.15" stroke-dasharray="2,4"/>

  <!-- Prism body -->
  <polygon points="75,45 138,100 75,155" fill="url(#v17_prism_fill)" stroke="#4a6ecc" stroke-width="1.5" filter="url(#v17_prism_glow)" opacity="0.92"/>
  <!-- Prism face sheen -->
  <polygon points="75,45 138,100 75,155" fill="none" stroke="#8aacff" stroke-width="0.8" opacity="0.5"/>
  <!-- Interior refraction lines -->
  <line x1="80" y1="100" x2="136" y2="100" stroke="#aaccff" stroke-width="0.6" opacity="0.3"/>
  <line x1="90" y1="75" x2="136" y2="97" stroke="#aaccff" stroke-width="0.5" opacity="0.25"/>
  <line x1="90" y1="125" x2="136" y2="103" stroke="#aaccff" stroke-width="0.5" opacity="0.25"/>

  <!-- Typography -->
  <text x="150" y="192" font-family="'Arial', sans-serif" font-size="11" font-weight="700" fill="#e0e8ff" letter-spacing="3" text-anchor="middle">AGENTIC</text>
  <text x="150" y="199" font-family="'Arial', sans-serif" font-size="7" font-weight="300" fill="#8899cc" letter-spacing="4" text-anchor="middle">LEAD GEN</text>

  <!-- Crystal Prism label top -->
  <text x="75" y="18" font-family="'Arial', sans-serif" font-size="7.5" font-weight="300" fill="#4a6ecc" letter-spacing="2" text-anchor="middle" opacity="0.7">CRYSTAL PRISM</text>
</svg>
