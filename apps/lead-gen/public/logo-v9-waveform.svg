<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 140" width="300" height="140">
  <title>Agentic Lead Gen — Signal Processing</title>
  <defs>
    <!-- Background gradient -->
    <linearGradient id="w9bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04060e"/>
      <stop offset="50%" stop-color="#080d1a"/>
      <stop offset="100%" stop-color="#040810"/>
    </linearGradient>

    <!-- Noise color (dim gray) -->
    <linearGradient id="w9noise" x1="0%" y1="0%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#3a3a4a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5a5a70" stop-opacity="0.7"/>
    </linearGradient>

    <!-- Processing glow (blue) -->
    <linearGradient id="w9proc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4466aa" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#3388dd"/>
      <stop offset="100%" stop-color="#44bbff"/>
    </linearGradient>

    <!-- Signal gradient (cyan to white) -->
    <linearGradient id="w9signal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#44ccff"/>
      <stop offset="40%" stop-color="#66eeff"/>
      <stop offset="100%" stop-color="#eeffff"/>
    </linearGradient>

    <!-- Filter funnel gradient -->
    <linearGradient id="w9funnel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2a55" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0d1530" stop-opacity="0.95"/>
    </linearGradient>

    <!-- Filter funnel edge glow -->
    <linearGradient id="w9edge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4466aa"/>
      <stop offset="50%" stop-color="#5599dd"/>
      <stop offset="100%" stop-color="#44ccff"/>
    </linearGradient>

    <!-- Scan line gradient for the processing zone -->
    <linearGradient id="w9scan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3388dd" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3388dd" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3388dd" stop-opacity="0"/>
    </linearGradient>

    <!-- Output pulse glow -->
    <radialGradient id="w9pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#aaeeff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#44ccff" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft glow filter -->
    <filter id="w9glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Strong glow for signal -->
    <filter id="w9sglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Extra bloom for the main pulse -->
    <filter id="w9bloom" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Subtle blur for noise -->
    <filter id="w9nblur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>

    <!-- Clip for the processing zone interior -->
    <clipPath id="w9funnelClip">
      <polygon points="120,30 155,62 155,78 120,110 180,110 180,30"/>
    </clipPath>
  </defs>

  <!-- ====== BACKGROUND ====== -->
  <rect width="300" height="140" fill="url(#w9bg)" rx="4"/>

  <!-- Subtle horizontal baseline -->
  <line x1="0" y1="70" x2="300" y2="70" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>

  <!-- Faint grid lines to suggest digital processing -->
  <line x1="0" y1="35" x2="300" y2="35" stroke="#ffffff" stroke-width="0.2" opacity="0.02"/>
  <line x1="0" y1="105" x2="300" y2="105" stroke="#ffffff" stroke-width="0.2" opacity="0.02"/>
  <line x1="60" y1="0" x2="60" y2="140" stroke="#ffffff" stroke-width="0.2" opacity="0.02"/>
  <line x1="120" y1="0" x2="120" y2="140" stroke="#ffffff" stroke-width="0.2" opacity="0.015"/>
  <line x1="180" y1="0" x2="180" y2="140" stroke="#ffffff" stroke-width="0.2" opacity="0.015"/>
  <line x1="240" y1="0" x2="240" y2="140" stroke="#ffffff" stroke-width="0.2" opacity="0.02"/>

  <!-- ====== LEFT: NOISY WAVEFORM (raw data / unfiltered leads) ====== -->

  <!-- Layer 1: Background noise — very faint scattered lines -->
  <polyline points="5,72 8,58 11,80 14,45 17,90 20,52 23,85 26,38 29,95 32,60"
            fill="none" stroke="#444455" stroke-width="0.6" opacity="0.25" filter="url(#w9nblur)"/>
  <polyline points="7,78 10,42 13,88 16,55 19,35 22,92 25,48 28,82 31,40 34,75"
            fill="none" stroke="#3d3d50" stroke-width="0.5" opacity="0.2" filter="url(#w9nblur)"/>

  <!-- Layer 2: Primary noise waveform — chaotic, high frequency -->
  <polyline points="8,70 12,42 15,88 18,35 21,95 24,30 27,98 30,45 33,82 36,28
                    39,92 42,50 45,78 48,38 51,90 54,32 57,85 60,55 63,75 66,40
                    69,88 72,35 75,80 78,48 81,72 84,58 87,65 90,52 93,70 96,45
                    99,78 102,55 105,68 108,60 111,65 114,62"
            fill="none" stroke="#5a5a72" stroke-width="1.2" opacity="0.55"/>

  <!-- Layer 3: Secondary noise — offset, different phase -->
  <polyline points="10,65 13,90 16,48 19,82 22,40 25,88 28,52 31,75 34,92 37,38
                    40,85 43,45 46,70 49,95 52,42 55,80 58,50 61,68 64,85 67,48
                    70,72 73,90 76,42 79,65 82,78 85,55 88,70 91,60 94,75 97,50
                    100,68 103,58 106,72 109,63 112,67 115,64"
            fill="none" stroke="#4e4e68" stroke-width="0.9" opacity="0.4"/>

  <!-- Scattered noise dots (data points) -->
  <circle cx="15" cy="35" r="1" fill="#5a5a72" opacity="0.3"/>
  <circle cx="25" cy="95" r="1.2" fill="#5a5a72" opacity="0.25"/>
  <circle cx="35" cy="28" r="0.8" fill="#5a5a72" opacity="0.3"/>
  <circle cx="48" cy="100" r="1" fill="#5a5a72" opacity="0.2"/>
  <circle cx="58" cy="32" r="0.9" fill="#5a5a72" opacity="0.25"/>
  <circle cx="70" cy="98" r="1.1" fill="#5a5a72" opacity="0.2"/>
  <circle cx="82" cy="30" r="0.7" fill="#5a5a72" opacity="0.3"/>
  <circle cx="95" cy="95" r="1" fill="#5a5a72" opacity="0.2"/>
  <circle cx="42" cy="105" r="0.6" fill="#5a5a72" opacity="0.15"/>
  <circle cx="65" cy="25" r="0.7" fill="#5a5a72" opacity="0.2"/>

  <!-- Layer 4: High-frequency hash marks (digital noise texture) -->
  <line x1="20" y1="55" x2="20" y2="85" stroke="#4a4a60" stroke-width="0.4" opacity="0.2"/>
  <line x1="30" y1="40" x2="30" y2="100" stroke="#4a4a60" stroke-width="0.4" opacity="0.15"/>
  <line x1="40" y1="48" x2="40" y2="92" stroke="#4a4a60" stroke-width="0.4" opacity="0.2"/>
  <line x1="50" y1="35" x2="50" y2="105" stroke="#4a4a60" stroke-width="0.4" opacity="0.15"/>
  <line x1="60" y1="42" x2="60" y2="98" stroke="#4a4a60" stroke-width="0.4" opacity="0.18"/>
  <line x1="70" y1="38" x2="70" y2="102" stroke="#4a4a60" stroke-width="0.4" opacity="0.15"/>
  <line x1="80" y1="45" x2="80" y2="95" stroke="#4a4a60" stroke-width="0.4" opacity="0.18"/>
  <line x1="90" y1="50" x2="90" y2="90" stroke="#4a4a60" stroke-width="0.4" opacity="0.15"/>
  <line x1="100" y1="52" x2="100" y2="88" stroke="#4a4a60" stroke-width="0.4" opacity="0.12"/>
  <line x1="110" y1="56" x2="110" y2="84" stroke="#4a4a60" stroke-width="0.4" opacity="0.1"/>

  <!-- ====== CENTER: PROCESSING ELEMENT (Filter / Funnel) ====== -->

  <!-- Ambient processing glow behind the funnel -->
  <ellipse cx="150" cy="70" rx="35" ry="50" fill="#1a3366" opacity="0.08"/>

  <!-- Converging guide lines (noise being funneled) -->
  <line x1="115" y1="32" x2="145" y2="58" stroke="#3366aa" stroke-width="0.5" opacity="0.2"/>
  <line x1="115" y1="108" x2="145" y2="82" stroke="#3366aa" stroke-width="0.5" opacity="0.2"/>
  <line x1="118" y1="38" x2="148" y2="60" stroke="#3366aa" stroke-width="0.4" opacity="0.15"/>
  <line x1="118" y1="102" x2="148" y2="80" stroke="#3366aa" stroke-width="0.4" opacity="0.15"/>

  <!-- Main funnel shape — wide input on left, narrow output on right -->
  <polygon points="122,25 122,115 180,82 180,58"
           fill="url(#w9funnel)" opacity="0.85"/>

  <!-- Interior scan lines (processing visualization) -->
  <rect x="122" y="25" width="58" height="90" fill="url(#w9scan)" opacity="0.3"/>

  <!-- Interior waveform being compressed/filtered -->
  <polyline points="125,70 130,52 134,82 138,48 142,78 146,58 150,72 154,65 158,70 162,68 166,70 170,69 174,70 178,70"
            fill="none" stroke="#4488cc" stroke-width="1" opacity="0.5"/>

  <!-- Funnel edges with glow -->
  <line x1="122" y1="25" x2="122" y2="115" stroke="url(#w9edge)" stroke-width="1.5" filter="url(#w9glow)" opacity="0.7"/>
  <line x1="122" y1="25" x2="180" y2="58" stroke="url(#w9edge)" stroke-width="1.2" filter="url(#w9glow)" opacity="0.6"/>
  <line x1="122" y1="115" x2="180" y2="82" stroke="url(#w9edge)" stroke-width="1.2" filter="url(#w9glow)" opacity="0.6"/>
  <line x1="180" y1="58" x2="180" y2="82" stroke="#44ccff" stroke-width="1.8" filter="url(#w9glow)" opacity="0.8"/>

  <!-- Input aperture glow -->
  <circle cx="122" cy="70" r="4" fill="#3366aa" opacity="0.15" filter="url(#w9glow)"/>

  <!-- Output aperture glow -->
  <circle cx="180" cy="70" r="3" fill="#44ccff" opacity="0.3" filter="url(#w9sglow)"/>

  <!-- Internal processing nodes -->
  <circle cx="135" cy="70" r="1.5" fill="#3366aa" opacity="0.5" filter="url(#w9glow)"/>
  <circle cx="150" cy="70" r="2" fill="#4488cc" opacity="0.6" filter="url(#w9glow)"/>
  <circle cx="165" cy="70" r="2" fill="#44aadd" opacity="0.65" filter="url(#w9glow)"/>

  <!-- Processing arcs — suggest rotational/filter action -->
  <path d="M 140,52 A 20,20 0 0 1 160,52" fill="none" stroke="#4488cc" stroke-width="0.6" opacity="0.3"/>
  <path d="M 140,88 A 20,20 0 0 0 160,88" fill="none" stroke="#4488cc" stroke-width="0.6" opacity="0.3"/>
  <path d="M 145,48 A 15,15 0 0 1 165,55" fill="none" stroke="#5599dd" stroke-width="0.5" opacity="0.2"/>
  <path d="M 145,92 A 15,15 0 0 0 165,85" fill="none" stroke="#5599dd" stroke-width="0.5" opacity="0.2"/>

  <!-- ====== RIGHT: CLEAN OUTPUT SIGNAL ====== -->

  <!-- Baseline for output (faint) -->
  <line x1="182" y1="70" x2="292" y2="70" stroke="#44ccff" stroke-width="0.3" opacity="0.15"/>

  <!-- Output: Clean, strong single pulse with pre/post flatline -->
  <!-- The money shot: flat → sharp rise → peak → clean descent → flat -->
  <polyline points="182,70 195,70 200,70 205,70 210,70 215,70
                    220,68 225,65 228,60 230,52 232,40 234,28
                    236,22 238,20 240,22 242,28 244,40
                    246,52 248,60 250,65 253,68 258,70
                    263,70 268,70 273,70 278,70 283,70 288,70 292,70"
            fill="none" stroke="url(#w9signal)" stroke-width="2.2" stroke-linecap="round"
            filter="url(#w9sglow)" opacity="0.95"/>

  <!-- Fainter wider glow version of the pulse -->
  <polyline points="182,70 215,70
                    220,68 225,65 228,60 230,52 232,40 234,28
                    236,22 238,20 240,22 242,28 244,40
                    246,52 248,60 250,65 253,68 258,70
                    292,70"
            fill="none" stroke="#44ccff" stroke-width="5" stroke-linecap="round"
            filter="url(#w9bloom)" opacity="0.12"/>

  <!-- Peak glow orb -->
  <circle cx="238" cy="20" r="8" fill="url(#w9pulse)" opacity="0.6"/>
  <circle cx="238" cy="20" r="3" fill="#ccffff" opacity="0.7" filter="url(#w9sglow)"/>
  <circle cx="238" cy="20" r="1.2" fill="#ffffff" opacity="0.9"/>

  <!-- Subtle measurement ticks on the output (oscilloscope style) -->
  <line x1="210" y1="68" x2="210" y2="72" stroke="#44ccff" stroke-width="0.3" opacity="0.2"/>
  <line x1="220" y1="68" x2="220" y2="72" stroke="#44ccff" stroke-width="0.3" opacity="0.25"/>
  <line x1="230" y1="68" x2="230" y2="72" stroke="#44ccff" stroke-width="0.3" opacity="0.3"/>
  <line x1="238" y1="68" x2="238" y2="72" stroke="#44ccff" stroke-width="0.5" opacity="0.4"/>
  <line x1="246" y1="68" x2="246" y2="72" stroke="#44ccff" stroke-width="0.3" opacity="0.3"/>
  <line x1="256" y1="68" x2="256" y2="72" stroke="#44ccff" stroke-width="0.3" opacity="0.25"/>
  <line x1="266" y1="68" x2="266" y2="72" stroke="#44ccff" stroke-width="0.3" opacity="0.2"/>

  <!-- Output end-point dot -->
  <circle cx="292" cy="70" r="1.5" fill="#aaeeff" opacity="0.5" filter="url(#w9glow)"/>

  <!-- ====== NARRATIVE FLOW ARROWS (very subtle) ====== -->
  <!-- Tiny directional chevrons showing data flow left-to-right -->
  <polyline points="108,62 114,70 108,78" fill="none" stroke="#5a5a72" stroke-width="0.7" opacity="0.25"/>
  <polyline points="184,64 189,70 184,76" fill="none" stroke="#44ccff" stroke-width="0.7" opacity="0.3"/>

  <!-- ====== AMBIENT PARTICLES (data being filtered) ====== -->
  <!-- Particles approaching the funnel -->
  <circle cx="108" cy="42" r="0.8" fill="#6666aa" opacity="0.3"/>
  <circle cx="112" cy="55" r="1" fill="#5566aa" opacity="0.35"/>
  <circle cx="105" cy="85" r="0.7" fill="#6666aa" opacity="0.25"/>
  <circle cx="115" cy="98" r="0.9" fill="#5566aa" opacity="0.3"/>
  <circle cx="110" cy="70" r="1.2" fill="#5588bb" opacity="0.4"/>

  <!-- Particles rejected (fading away from funnel edges) -->
  <circle cx="130" cy="22" r="0.6" fill="#444466" opacity="0.15"/>
  <circle cx="142" cy="18" r="0.5" fill="#444466" opacity="0.1"/>
  <circle cx="130" cy="118" r="0.6" fill="#444466" opacity="0.15"/>
  <circle cx="145" cy="122" r="0.5" fill="#444466" opacity="0.1"/>
  <circle cx="155" cy="16" r="0.4" fill="#444466" opacity="0.08"/>
  <circle cx="160" cy="124" r="0.4" fill="#444466" opacity="0.08"/>
</svg>