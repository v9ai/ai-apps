<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <filter id="v6_rayGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="v6_beamGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="v6_prismGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="v6_prismTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0e3040"/>
      <stop offset="50%" stop-color="#1a5070"/>
      <stop offset="100%" stop-color="#0e3040"/>
    </linearGradient>
    <linearGradient id="v6_prismLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#092030"/>
      <stop offset="100%" stop-color="#0e3040"/>
    </linearGradient>
    <linearGradient id="v6_prismRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0e3040"/>
      <stop offset="100%" stop-color="#061520"/>
    </linearGradient>
    <radialGradient id="v6_bgGlow" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#0a2535" stop-opacity="1"/>
      <stop offset="100%" stop-color="#050f14" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="200" fill="url(#v6_bgGlow)"/>

  <!-- Vertical incoming white beam from top -->
  <line x1="150" y1="5" x2="150" y2="88" stroke="white" stroke-width="3" opacity="0.95" filter="url(#v6_beamGlow)"/>
  <!-- Beam tip glow -->
  <circle cx="150" cy="88" r="4" fill="white" opacity="0.6" filter="url(#v6_beamGlow)"/>

  <!-- Prism: flat base at bottom, apex at top — sits in lower-center area -->
  <!-- Apex at (150, 88), base left at (88, 132), base right at (212, 132) -->
  <!-- Left face -->
  <polygon points="150,88 88,132 150,132" fill="url(#v6_prismLeft)" filter="url(#v6_prismGlow)"/>
  <!-- Right face -->
  <polygon points="150,88 212,132 150,132" fill="url(#v6_prismRight)" filter="url(#v6_prismGlow)"/>
  <!-- Top-left edge highlight -->
  <line x1="150" y1="88" x2="88" y2="132" stroke="#4a9acc" stroke-width="1.5" opacity="0.7"/>
  <!-- Top-right edge highlight -->
  <line x1="150" y1="88" x2="212" y2="132" stroke="#4a9acc" stroke-width="1.5" opacity="0.7"/>
  <!-- Base line -->
  <line x1="88" y1="132" x2="212" y2="132" stroke="#3a7a99" stroke-width="1.2" opacity="0.6"/>
  <!-- Inner refraction shimmer on left face -->
  <line x1="140" y1="95" x2="110" y2="132" stroke="#5ab0dd" stroke-width="0.5" opacity="0.25"/>
  <line x1="148" y1="89" x2="120" y2="132" stroke="#5ab0dd" stroke-width="0.5" opacity="0.2"/>

  <!-- Spectrum fan rays from prism base, fanning left and right horizontally -->
  <!-- RIGHT side rays (going right and slightly down from base) -->
  <!-- Violet right -->
  <line x1="150" y1="132" x2="295" y2="118" stroke="#cc44ff" stroke-width="2" opacity="0.92" filter="url(#v6_rayGlow)"/>
  <!-- Blue right -->
  <line x1="150" y1="132" x2="295" y2="124" stroke="#3366ff" stroke-width="2" opacity="0.92" filter="url(#v6_rayGlow)"/>
  <!-- Cyan right -->
  <line x1="150" y1="132" x2="295" y2="130" stroke="#00ccff" stroke-width="2" opacity="0.92" filter="url(#v6_rayGlow)"/>
  <!-- Green right -->
  <line x1="150" y1="132" x2="295" y2="136" stroke="#44ee44" stroke-width="2" opacity="0.92" filter="url(#v6_rayGlow)"/>
  <!-- Yellow right -->
  <line x1="150" y1="132" x2="295" y2="142" stroke="#ffee00" stroke-width="2" opacity="0.92" filter="url(#v6_rayGlow)"/>
  <!-- Orange right -->
  <line x1="150" y1="132" x2="295" y2="148" stroke="#ff8800" stroke-width="2" opacity="0.92" filter="url(#v6_rayGlow)"/>
  <!-- Red right -->
  <line x1="150" y1="132" x2="295" y2="154" stroke="#ff3333" stroke-width="2" opacity="0.92" filter="url(#v6_rayGlow)"/>

  <!-- LEFT side rays (mirror) -->
  <!-- Violet left -->
  <line x1="150" y1="132" x2="5" y2="118" stroke="#cc44ff" stroke-width="2" opacity="0.92" filter="url(#v6_rayGlow)"/>
  <!-- Blue left -->
  <line x1="150" y1="132" x2="5" y2="124" stroke="#3366ff" stroke-width="2" opacity="0.92" filter="url(#v6_rayGlow)"/>
  <!-- Cyan left -->
  <line x1="150" y1="132" x2="5" y2="130" stroke="#00ccff" stroke-width="2" opacity="0.92" filter="url(#v6_rayGlow)"/>
  <!-- Green left -->
  <line x1="150" y1="132" x2="5" y2="136" stroke="#44ee44" stroke-width="2" opacity="0.92" filter="url(#v6_rayGlow)"/>
  <!-- Yellow left -->
  <line x1="150" y1="132" x2="5" y2="142" stroke="#ffee00" stroke-width="2" opacity="0.92" filter="url(#v6_rayGlow)"/>
  <!-- Orange left -->
  <line x1="150" y1="132" x2="5" y2="148" stroke="#ff8800" stroke-width="2" opacity="0.92" filter="url(#v6_rayGlow)"/>
  <!-- Red left -->
  <line x1="150" y1="132" x2="5" y2="154" stroke="#ff3333" stroke-width="2" opacity="0.92" filter="url(#v6_rayGlow)"/>

  <!-- Typography below prism -->
  <text x="150" y="168" font-family="'Courier New', monospace" font-size="18" font-weight="700" fill="#c8eeff" letter-spacing="6" text-anchor="middle">AGENTIC</text>
  <text x="150" y="186" font-family="'Courier New', monospace" font-size="10" font-weight="400" fill="#3a8899" letter-spacing="4" text-anchor="middle">LEAD GEN</text>
</svg>
