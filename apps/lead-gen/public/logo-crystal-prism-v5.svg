<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <filter id="v5_glowRay" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="v5_glowWhite" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="v5_prismGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="v5_prismFillL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a5c" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0d2035" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="v5_prismFillR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a3a5c" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0d2035" stop-opacity="0.95"/>
    </linearGradient>
    <radialGradient id="v5_centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="200" fill="#000000"/>

  <!-- Subtle center glow -->
  <ellipse cx="150" cy="97" rx="80" ry="50" fill="url(#v5_centerGlow)"/>

  <!-- === LEFT PRISM (apex pointing right) === -->
  <!-- Left prism: triangle with apex at right ~x=118, base at left x=42 -->
  <polygon points="42,52 42,142 118,97" fill="url(#v5_prismFillL)" stroke="#2a5090" stroke-width="1.2" filter="url(#v5_prismGlow)"/>
  <!-- Prism face sheen -->
  <polygon points="42,52 42,142 118,97" fill="none" stroke="#4477cc" stroke-width="0.6" opacity="0.5"/>
  <!-- Inner highlight line on left prism -->
  <line x1="42" y1="52" x2="118" y2="97" stroke="#3a6ab0" stroke-width="0.5" opacity="0.4"/>
  <line x1="42" y1="142" x2="118" y2="97" stroke="#3a6ab0" stroke-width="0.5" opacity="0.4"/>

  <!-- Incoming white beam from far left into left prism -->
  <line x1="5" y1="97" x2="42" y2="97" stroke="white" stroke-width="3" opacity="0.95" filter="url(#v5_glowWhite)"/>

  <!-- Spectrum rays INSIDE (left prism exit = right prism entry) — between x=118 and x=182 -->
  <!-- Red (top) -->
  <line x1="118" y1="97" x2="182" y2="70" stroke="#ff2222" stroke-width="1.8" opacity="0.9" filter="url(#v5_glowRay)"/>
  <!-- Orange -->
  <line x1="118" y1="97" x2="182" y2="79" stroke="#ff7700" stroke-width="1.8" opacity="0.9" filter="url(#v5_glowRay)"/>
  <!-- Yellow -->
  <line x1="118" y1="97" x2="182" y2="88" stroke="#ffdd00" stroke-width="1.8" opacity="0.9" filter="url(#v5_glowRay)"/>
  <!-- Green (center) -->
  <line x1="118" y1="97" x2="182" y2="97" stroke="#33ee33" stroke-width="1.8" opacity="0.9" filter="url(#v5_glowRay)"/>
  <!-- Cyan -->
  <line x1="118" y1="97" x2="182" y2="106" stroke="#00ddff" stroke-width="1.8" opacity="0.9" filter="url(#v5_glowRay)"/>
  <!-- Blue -->
  <line x1="118" y1="97" x2="182" y2="115" stroke="#2255ff" stroke-width="1.8" opacity="0.9" filter="url(#v5_glowRay)"/>
  <!-- Violet (bottom) -->
  <line x1="118" y1="97" x2="182" y2="124" stroke="#bb33ff" stroke-width="1.8" opacity="0.9" filter="url(#v5_glowRay)"/>

  <!-- === RIGHT PRISM (apex pointing left, mirror of left) === -->
  <!-- Right prism: triangle with apex at left ~x=182, base at right x=258 -->
  <polygon points="258,52 258,142 182,97" fill="url(#v5_prismFillR)" stroke="#2a5090" stroke-width="1.2" filter="url(#v5_prismGlow)"/>
  <polygon points="258,52 258,142 182,97" fill="none" stroke="#4477cc" stroke-width="0.6" opacity="0.5"/>
  <line x1="258" y1="52" x2="182" y2="97" stroke="#3a6ab0" stroke-width="0.5" opacity="0.4"/>
  <line x1="258" y1="142" x2="182" y2="97" stroke="#3a6ab0" stroke-width="0.5" opacity="0.4"/>

  <!-- Recombined white beam exiting right prism -->
  <line x1="258" y1="97" x2="295" y2="97" stroke="white" stroke-width="3" opacity="0.95" filter="url(#v5_glowWhite)"/>

  <!-- Small white convergence glow at right prism exit -->
  <circle cx="258" cy="97" r="4" fill="white" opacity="0.5" filter="url(#v5_glowWhite)"/>
  <!-- Small white convergence glow at left prism apex -->
  <circle cx="118" cy="97" r="3" fill="white" opacity="0.3" filter="url(#v5_glowWhite)"/>

  <!-- Mirror axis subtle line -->
  <line x1="150" y1="48" x2="150" y2="146" stroke="#1a3050" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.5"/>

  <!-- Text -->
  <text x="150" y="165" font-family="'Courier New', monospace" font-size="18" font-weight="700" fill="#ddeeff" letter-spacing="6" text-anchor="middle">AGENTIC</text>
  <text x="150" y="183" font-family="'Courier New', monospace" font-size="10" font-weight="400" fill="#446699" letter-spacing="4" text-anchor="middle">LEAD GEN</text>
</svg>
