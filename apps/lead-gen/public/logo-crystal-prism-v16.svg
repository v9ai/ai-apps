<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="v16_bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8f9ff"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="300" height="200" fill="url(#v16_bg)"/>

  <!-- Dark spectrum rays on white (inverted) -->
  <!-- Deep crimson ray -->
  <polygon points="140,100 300,30 300,52" fill="#8b0000" opacity="0.85"/>
  <!-- Burnt orange ray -->
  <polygon points="140,100 300,52 300,72" fill="#cc4400" opacity="0.85"/>
  <!-- Olive ray -->
  <polygon points="140,100 300,72 300,90" fill="#6b7c1a" opacity="0.85"/>
  <!-- Forest green ray -->
  <polygon points="140,100 300,90 300,108" fill="#1a5c2a" opacity="0.85"/>
  <!-- Teal ray -->
  <polygon points="140,100 300,108 300,128" fill="#0d5c5c" opacity="0.85"/>
  <!-- Navy ray -->
  <polygon points="140,100 300,128 300,148" fill="#0a1f5c" opacity="0.85"/>
  <!-- Dark violet ray -->
  <polygon points="140,100 300,148 300,170" fill="#3c0a6b" opacity="0.85"/>

  <!-- Incoming light beam (dark navy on white) -->
  <polygon points="0,95 0,105 138,102 138,98" fill="#1e2a5e" opacity="0.7"/>

  <!-- Prism body — dark navy fill -->
  <polygon points="95,42 145,100 95,158" fill="#1e2a5e" stroke="#0a1240" stroke-width="2"/>
  <!-- Prism face highlights (subtle lighter edge) -->
  <line x1="95" y1="42" x2="145" y2="100" stroke="#2e4080" stroke-width="1.5"/>
  <line x1="145" y1="100" x2="95" y2="158" stroke="#2e4080" stroke-width="1.5"/>
  <line x1="95" y1="42" x2="95" y2="158" stroke="#0a1240" stroke-width="2"/>

  <!-- Prism interior refraction hint -->
  <line x1="100" y1="100" x2="143" y2="100" stroke="#4a6eb0" stroke-width="0.8" opacity="0.5"/>
  <line x1="110" y1="78" x2="143" y2="98" stroke="#4a6eb0" stroke-width="0.6" opacity="0.4"/>
  <line x1="110" y1="122" x2="143" y2="102" stroke="#4a6eb0" stroke-width="0.6" opacity="0.4"/>

  <!-- Typography -->
  <text x="150" y="185" font-family="'Arial', sans-serif" font-size="11" font-weight="700" fill="#1e2a5e" letter-spacing="3" text-anchor="middle">AGENTIC</text>
  <text x="150" y="197" font-family="'Arial', sans-serif" font-size="7" font-weight="400" fill="#3a4a8e" letter-spacing="4" text-anchor="middle">LEAD GEN</text>

  <!-- "Crystal Prism" label -->
  <text x="150" y="20" font-family="'Arial', sans-serif" font-size="8" font-weight="300" fill="#1e2a5e" letter-spacing="2" text-anchor="middle" opacity="0.6">CRYSTAL PRISM</text>
</svg>
