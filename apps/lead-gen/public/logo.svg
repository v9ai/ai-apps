<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <title>Crystal Prism</title>
  <defs>
    <radialGradient id="cpbg" cx="18%" cy="50%" r="85%">
      <stop offset="0%" stop-color="#0e0e1f"/>
      <stop offset="100%" stop-color="#07070e"/>
    </radialGradient>

    <!-- Spectrum fan — violet at top, red at bottom (physics order) -->
    <linearGradient id="cpfan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"    stop-color="#cc33ff"/>
      <stop offset="14.3%" stop-color="#4455ff"/>
      <stop offset="28.6%" stop-color="#0088ff"/>
      <stop offset="42.9%" stop-color="#00ccff"/>
      <stop offset="57.1%" stop-color="#00dd44"/>
      <stop offset="71.4%" stop-color="#ffee00"/>
      <stop offset="85.7%" stop-color="#ff7700"/>
      <stop offset="100%"  stop-color="#ff2020"/>
    </linearGradient>

    <!-- Fan fade: transparent at apex, fades at right edge -->
    <linearGradient id="cpfanfade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="white" stop-opacity="0"/>
      <stop offset="7%"   stop-color="white" stop-opacity="1"/>
      <stop offset="78%"  stop-color="white" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.12"/>
    </linearGradient>
    <mask id="cpfanmask">
      <polygon points="70,40 172,4 172,76" fill="url(#cpfanfade)"/>
    </mask>

    <!-- Prism glass interior -->
    <linearGradient id="cpprism" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#132050"/>
      <stop offset="55%"  stop-color="#1c2e70"/>
      <stop offset="100%" stop-color="#263c90"/>
    </linearGradient>

    <!-- Incoming beam -->
    <linearGradient id="cpbeam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6688cc" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#8899dd" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#aabbff" stop-opacity="0.55"/>
    </linearGradient>

    <!-- Brand name text gradient -->
    <linearGradient id="cpbrand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ccd8ff"/>
    </linearGradient>

    <!-- Spectrum separator line -->
    <linearGradient id="cpsep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#cc33ff" stop-opacity="0.9"/>
      <stop offset="30%"  stop-color="#0088ff" stop-opacity="0.65"/>
      <stop offset="55%"  stop-color="#00dd44" stop-opacity="0.5"/>
      <stop offset="80%"  stop-color="#ff7700" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff2020" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="cpprismglow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cpbloom" x="-5%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="over"/>
    </filter>
    <filter id="cpfansoft" x="-3%" y="-5%" width="106%" height="110%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cptextglow" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cppointglow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="80" fill="url(#cpbg)" rx="3"/>

  <!-- Subtle star field -->
  <circle cx="9"  cy="7"  r="0.7" fill="white" opacity="0.35"/>
  <circle cx="26" cy="3"  r="0.5" fill="white" opacity="0.25"/>
  <circle cx="5"  cy="30" r="0.6" fill="white" opacity="0.28"/>
  <circle cx="17" cy="68" r="0.6" fill="white" opacity="0.25"/>
  <circle cx="4"  cy="52" r="0.5" fill="white" opacity="0.28"/>
  <circle cx="315" cy="14" r="0.6" fill="white" opacity="0.2"/>
  <circle cx="308" cy="66" r="0.5" fill="white" opacity="0.18"/>

  <!-- Incoming light beam -->
  <polygon points="0,37 0,43 70,41 70,39" fill="url(#cpbeam)"/>
  <polygon points="0,39.2 0,40.8 70,40.4 70,39.6" fill="#ccdaff" opacity="0.28"/>

  <!-- Fan bloom (soft glow behind) -->
  <polygon points="70,40 172,4 172,76" fill="url(#cpfan)" opacity="0.22" filter="url(#cpbloom)"/>

  <!-- Fan main layer -->
  <polygon points="70,40 172,4 172,76" fill="url(#cpfan)" mask="url(#cpfanmask)" opacity="0.86" filter="url(#cpfansoft)"/>

  <!-- Fan overlay for richness -->
  <polygon points="70,40 172,4 172,76" fill="url(#cpfan)" opacity="0.1"/>

  <!-- Fan boundary lines -->
  <line x1="70" y1="40" x2="172" y2="4"  stroke="#cc33ff" stroke-width="0.7" opacity="0.5"/>
  <line x1="70" y1="40" x2="172" y2="76" stroke="#ff2020" stroke-width="0.7" opacity="0.5"/>

  <!-- Prism body -->
  <polygon points="15,9 70,40 15,71"
           fill="url(#cpprism)" stroke="#3a5aaa" stroke-width="1.5"
           filter="url(#cpprismglow)" opacity="0.95"/>

  <!-- Prism edge highlights -->
  <line x1="15" y1="9"  x2="70" y2="40" stroke="#c0d4ff" stroke-width="1"   opacity="0.42"/>
  <line x1="70" y1="40" x2="15" y2="71" stroke="#7090cc" stroke-width="0.8" opacity="0.35"/>
  <line x1="15" y1="9"  x2="15" y2="71" stroke="#4565bb" stroke-width="1.4" opacity="0.58"/>

  <!-- Interior refraction lines -->
  <line x1="22" y1="40" x2="68" y2="40" stroke="#aac8ff" stroke-width="0.6" opacity="0.28"/>
  <line x1="32" y1="27" x2="68" y2="39" stroke="#aac8ff" stroke-width="0.5" opacity="0.22"/>
  <line x1="32" y1="53" x2="68" y2="41" stroke="#aac8ff" stroke-width="0.5" opacity="0.22"/>

  <!-- Beam entry glow -->
  <circle cx="15" cy="40" r="2.5" fill="#aabbff" opacity="0.55" filter="url(#cppointglow)"/>

  <!-- Exit point (refraction apex) -->
  <circle cx="70" cy="40" r="3"  fill="#ffffff" opacity="0.65" filter="url(#cppointglow)"/>
  <circle cx="70" cy="40" r="7"  fill="#aaccff" opacity="0.10"/>

  <!-- Divider between icon and text zones -->
  <line x1="188" y1="18" x2="188" y2="62" stroke="#3355aa" stroke-width="0.6" opacity="0.38"/>

  <!-- Brand name -->
  <text x="252" y="37"
        font-family="'Arial', 'Helvetica', sans-serif"
        font-size="17" font-weight="700"
        fill="url(#cpbrand)"
        letter-spacing="2"
        text-anchor="middle"
        filter="url(#cptextglow)"
        opacity="0.97">Crystal Prism</text>

  <!-- Spectrum separator -->
  <line x1="196" y1="45" x2="308" y2="45" stroke="url(#cpsep)" stroke-width="0.8" opacity="0.72"/>

  <!-- Tagline -->
  <text x="252" y="57"
        font-family="'Arial', 'Helvetica', sans-serif"
        font-size="6" font-weight="300"
        fill="#5577bb"
        letter-spacing="0.8"
        text-anchor="middle"
        opacity="0.72">prism refracting data into spectrum</text>
</svg>
