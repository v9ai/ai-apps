<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 140" width="300" height="140">
  <title>Agentic Lead Gen</title>
  <defs>
    <linearGradient id="o42bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050515"/>
      <stop offset="100%" stop-color="#0c0c25"/>
    </linearGradient>
    <linearGradient id="o42beam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="o42pfl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6677bb" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1e2a5e" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="o42pfr" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3344aa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#111830" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="o42glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="o42eglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="o42pg" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="140" fill="url(#o42bg)" rx="4"/>

  <!-- Subtle grid -->
  <line x1="0" y1="50"  x2="300" y2="50"  stroke="white" stroke-width="0.3" opacity="0.03"/>
  <line x1="0" y1="100" x2="300" y2="100" stroke="white" stroke-width="0.3" opacity="0.03"/>

  <!-- Star field -->
  <circle cx="18"  cy="14"  r="0.8" fill="white" opacity="0.5"/>
  <circle cx="52"  cy="30"  r="0.5" fill="white" opacity="0.3"/>
  <circle cx="278" cy="17"  r="0.8" fill="white" opacity="0.5"/>
  <circle cx="258" cy="54"  r="0.5" fill="white" opacity="0.35"/>
  <circle cx="292" cy="76"  r="0.6" fill="white" opacity="0.4"/>
  <circle cx="28"  cy="67"  r="0.5" fill="white" opacity="0.3"/>
  <circle cx="14"  cy="130" r="0.7" fill="white" opacity="0.4"/>
  <circle cx="273" cy="122" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="72"  cy="9"   r="0.6" fill="white" opacity="0.35"/>

  <!-- Incoming beam -->
  <rect x="20" y="82" width="99" height="16" fill="url(#o42beam)" rx="8" opacity="0.15"/>
  <rect x="20" y="86" width="99" height="7"  fill="url(#o42beam)" rx="3.5"/>
  <circle cx="38"  cy="89" r="1.8" fill="white" opacity="0.75" filter="url(#o42pg)"/>
  <circle cx="56"  cy="89" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="73"  cy="89" r="1.8" fill="white" opacity="0.7"  filter="url(#o42pg)"/>
  <circle cx="90"  cy="89" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="108" cy="89" r="1.5" fill="white" opacity="0.65" filter="url(#o42pg)"/>

  <!-- Prism body -->
  <polygon points="100,122 150,32 200,122" fill="#0d1526" opacity="0.95"/>
  <!-- Prism left face highlight -->
  <polygon points="100,122 150,32 119,89"  fill="url(#o42pfl)" filter="url(#o42pg)" opacity="0.65"/>
  <!-- Prism right face highlight -->
  <polygon points="150,32 200,122 171,78"  fill="url(#o42pfr)" filter="url(#o42pg)" opacity="0.5"/>
  <!-- Interior refraction line -->
  <line x1="119" y1="89" x2="175" y2="77" stroke="#c5d5ff" stroke-width="0.8" opacity="0.35"/>
  <!-- Prism edges -->
  <line x1="100" y1="122" x2="150" y2="32"  stroke="#aabbee" stroke-width="1.6" filter="url(#o42pg)" opacity="0.95"/>
  <line x1="150" y1="32"  x2="200" y2="122" stroke="#aabbee" stroke-width="1.6" filter="url(#o42pg)" opacity="0.95"/>
  <line x1="100" y1="122" x2="200" y2="122" stroke="#aabbee" stroke-width="1.6" filter="url(#o42pg)" opacity="0.95"/>
  <!-- Apex glow -->
  <circle cx="150" cy="32" r="3.5" fill="#ccd5ff" opacity="0.9" filter="url(#o42glow)"/>
  <!-- Entry/exit point -->
  <circle cx="119" cy="89" r="3"   fill="white"   opacity="0.75" filter="url(#o42eglow)"/>

  <!-- Spectrum lines (violet → red) -->
  <line x1="164" y1="56"  x2="283" y2="42"  stroke="#cc33ff" stroke-width="2.5" filter="url(#o42glow)" opacity="0.9"/>
  <line x1="167" y1="63"  x2="283" y2="60"  stroke="#4455ff" stroke-width="2.5" filter="url(#o42glow)" opacity="0.9"/>
  <line x1="171" y1="70"  x2="283" y2="78"  stroke="#0088ff" stroke-width="2.5" filter="url(#o42glow)" opacity="0.9"/>
  <line x1="175" y1="77"  x2="283" y2="97"  stroke="#00ccff" stroke-width="2.5" filter="url(#o42glow)" opacity="0.9"/>
  <line x1="179" y1="84"  x2="283" y2="116" stroke="#00dd44" stroke-width="2.5" filter="url(#o42glow)" opacity="0.9"/>
  <line x1="184" y1="92"  x2="283" y2="135" stroke="#ffee00" stroke-width="2.5" filter="url(#o42glow)" opacity="0.9"/>
  <line x1="188" y1="100" x2="283" y2="136" stroke="#ff7700" stroke-width="2.5" filter="url(#o42glow)" opacity="0.9"/>
  <line x1="193" y1="109" x2="283" y2="137" stroke="#ff2020" stroke-width="2.5" filter="url(#o42glow)" opacity="0.9"/>

  <!-- Origin dots -->
  <circle cx="164" cy="56"  r="2" fill="#cc33ff" opacity="0.85" filter="url(#o42glow)"/>
  <circle cx="167" cy="63"  r="2" fill="#4455ff" opacity="0.85" filter="url(#o42glow)"/>
  <circle cx="171" cy="70"  r="2" fill="#0088ff" opacity="0.85" filter="url(#o42glow)"/>
  <circle cx="175" cy="77"  r="2" fill="#00ccff" opacity="0.85" filter="url(#o42glow)"/>
  <circle cx="179" cy="84"  r="2" fill="#00dd44" opacity="0.85" filter="url(#o42glow)"/>
  <circle cx="184" cy="92"  r="2" fill="#ffee00" opacity="0.85" filter="url(#o42glow)"/>
  <circle cx="188" cy="100" r="2" fill="#ff7700" opacity="0.85" filter="url(#o42glow)"/>
  <circle cx="193" cy="109" r="2" fill="#ff2020" opacity="0.85" filter="url(#o42glow)"/>

  <!-- End dots -->
  <circle cx="283" cy="42"  r="2.5" fill="#cc33ff" opacity="0.4" filter="url(#o42glow)"/>
  <circle cx="283" cy="60"  r="2.5" fill="#4455ff" opacity="0.4" filter="url(#o42glow)"/>
  <circle cx="283" cy="78"  r="2.5" fill="#0088ff" opacity="0.4" filter="url(#o42glow)"/>
  <circle cx="283" cy="97"  r="2.5" fill="#00ccff" opacity="0.4" filter="url(#o42glow)"/>
  <circle cx="283" cy="116" r="2.5" fill="#00dd44" opacity="0.4" filter="url(#o42glow)"/>
  <circle cx="283" cy="135" r="2.5" fill="#ffee00" opacity="0.4" filter="url(#o42glow)"/>
  <circle cx="283" cy="136" r="2.5" fill="#ff7700" opacity="0.4" filter="url(#o42glow)"/>
  <circle cx="283" cy="137" r="2.5" fill="#ff2020" opacity="0.4" filter="url(#o42glow)"/>
</svg>
