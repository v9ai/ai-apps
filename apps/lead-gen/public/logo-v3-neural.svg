<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 140" width="300" height="140">
  <title>Agentic Lead Gen — Neural Network</title>
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050515"/>
      <stop offset="100%" stop-color="#080820"/>
    </linearGradient>

    <!-- Edge gradient: blue to cyan -->
    <linearGradient id="edgeActive" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00aaff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#00ddff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Edge gradient: dim/inactive -->
    <linearGradient id="edgeDim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00aaff" stop-opacity="0.04"/>
      <stop offset="50%" stop-color="#00aaff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00ddff" stop-opacity="0.12"/>
    </linearGradient>

    <!-- Radial glow for active nodes -->
    <radialGradient id="nodeGlowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00aaff" stop-opacity="1"/>
      <stop offset="60%" stop-color="#00aaff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00aaff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGlowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="1"/>
      <stop offset="60%" stop-color="#00ffcc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGlowWhite" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowSoft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="edgeGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="140" fill="url(#bg)" rx="4"/>

  <!-- Subtle grid dots to evoke a coordinate space -->
  <g opacity="0.04" fill="white">
    <circle cx="30" cy="20" r="0.7"/><circle cx="60" cy="20" r="0.7"/>
    <circle cx="90" cy="20" r="0.7"/><circle cx="120" cy="20" r="0.7"/>
    <circle cx="30" cy="50" r="0.7"/><circle cx="60" cy="50" r="0.7"/>
    <circle cx="90" cy="50" r="0.7"/><circle cx="120" cy="50" r="0.7"/>
    <circle cx="30" cy="80" r="0.7"/><circle cx="60" cy="80" r="0.7"/>
    <circle cx="90" cy="80" r="0.7"/><circle cx="120" cy="80" r="0.7"/>
    <circle cx="30" cy="110" r="0.7"/><circle cx="60" cy="110" r="0.7"/>
    <circle cx="90" cy="110" r="0.7"/><circle cx="120" cy="110" r="0.7"/>
  </g>

  <!--
    NEURAL NETWORK FUNNEL
    Layer 0 (top/input): 7 nodes — raw leads, wide spread
    Layer 1 (hidden):    5 nodes — filtering
    Layer 2 (hidden):    3 nodes — qualifying
    Layer 3 (output):    1 node  — qualified lead

    The network is positioned in the left ~55% of the canvas.
    Text occupies the right side.
  -->

  <!-- ============================================ -->
  <!-- LAYER DEFINITIONS                            -->
  <!-- Layer 0: y=18,  x spread: 20..145  (7 nodes) -->
  <!-- Layer 1: y=50,  x spread: 32..130  (5 nodes) -->
  <!-- Layer 2: y=85,  x spread: 52..112  (3 nodes) -->
  <!-- Layer 3: y=120, x center: 82       (1 node)  -->
  <!-- ============================================ -->

  <!-- ====== EDGES: Layer 0 -> Layer 1 ====== -->
  <!-- Dim/background connections (all-to-all, very faint) -->
  <g stroke="url(#edgeDim)" stroke-width="0.5" opacity="0.6">
    <!-- L0 node 0 (x=20) to all L1 -->
    <line x1="20" y1="18" x2="32" y2="50"/>
    <line x1="20" y1="18" x2="56.5" y2="50"/>
    <line x1="20" y1="18" x2="81" y2="50"/>
    <line x1="20" y1="18" x2="105.5" y2="50"/>
    <line x1="20" y1="18" x2="130" y2="50"/>
    <!-- L0 node 1 (x=40.8) -->
    <line x1="40.8" y1="18" x2="32" y2="50"/>
    <line x1="40.8" y1="18" x2="56.5" y2="50"/>
    <line x1="40.8" y1="18" x2="81" y2="50"/>
    <line x1="40.8" y1="18" x2="105.5" y2="50"/>
    <line x1="40.8" y1="18" x2="130" y2="50"/>
    <!-- L0 node 2 (x=61.7) -->
    <line x1="61.7" y1="18" x2="32" y2="50"/>
    <line x1="61.7" y1="18" x2="56.5" y2="50"/>
    <line x1="61.7" y1="18" x2="81" y2="50"/>
    <line x1="61.7" y1="18" x2="105.5" y2="50"/>
    <line x1="61.7" y1="18" x2="130" y2="50"/>
    <!-- L0 node 3 (x=82.5) -->
    <line x1="82.5" y1="18" x2="32" y2="50"/>
    <line x1="82.5" y1="18" x2="56.5" y2="50"/>
    <line x1="82.5" y1="18" x2="81" y2="50"/>
    <line x1="82.5" y1="18" x2="105.5" y2="50"/>
    <line x1="82.5" y1="18" x2="130" y2="50"/>
    <!-- L0 node 4 (x=103.3) -->
    <line x1="103.3" y1="18" x2="32" y2="50"/>
    <line x1="103.3" y1="18" x2="56.5" y2="50"/>
    <line x1="103.3" y1="18" x2="81" y2="50"/>
    <line x1="103.3" y1="18" x2="105.5" y2="50"/>
    <line x1="103.3" y1="18" x2="130" y2="50"/>
    <!-- L0 node 5 (x=124.2) -->
    <line x1="124.2" y1="18" x2="32" y2="50"/>
    <line x1="124.2" y1="18" x2="56.5" y2="50"/>
    <line x1="124.2" y1="18" x2="81" y2="50"/>
    <line x1="124.2" y1="18" x2="105.5" y2="50"/>
    <line x1="124.2" y1="18" x2="130" y2="50"/>
    <!-- L0 node 6 (x=145) -->
    <line x1="145" y1="18" x2="32" y2="50"/>
    <line x1="145" y1="18" x2="56.5" y2="50"/>
    <line x1="145" y1="18" x2="81" y2="50"/>
    <line x1="145" y1="18" x2="105.5" y2="50"/>
    <line x1="145" y1="18" x2="130" y2="50"/>
  </g>

  <!-- Active/highlighted edges L0->L1 (the "attention" paths) -->
  <g stroke="#00aaff" stroke-width="1.2" opacity="0.5" filter="url(#edgeGlow)">
    <line x1="20" y1="18" x2="32" y2="50"/>
    <line x1="40.8" y1="18" x2="56.5" y2="50"/>
    <line x1="61.7" y1="18" x2="81" y2="50"/>
    <line x1="82.5" y1="18" x2="81" y2="50"/>
    <line x1="103.3" y1="18" x2="105.5" y2="50"/>
    <line x1="145" y1="18" x2="130" y2="50"/>
  </g>

  <!-- ====== EDGES: Layer 1 -> Layer 2 ====== -->
  <g stroke="url(#edgeDim)" stroke-width="0.5" opacity="0.7">
    <!-- L1 node 0 (x=32) to all L2 -->
    <line x1="32" y1="50" x2="52" y2="85"/>
    <line x1="32" y1="50" x2="82" y2="85"/>
    <line x1="32" y1="50" x2="112" y2="85"/>
    <!-- L1 node 1 (x=56.5) -->
    <line x1="56.5" y1="50" x2="52" y2="85"/>
    <line x1="56.5" y1="50" x2="82" y2="85"/>
    <line x1="56.5" y1="50" x2="112" y2="85"/>
    <!-- L1 node 2 (x=81) -->
    <line x1="81" y1="50" x2="52" y2="85"/>
    <line x1="81" y1="50" x2="82" y2="85"/>
    <line x1="81" y1="50" x2="112" y2="85"/>
    <!-- L1 node 3 (x=105.5) -->
    <line x1="105.5" y1="50" x2="52" y2="85"/>
    <line x1="105.5" y1="50" x2="82" y2="85"/>
    <line x1="105.5" y1="50" x2="112" y2="85"/>
    <!-- L1 node 4 (x=130) -->
    <line x1="130" y1="50" x2="52" y2="85"/>
    <line x1="130" y1="50" x2="82" y2="85"/>
    <line x1="130" y1="50" x2="112" y2="85"/>
  </g>

  <!-- Active edges L1->L2 -->
  <g stroke="#00ccee" stroke-width="1.4" opacity="0.6" filter="url(#edgeGlow)">
    <line x1="32" y1="50" x2="52" y2="85"/>
    <line x1="56.5" y1="50" x2="82" y2="85"/>
    <line x1="81" y1="50" x2="82" y2="85"/>
    <line x1="105.5" y1="50" x2="112" y2="85"/>
    <line x1="130" y1="50" x2="112" y2="85"/>
  </g>

  <!-- ====== EDGES: Layer 2 -> Layer 3 ====== -->
  <g stroke="url(#edgeDim)" stroke-width="0.6" opacity="0.8">
    <line x1="52" y1="85" x2="82" y2="120"/>
    <line x1="82" y1="85" x2="82" y2="120"/>
    <line x1="112" y1="85" x2="82" y2="120"/>
  </g>

  <!-- Active edges L2->L3 — brightest, these are the qualified paths -->
  <g stroke="#00ffcc" stroke-width="1.8" opacity="0.75" filter="url(#edgeGlow)">
    <line x1="52" y1="85" x2="82" y2="120"/>
    <line x1="82" y1="85" x2="82" y2="120"/>
    <line x1="112" y1="85" x2="82" y2="120"/>
  </g>

  <!-- ====== NODES ====== -->

  <!-- Layer 0: Input nodes (7) — raw leads, small, white/blue, some dim -->
  <g>
    <!-- Glow halos for active input nodes -->
    <circle cx="20" cy="18" r="6" fill="url(#nodeGlowBlue)" opacity="0.25"/>
    <circle cx="61.7" cy="18" r="6" fill="url(#nodeGlowBlue)" opacity="0.2"/>
    <circle cx="82.5" cy="18" r="6" fill="url(#nodeGlowBlue)" opacity="0.3"/>
    <circle cx="103.3" cy="18" r="6" fill="url(#nodeGlowBlue)" opacity="0.2"/>
    <circle cx="145" cy="18" r="6" fill="url(#nodeGlowBlue)" opacity="0.15"/>

    <!-- Node cores -->
    <circle cx="20" cy="18" r="2.8" fill="#b0d4ff" opacity="0.85" filter="url(#glow)"/>
    <circle cx="40.8" cy="18" r="2" fill="#6688aa" opacity="0.45"/>
    <circle cx="61.7" cy="18" r="2.5" fill="#99ccff" opacity="0.7" filter="url(#glow)"/>
    <circle cx="82.5" cy="18" r="3" fill="#cce0ff" opacity="0.9" filter="url(#glow)"/>
    <circle cx="103.3" cy="18" r="2.5" fill="#99ccff" opacity="0.7" filter="url(#glow)"/>
    <circle cx="124.2" cy="18" r="1.8" fill="#556688" opacity="0.35"/>
    <circle cx="145" cy="18" r="2.2" fill="#88aacc" opacity="0.55" filter="url(#glow)"/>
  </g>

  <!-- Layer 1: Hidden layer (5) — filtering, medium, blue -->
  <g>
    <circle cx="32" cy="50" r="7" fill="url(#nodeGlowBlue)" opacity="0.3"/>
    <circle cx="56.5" cy="50" r="7" fill="url(#nodeGlowBlue)" opacity="0.25"/>
    <circle cx="81" cy="50" r="8" fill="url(#nodeGlowBlue)" opacity="0.4"/>
    <circle cx="105.5" cy="50" r="7" fill="url(#nodeGlowBlue)" opacity="0.3"/>
    <circle cx="130" cy="50" r="6" fill="url(#nodeGlowBlue)" opacity="0.2"/>

    <circle cx="32" cy="50" r="3.2" fill="#00aaff" opacity="0.85" filter="url(#glow)"/>
    <circle cx="56.5" cy="50" r="2.8" fill="#0099dd" opacity="0.7" filter="url(#glow)"/>
    <circle cx="81" cy="50" r="3.8" fill="#00bbff" opacity="0.95" filter="url(#glowStrong)"/>
    <circle cx="105.5" cy="50" r="3" fill="#0099dd" opacity="0.75" filter="url(#glow)"/>
    <circle cx="130" cy="50" r="2.5" fill="#0077aa" opacity="0.6" filter="url(#glow)"/>

    <!-- Inner bright cores -->
    <circle cx="32" cy="50" r="1.2" fill="white" opacity="0.7"/>
    <circle cx="56.5" cy="50" r="1" fill="white" opacity="0.5"/>
    <circle cx="81" cy="50" r="1.5" fill="white" opacity="0.8"/>
    <circle cx="105.5" cy="50" r="1.1" fill="white" opacity="0.6"/>
    <circle cx="130" cy="50" r="0.9" fill="white" opacity="0.4"/>
  </g>

  <!-- Layer 2: Qualifying layer (3) — stronger cyan glow -->
  <g>
    <circle cx="52" cy="85" r="9" fill="url(#nodeGlowCyan)" opacity="0.3"/>
    <circle cx="82" cy="85" r="10" fill="url(#nodeGlowCyan)" opacity="0.45"/>
    <circle cx="112" cy="85" r="9" fill="url(#nodeGlowCyan)" opacity="0.3"/>

    <circle cx="52" cy="85" r="3.8" fill="#00ddcc" opacity="0.85" filter="url(#glow)"/>
    <circle cx="82" cy="85" r="4.5" fill="#00ffdd" opacity="0.95" filter="url(#glowStrong)"/>
    <circle cx="112" cy="85" r="3.8" fill="#00ddcc" opacity="0.85" filter="url(#glow)"/>

    <circle cx="52" cy="85" r="1.5" fill="white" opacity="0.75"/>
    <circle cx="82" cy="85" r="1.8" fill="white" opacity="0.9"/>
    <circle cx="112" cy="85" r="1.5" fill="white" opacity="0.75"/>
  </g>

  <!-- Layer 3: Output node (1) — qualified lead, bright white+cyan -->
  <g>
    <!-- Outer glow ring -->
    <circle cx="82" cy="120" r="16" fill="url(#nodeGlowCyan)" opacity="0.2" filter="url(#glowSoft)"/>
    <circle cx="82" cy="120" r="10" fill="url(#nodeGlowWhite)" opacity="0.35"/>

    <!-- Main node -->
    <circle cx="82" cy="120" r="5.5" fill="#00ffcc" opacity="0.95" filter="url(#glowStrong)"/>
    <!-- Bright core -->
    <circle cx="82" cy="120" r="2.5" fill="white" opacity="0.95"/>
  </g>

  <!-- ====== DECORATIVE: data flow particles along active paths ====== -->
  <g fill="#00aaff" opacity="0.6">
    <!-- Particles on L0->L1 active edges -->
    <circle cx="30" cy="30" r="1"/>
    <circle cx="50" cy="36" r="0.8"/>
    <circle cx="72" cy="33" r="1.1"/>
    <circle cx="95" cy="35" r="0.9"/>
    <circle cx="137" cy="34" r="0.8"/>
  </g>
  <g fill="#00ddee" opacity="0.5">
    <!-- Particles on L1->L2 active edges -->
    <circle cx="42" cy="67" r="1"/>
    <circle cx="69" cy="68" r="0.9"/>
    <circle cx="81.5" cy="67" r="1.1"/>
    <circle cx="108" cy="67" r="1"/>
    <circle cx="121" cy="68" r="0.8"/>
  </g>
  <g fill="#00ffcc" opacity="0.7">
    <!-- Particles on L2->L3 active edges -->
    <circle cx="67" cy="102" r="1.2"/>
    <circle cx="82" cy="103" r="1.3"/>
    <circle cx="97" cy="102" r="1.2"/>
  </g>

  <!-- ====== Funnel outline (very subtle triangular envelope) ====== -->
  <polygon points="12,8 152,8 82,130" fill="none" stroke="#00aaff" stroke-width="0.4" opacity="0.06"/>

  <!-- ====== TEXT: "Agentic Lead Gen" ====== -->
  <g>
    <!-- "AGENTIC" — bold, larger -->
    <text x="174" y="58" font-family="'Inter','SF Pro Display','Helvetica Neue',Arial,sans-serif"
          font-size="22" font-weight="700" letter-spacing="2" fill="white" opacity="0.95">
      AGENTIC
    </text>
    <!-- "LEAD GEN" — lighter, smaller, cyan accent -->
    <text x="174" y="82" font-family="'Inter','SF Pro Display','Helvetica Neue',Arial,sans-serif"
          font-size="14" font-weight="400" letter-spacing="4" fill="#00ddee" opacity="0.8">
      LEAD GEN
    </text>
    <!-- Thin separator line -->
    <line x1="174" y1="64" x2="290" y2="64" stroke="#00aaff" stroke-width="0.6" opacity="0.25"/>

    <!-- Tagline -->
    <text x="174" y="104" font-family="'Inter','SF Pro Display','Helvetica Neue',Arial,sans-serif"
          font-size="7.5" font-weight="300" letter-spacing="1.5" fill="#5588aa" opacity="0.6">
      NEURAL LEAD INTELLIGENCE
    </text>
  </g>

  <!-- ====== Small accent: attention weight visualization ====== -->
  <!-- Tiny bars near the network suggesting activation levels -->
  <g opacity="0.15">
    <rect x="155" y="16" width="2" height="6" rx="1" fill="#00aaff"/>
    <rect x="155" y="26" width="2" height="4" rx="1" fill="#00aaff"/>
    <rect x="155" y="34" width="2" height="8" rx="1" fill="#00ddee"/>
    <rect x="155" y="46" width="2" height="3" rx="1" fill="#00aaff"/>
    <rect x="155" y="53" width="2" height="7" rx="1" fill="#00ddee"/>
    <rect x="155" y="64" width="2" height="5" rx="1" fill="#00ffcc"/>
    <rect x="155" y="73" width="2" height="9" rx="1" fill="#00ffcc"/>
    <rect x="155" y="86" width="2" height="4" rx="1" fill="#00ffcc"/>
  </g>
</svg>