<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 140" width="300" height="140">
  <title>Agentic Lead Gen</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060818"/>
      <stop offset="100%" stop-color="#0c1030"/>
    </linearGradient>

    <!-- Stage 1 faces: wide intake -->
    <linearGradient id="s1top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6b8cff"/>
      <stop offset="100%" stop-color="#8b6bef"/>
    </linearGradient>
    <linearGradient id="s1left" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a55c0"/>
      <stop offset="100%" stop-color="#2a3d90"/>
    </linearGradient>
    <linearGradient id="s1right" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e2d70"/>
      <stop offset="100%" stop-color="#152055"/>
    </linearGradient>

    <!-- Stage 2 faces -->
    <linearGradient id="s2top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a7aee"/>
      <stop offset="100%" stop-color="#7a5ae0"/>
    </linearGradient>
    <linearGradient id="s2left" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3248b0"/>
      <stop offset="100%" stop-color="#243580"/>
    </linearGradient>
    <linearGradient id="s2right" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2565"/>
      <stop offset="100%" stop-color="#121a4a"/>
    </linearGradient>

    <!-- Stage 3 faces -->
    <linearGradient id="s3top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a68dd"/>
      <stop offset="100%" stop-color="#6a48d0"/>
    </linearGradient>
    <linearGradient id="s3left" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a3ca0"/>
      <stop offset="100%" stop-color="#1e2d72"/>
    </linearGradient>
    <linearGradient id="s3right" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#151e58"/>
      <stop offset="100%" stop-color="#0f1540"/>
    </linearGradient>

    <!-- Stage 4 faces: teal output -->
    <linearGradient id="s4top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="s4left" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a9a88"/>
      <stop offset="100%" stop-color="#147a68"/>
    </linearGradient>
    <linearGradient id="s4right" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f6858"/>
      <stop offset="100%" stop-color="#0a5040"/>
    </linearGradient>

    <!-- Output glow -->
    <radialGradient id="outGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>

    <!-- Funnel glow -->
    <radialGradient id="funnelGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6b8cff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6b8cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="140" fill="url(#bg)" rx="4"/>

  <!-- Very subtle isometric grid -->
  <g opacity="0.025" stroke="#8899cc" stroke-width="0.4">
    <line x1="0" y1="110" x2="110" y2="46"/>
    <line x1="30" y1="110" x2="140" y2="46"/>
    <line x1="60" y1="110" x2="170" y2="46"/>
    <line x1="90" y1="110" x2="200" y2="46"/>
    <line x1="120" y1="110" x2="230" y2="46"/>
    <line x1="150" y1="110" x2="260" y2="46"/>
    <line x1="0" y1="110" x2="260" y2="110"/>
    <line x1="10" y1="104" x2="260" y2="104"/>
    <line x1="20" y1="98" x2="260" y2="98"/>
  </g>

  <!-- Ambient glow behind funnel -->
  <ellipse cx="120" cy="60" rx="80" ry="40" fill="url(#funnelGlow)"/>

  <!--
    ISOMETRIC PIPELINE: 4 blocks descending left-to-right
    Each block is a rectangular prism in isometric projection.
    Iso axes: right = (+0.866, +0.5), left = (-0.866, +0.5), up = (0, -1)

    Blocks get narrower (width along iso-depth axis shrinks).
    They step down like a staircase: each one starts lower-right than the last.

    BLOCK GEOMETRY (origin = center of top face):
    Top face: diamond shape
    Left face: left edge + bottom of top + vertical drop
    Right face: right edge + bottom of top + vertical drop
  -->

  <!-- ====== STAGE 1: DISCOVER (widest) ====== -->
  <!-- Top diamond at ~(65, 28), width=60 depth=30, height=16 -->
  <g>
    <!-- Top face -->
    <polygon points="17,46 65,18 113,46 65,74" fill="url(#s1top)"/>
    <!-- Left face -->
    <polygon points="17,46 65,74 65,90 17,62" fill="url(#s1left)"/>
    <!-- Right face -->
    <polygon points="65,74 113,46 113,62 65,90" fill="url(#s1right)"/>
    <!-- Edges -->
    <polygon points="17,46 65,18 113,46 65,74" fill="none" stroke="#8ea8ff" stroke-width="0.7" opacity="0.55"/>
    <line x1="17" y1="46" x2="17" y2="62" stroke="#6680dd" stroke-width="0.5" opacity="0.4"/>
    <line x1="113" y1="46" x2="113" y2="62" stroke="#2a3d80" stroke-width="0.5" opacity="0.3"/>
    <line x1="65" y1="74" x2="65" y2="90" stroke="#4860bb" stroke-width="0.5" opacity="0.35"/>
    <!-- Top face inner detail: subtle grid lines -->
    <line x1="41" y1="32" x2="89" y2="60" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
    <line x1="41" y1="60" x2="89" y2="32" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
  </g>

  <!-- ====== STAGE 2: ENRICH (medium-wide) ====== -->
  <!-- Steps right+down from stage 1 -->
  <g>
    <!-- Top face -->
    <polygon points="85,56 121,35 157,56 121,77" fill="url(#s2top)"/>
    <!-- Left face -->
    <polygon points="85,56 121,77 121,93 85,72" fill="url(#s2left)"/>
    <!-- Right face -->
    <polygon points="121,77 157,56 157,72 121,93" fill="url(#s2right)"/>
    <!-- Edges -->
    <polygon points="85,56 121,35 157,56 121,77" fill="none" stroke="#7e98ee" stroke-width="0.6" opacity="0.5"/>
    <line x1="85" y1="56" x2="85" y2="72" stroke="#5570cc" stroke-width="0.5" opacity="0.35"/>
    <line x1="157" y1="56" x2="157" y2="72" stroke="#253575" stroke-width="0.5" opacity="0.25"/>
    <line x1="121" y1="77" x2="121" y2="93" stroke="#3d55aa" stroke-width="0.5" opacity="0.3"/>
    <!-- Top face detail -->
    <line x1="103" y1="45.5" x2="139" y2="66.5" stroke="#ffffff" stroke-width="0.3" opacity="0.07"/>
  </g>

  <!-- ====== STAGE 3: QUALIFY (narrow) ====== -->
  <g>
    <!-- Top face -->
    <polygon points="137,66 163,51 189,66 163,81" fill="url(#s3top)"/>
    <!-- Left face -->
    <polygon points="137,66 163,81 163,95 137,80" fill="url(#s3left)"/>
    <!-- Right face -->
    <polygon points="163,81 189,66 189,80 163,95" fill="url(#s3right)"/>
    <!-- Edges -->
    <polygon points="137,66 163,51 189,66 163,81" fill="none" stroke="#6e88dd" stroke-width="0.6" opacity="0.45"/>
    <line x1="137" y1="66" x2="137" y2="80" stroke="#4a60bb" stroke-width="0.5" opacity="0.3"/>
    <line x1="189" y1="66" x2="189" y2="80" stroke="#1e2d60" stroke-width="0.5" opacity="0.2"/>
    <line x1="163" y1="81" x2="163" y2="95" stroke="#3548a0" stroke-width="0.5" opacity="0.25"/>
  </g>

  <!-- ====== STAGE 4: CONVERT (smallest, teal) ====== -->
  <g>
    <!-- Top face -->
    <polygon points="178,74 198,62 218,74 198,86" fill="url(#s4top)"/>
    <!-- Left face -->
    <polygon points="178,74 198,86 198,98 178,86" fill="url(#s4left)"/>
    <!-- Right face -->
    <polygon points="198,86 218,74 218,86 198,98" fill="url(#s4right)"/>
    <!-- Edges -->
    <polygon points="178,74 198,62 218,74 198,86" fill="none" stroke="#5eeacc" stroke-width="0.8" opacity="0.65"/>
    <line x1="178" y1="74" x2="178" y2="86" stroke="#30b8a0" stroke-width="0.5" opacity="0.4"/>
    <line x1="218" y1="74" x2="218" y2="86" stroke="#0f6050" stroke-width="0.5" opacity="0.3"/>
    <line x1="198" y1="86" x2="198" y2="98" stroke="#20a888" stroke-width="0.5" opacity="0.35"/>
    <!-- Output glow -->
    <ellipse cx="198" cy="78" rx="16" ry="10" fill="url(#outGlow)"/>
  </g>

  <!-- ====== FLOW ARROWS: isometric diamond particles ====== -->
  <!-- Between stage 1 and 2 -->
  <polygon points="96,46 99,44.5 102,46 99,47.5" fill="#8ba4ff" opacity="0.65"/>
  <polygon points="102,50 105,48.5 108,50 105,51.5" fill="#8ba4ff" opacity="0.45"/>

  <!-- Between stage 2 and 3 -->
  <polygon points="152,58 155,56.5 158,58 155,59.5" fill="#7b94ee" opacity="0.55"/>

  <!-- Between stage 3 and 4 -->
  <polygon points="190,68 193,66.5 196,68 193,69.5" fill="#4aded0" opacity="0.65"/>

  <!-- ====== INCOMING DATA CUBES (left side) ====== -->
  <!-- Tiny isometric cubes floating toward funnel -->

  <!-- Cube A -->
  <g opacity="0.65">
    <polygon points="5,38 10,35.5 15,38 10,40.5" fill="#6b8cff"/>
    <polygon points="5,38 10,40.5 10,44 5,41.5" fill="#3a55c0"/>
    <polygon points="10,40.5 15,38 15,41.5 10,44" fill="#1e2d70"/>
  </g>

  <!-- Cube B -->
  <g opacity="0.5">
    <polygon points="0,52 4.5,49.5 9,52 4.5,54.5" fill="#7090ff"/>
    <polygon points="0,52 4.5,54.5 4.5,57.5 0,55" fill="#4060cc"/>
    <polygon points="4.5,54.5 9,52 9,55 4.5,57.5" fill="#253880"/>
  </g>

  <!-- Cube C -->
  <g opacity="0.55">
    <polygon points="8,58 12.5,55.5 17,58 12.5,60.5" fill="#5d80ee"/>
    <polygon points="8,58 12.5,60.5 12.5,63.5 8,61" fill="#3450b0"/>
    <polygon points="12.5,60.5 17,58 17,61 12.5,63.5" fill="#1c2e68"/>
  </g>

  <!-- Cube D -->
  <g opacity="0.4">
    <polygon points="3,68 7,66 11,68 7,70" fill="#6888ee"/>
    <polygon points="3,68 7,70 7,73 3,71" fill="#3855bb"/>
    <polygon points="7,70 11,68 11,71 7,73" fill="#203370"/>
  </g>

  <!-- Cube E -->
  <g opacity="0.45">
    <polygon points="12,72 16,70 20,72 16,74" fill="#5e7cdd"/>
    <polygon points="12,72 16,74 16,77 12,75" fill="#3248a0"/>
    <polygon points="16,74 20,72 20,75 16,77" fill="#1a2860"/>
  </g>

  <!-- Flow lines from cubes to stage 1 -->
  <line x1="15" y1="38" x2="17" y2="46" stroke="#6b8cff" stroke-width="0.6" opacity="0.2" stroke-dasharray="2 2"/>
  <line x1="9" y1="52" x2="17" y2="50" stroke="#6b8cff" stroke-width="0.5" opacity="0.15" stroke-dasharray="2 2"/>
  <line x1="17" y1="58" x2="17" y2="54" stroke="#6b8cff" stroke-width="0.5" opacity="0.15" stroke-dasharray="2 2"/>

  <!-- ====== OUTPUT: qualified lead gems (right side) ====== -->

  <!-- Primary output gem -->
  <g>
    <polygon points="232,72 240,68 248,72 240,76" fill="#2dd4bf" opacity="0.85"/>
    <polygon points="232,72 240,76 240,81 232,77" fill="#1a9a88" opacity="0.85"/>
    <polygon points="240,76 248,72 248,77 240,81" fill="#0f6858" opacity="0.85"/>
    <polygon points="236,72 240,70 244,72 240,74" fill="#5eeacc" opacity="0.4"/>
    <ellipse cx="240" cy="74" rx="10" ry="6" fill="url(#outGlow)" opacity="0.5"/>
  </g>

  <!-- Secondary output gem (smaller, dimmer) -->
  <g opacity="0.5">
    <polygon points="248,80 254,77.5 260,80 254,82.5" fill="#34d399"/>
    <polygon points="248,80 254,82.5 254,86 248,83.5" fill="#1ea078"/>
    <polygon points="254,82.5 260,80 260,83.5 254,86" fill="#127058"/>
  </g>

  <!-- Dashed flow line from stage 4 to output gems -->
  <line x1="218" y1="74" x2="232" y2="72" stroke="#2dd4bf" stroke-width="0.8" opacity="0.35" stroke-dasharray="3 2"/>
  <line x1="248" y1="77" x2="248" y2="80" stroke="#34d399" stroke-width="0.5" opacity="0.25" stroke-dasharray="2 1.5"/>

  <!-- ====== AI SPARKLE: tiny diamond on stage 4 top ====== -->
  <polygon points="198,69 200,68 202,69 200,70" fill="#ffffff" opacity="0.7"/>
  <polygon points="195,73 196.5,72.2 198,73 196.5,73.8" fill="#ffffff" opacity="0.4"/>

  <!-- ====== TEXT ====== -->
  <text x="150" y="126"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="12.5"
        font-weight="700"
        fill="#c0d0ff"
        text-anchor="middle"
        letter-spacing="4"
        opacity="0.88">AGENTIC LEAD GEN</text>

  <!-- Accent underline -->
  <line x1="68" y1="130.5" x2="232" y2="130.5" stroke="#3a55cc" stroke-width="0.4" opacity="0.2"/>
  <!-- Teal accent segment under "LEAD" area -->
  <line x1="135" y1="130.5" x2="175" y2="130.5" stroke="#2dd4bf" stroke-width="0.5" opacity="0.25"/>

  <!-- ====== AMBIENT PARTICLES ====== -->
  <circle cx="260" cy="40" r="0.7" fill="#7b9fff" opacity="0.25"/>
  <circle cx="275" cy="55" r="0.5" fill="#ffffff" opacity="0.18"/>
  <circle cx="285" cy="35" r="0.4" fill="#8ba4ff" opacity="0.2"/>
  <circle cx="270" cy="85" r="0.5" fill="#5eeacc" opacity="0.15"/>
  <circle cx="282" cy="70" r="0.6" fill="#7b9fff" opacity="0.2"/>
  <circle cx="255" cy="95" r="0.4" fill="#ffffff" opacity="0.12"/>
  <circle cx="290" cy="50" r="0.3" fill="#ffffff" opacity="0.15"/>
</svg>