[package]
name = "leadgen-metal"
version = "0.1.0"
edition = "2021"

[dependencies]
icp        = { path = "../icp", features = ["scoring", "calibration", "optim"] }
libc       = "0.2"
memmap2    = "0.9"
tokio      = { workspace = true }
reqwest    = { workspace = true }
serde      = { workspace = true }
serde_json = { workspace = true }
crossbeam  = "0.8"
parking_lot = "0.12"
ahash      = "0.8"
bytemuck   = { version = "1", features = ["derive"] }
crc32fast  = "1"
roaring    = "0.10"
regex      = { workspace = true }
scraper    = { workspace = true, optional = true }
anyhow     = { workspace = true }
base64     = { workspace = true }
tracing    = { workspace = true }
tracing-subscriber = { version = "0.3" }
uuid       = { workspace = true }
clap       = { workspace = true }
chrono     = { workspace = true }
ort        = { workspace = true, optional = true }
tokenizers = { workspace = true, optional = true }
ndarray    = { workspace = true, optional = true }

[features]
default = ["safe", "kernel"]
safe = ["scraper"]
kernel-btree = []
kernel-scoring = []
kernel-html = []
kernel-arena = []
kernel-timer = []
kernel-crc = []
kernel-ner = []
kernel-ring = []
kernel-eval = ["kernel-scoring"]
kernel-extract = ["safe"]
kernel-intent = ["kernel-scoring"]
kernel-spam = ["kernel-scoring"]
kernel-techwolf = ["kernel-ner"]
kernel-bge = ["ort", "tokenizers", "ndarray"]
kernel-ner-transformer = ["ort", "tokenizers", "ndarray"]
kernel-reranker = ["ort", "tokenizers", "ndarray"]
kernel-skill-extraction = ["ort", "tokenizers", "ndarray"]
kernel-jobbert-v3 = ["ort", "tokenizers", "ndarray"]
kernel = ["kernel-btree", "kernel-scoring", "kernel-html", "kernel-arena", "kernel-timer", "kernel-crc", "kernel-ner", "kernel-ring", "kernel-eval", "kernel-extract", "kernel-intent", "kernel-spam", "kernel-techwolf"]
kernel-ml = ["kernel", "kernel-bge", "kernel-ner-transformer", "kernel-reranker", "kernel-skill-extraction", "kernel-jobbert-v3"]

[dev-dependencies]
tempfile = "3"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true
