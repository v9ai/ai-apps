[package]
name = "leadgen-metal"
version = "0.1.0"
edition = "2021"

[dependencies]
libc = "0.2"
memmap2 = "0.9"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
crossbeam = "0.8"
parking_lot = "0.12"
ahash = "0.8"
bytemuck = { version = "1", features = ["derive"] }
crc32fast = "1"
roaring = "0.10"
regex = "1"
scraper = { version = "0.20", optional = true }
anyhow = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
uuid = { version = "1", features = ["v4"] }
clap = { version = "4", features = ["derive"] }
chrono = { version = "0.4", features = ["serde"] }

[features]
default = ["safe", "kernel"]
safe = ["scraper"]
kernel-btree = []
kernel-scoring = []
kernel-html = []
kernel-arena = []
kernel-timer = []
kernel-crc = []
kernel-ner = []
kernel-ring = []
kernel-eval = ["kernel-scoring"]
kernel-extract = ["safe"]
kernel-intent = ["kernel-scoring"]
kernel = ["kernel-btree", "kernel-scoring", "kernel-html", "kernel-arena", "kernel-timer", "kernel-crc", "kernel-ner", "kernel-ring", "kernel-eval", "kernel-extract", "kernel-intent"]

[dev-dependencies]
tempfile = "3"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true
