[package]
name = "github-patterns"
version = "0.1.0"
edition = "2021"
description = "GitHub API client for detecting lead-gen signals: AI adoption, tech stack, activity, and hiring patterns"

[features]
default  = ["client"]
client   = ["dep:reqwest", "dep:tokio", "dep:anyhow"]
search   = ["client"]
patterns = ["client", "dep:futures", "dep:toml"]
# Local BERT semantic scoring via candle — no cloud, runs on Metal / CPU
embed    = ["patterns", "dep:candle"]
# Neon PostgreSQL writer + scan binary
neon     = ["patterns", "dep:sqlx", "dep:dotenvy", "dep:tracing-subscriber",
            "tokio/macros", "tokio/rt-multi-thread"]
# LanceDB contributor store + scrape_contributors binary
lance    = ["client", "dep:lancedb", "dep:arrow-array", "dep:arrow-schema",
            "dep:futures", "dep:dotenvy", "dep:tracing-subscriber",
            "tokio/macros", "tokio/rt-multi-thread"]
# Embed contributor bio+repos text into LanceDB for semantic search
contrib-embed = ["lance", "embed"]
# ICP feature bridge — map Candidate → Vec<f32> for ML scorers (no leadgen dep)
icp      = ["lance", "icp-crate/contributor"]

[dependencies]
serde       = { workspace = true }
serde_json  = { workspace = true }
thiserror   = { workspace = true }
async-trait = { workspace = true }
tracing     = { workspace = true }
chrono      = { workspace = true }
base64      = { workspace = true }
regex       = { workspace = true }

icp-crate = { package = "icp", path = "../icp", default-features = false }
reqwest = { workspace = true, optional = true }
tokio   = { version = "1", features = ["time"], optional = true }
anyhow  = { workspace = true, optional = true }
futures = { workspace = true, features = ["std"], optional = true }
toml    = { version = "0.8", optional = true }
candle  = { workspace = true, optional = true }
sqlx    = { workspace = true, optional = true }
dotenvy = { workspace = true, optional = true }
tracing-subscriber = { workspace = true, optional = true }
lancedb     = { workspace = true, optional = true }
arrow-array = { workspace = true, optional = true }
arrow-schema = { workspace = true, optional = true }

[[bin]]
name = "scan_orgs"
path = "src/bin/scan_orgs.rs"
required-features = ["neon"]

[[bin]]
name = "scrape_contributors"
path = "src/bin/scrape_contributors.rs"
required-features = ["lance"]

[[bin]]
name = "export_contributors"
path = "src/bin/export_contributors.rs"
required-features = ["lance", "neon"]

[[bin]]
name = "search_candidates"
path = "src/bin/search_candidates.rs"
required-features = ["lance", "neon"]

[dev-dependencies]
tokio = { workspace = true }
