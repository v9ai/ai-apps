[package]
name = "ats"
version = "0.1.0"
edition = "2021"
description = "Lightweight Greenhouse job board API consumer with parallel fetching"

[lib]
name = "ats"
path = "src/lib.rs"

[dependencies]
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
anyhow = "1"
tracing = "0.1"
