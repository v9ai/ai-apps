[package]
name = "ats"
version = "0.1.0"
edition = "2021"
description = "Lightweight Greenhouse job board API consumer with parallel fetching"

[lib]
name = "ats"
path = "src/lib.rs"

[[bin]]
name = "ats-fetch"
path = "src/main.rs"

[dependencies]
reqwest    = { workspace = true }
serde      = { workspace = true }
serde_json = { workspace = true }
tokio      = { workspace = true }
anyhow     = { workspace = true }
tracing    = { workspace = true }
tracing-subscriber = { workspace = true }
