[package]
name = "agentic-search"
version = "0.1.0"
edition = "2021"
description = "Cost-aware agentic codebase search — Glob → Grep → Read tool hierarchy driven by DeepSeek"

[[bin]]
name = "agentic-search"
path = "src/main.rs"

[dev-dependencies]
tempfile = "3"

[dependencies]
anyhow     = { workspace = true }
clap       = { workspace = true }
dotenvy    = { workspace = true }
glob       = "0.3"
regex      = { workspace = true }
reqwest    = { workspace = true }
serde      = { workspace = true }
serde_json = { workspace = true }
tokio      = { workspace = true }
tracing    = { workspace = true }
tracing-subscriber = { workspace = true }
walkdir    = { workspace = true }
