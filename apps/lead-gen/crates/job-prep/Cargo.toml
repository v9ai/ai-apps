[package]
name = "job-prep"
version = "0.1.0"
edition = "2021"
description = "Interview prep, agentic coding training, and job market research via DeepSeek + Semantic Scholar"

[[bin]]
name = "job-prep"
path = "src/bin/research_agent.rs"

[[bin]]
name = "job-prep-1"
path = "src/bin/lead_gen_research_1.rs"

[[bin]]
name = "job-prep-2"
path = "src/bin/lead_gen_research_2.rs"

[[bin]]
name = "job-prep-3"
path = "src/bin/lead_gen_research_3.rs"

[[bin]]
name = "job-prep-4"
path = "src/bin/lead_gen_research_4.rs"

[[bin]]
name = "job-prep-5"
path = "src/bin/lead_gen_research_5.rs"

[[bin]]
name = "job-prep-6"
path = "src/bin/lead_gen_research_6.rs"

[[bin]]
name = "job-prep-7"
path = "src/bin/lead_gen_research_7.rs"

[[bin]]
name = "job-prep-8"
path = "src/bin/lead_gen_research_8.rs"

[[bin]]
name = "job-prep-9"
path = "src/bin/lead_gen_research_9.rs"

[[bin]]
name = "job-prep-all"
path = "src/bin/lead_gen_research_all.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
anyhow = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
async-trait = "0.1"
reqwest = { version = "0.12", features = ["json"] }
dotenvy = "0.15"
url = "2"
research = { path = "../../../../crates/research" }
deepseek = { path = "../../../../crates/deepseek" }

[dev-dependencies]
axum = "0.8"
tempfile = "3"
