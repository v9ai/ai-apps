[package]
name = "linkedin-posts"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Local LinkedIn posts storage — axum HTTP server backed by LanceDB"

[lib]
name = "linkedin_posts"
path = "src/lib.rs"

[[bin]]
name = "linkedin-posts"
path = "src/main.rs"

[[bin]]
name = "process-posts"
path = "src/bin/process_posts.rs"

[dependencies]
lancedb = "0.27"
arrow-array = "57"
arrow-schema = "57"
axum = { version = "0.8", features = ["json"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tower-http = { version = "0.6", features = ["cors"] }
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
futures = "0.3"
tokio-postgres = "0.7"
tokio-postgres-rustls = "0.13"
rustls = { version = "0.23", features = ["ring"] }
webpki-roots = "1"
