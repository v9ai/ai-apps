[package]
name = "company-cleanup"
version = "0.1.0"
edition = "2021"
description = "Candle ML + LanceDB kNN classifier — identifies and removes crypto/blockchain companies from the lead-gen DB"

[features]
default = ["metal"]
metal = ["candle-core/metal", "candle-nn/metal", "candle-transformers/metal"]

[[bin]]
name = "cleanup"
path = "src/bin/cleanup.rs"

[dependencies]
candle-core         = "0.8"
candle-nn           = "0.8"
candle-transformers = "0.8"
hf-hub              = "0.4"
tokenizers          = "0.21"
lancedb             = "0.27"
arrow-array         = "57"
arrow-schema        = "57"
futures             = "0.3"
sqlx                = { version = "0.8", features = ["runtime-tokio", "postgres", "tls-rustls"] }
tokio               = { version = "1", features = ["full"] }
serde               = { version = "1", features = ["derive"] }
serde_json          = "1"
anyhow              = "1"
tracing             = "0.1"
tracing-subscriber  = { version = "0.3", features = ["env-filter"] }
