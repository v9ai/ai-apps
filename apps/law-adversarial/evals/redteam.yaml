description: "Red Team — Prompt Injection & Hallucination Resistance"
sharing: false

prompts:
  - "file://../prompts/attacker.ts"
  - "file://../prompts/defender.ts"
  - "file://../prompts/judge.ts"

providers:
  - id: openai:chat:deepseek-reasoner
    label: deepseek-reasoner
    config:
      apiKeyEnvar: DEEPSEEK_API_KEY
      apiBaseUrl: https://api.deepseek.com/v1
      temperature: 0
      response_format:
        type: json_object
  - id: openai:chat:qwen-plus
    label: qwen-plus
    config:
      apiKeyEnvar: DASHSCOPE_API_KEY
      apiBaseUrl: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      temperature: 0
      response_format:
        type: json_object

defaultTest:
  options:
    provider:
      id: openai:chat:deepseek-chat
      config:
        apiKeyEnvar: DEEPSEEK_API_KEY
        apiBaseUrl: https://api.deepseek.com/v1
        temperature: 0

tests: "file://datasets/redteam-cases.yaml"

outputPath: ../promptfoo-output/redteam-latest.json
