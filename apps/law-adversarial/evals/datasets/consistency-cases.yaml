# Case 8: Novel AI-evidence theory (40-65 expected) — untested legal theory about AI-generated evidence
- vars:
    brief: |
      MEMORANDUM IN SUPPORT OF MOTION IN LIMINE
      Admissibility of AI-Generated Evidence Under Federal Rules of Evidence

      I. INTRODUCTION
      Defendant seeks to exclude Plaintiff's Exhibit 14 — a damage assessment report generated by Plaintiff's proprietary "LegalMind AI" system. The report purports to calculate Plaintiff's lost profits using machine learning analysis of industry data.

      II. AI-GENERATED REPORTS ARE NOT ADMISSIBLE UNDER THE FEDERAL RULES
      A. Hearsay — Rule 802
      The AI-generated report constitutes hearsay under FRE 801(c). It is an out-of-court "statement" offered for the truth of the matter asserted — namely, the damage amount. While traditional computer-generated evidence may be non-hearsay under the "machine-generated" exception, AI systems that exercise judgment-like functions cross the line into assertive conduct. See Lorraine v. Markel American Insurance Co., 241 F.R.D. 534 (D. Md. 2007) (comprehensive framework for electronic evidence admissibility).

      B. Confrontation — Sixth Amendment (if applicable)
      In criminal cases, AI-generated evidence raises Confrontation Clause issues under Crawford v. Washington, 541 U.S. 36 (2004). While this is a civil case, the due process analogue applies: Plaintiff cannot rely on a "witness" that cannot be cross-examined. The AI system's reasoning is opaque — a "black box" — and Defendant has no meaningful opportunity to challenge its conclusions.

      C. Expert Testimony — Rule 702 and Daubert
      If treated as expert opinion, the AI report must satisfy Daubert v. Merrell Dow Pharmaceuticals, Inc., 509 U.S. 579 (1993). The report fails because: (1) the methodology cannot be tested — the model's weights and architecture are proprietary; (2) the error rate is unknown; (3) there is no peer review of this specific model; (4) the "general acceptance" prong fails because AI damage assessment lacks acceptance in the legal community.

      III. POLICY CONSIDERATIONS
      Admitting AI-generated evidence without adequate safeguards creates a risk of "automation bias" — the tendency to over-rely on computer-generated outputs. Courts should require, at minimum: disclosure of training data, model architecture, and validation methodology before admitting AI evidence.
