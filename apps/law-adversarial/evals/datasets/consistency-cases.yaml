# Case 3: Strong brief (50-70 expected) — well-researched employment discrimination with minor procedural gaps
- vars:
    brief: |
      MEMORANDUM IN SUPPORT OF MOTION FOR PARTIAL SUMMARY JUDGMENT
      Title VII Disparate Treatment — Race Discrimination

      I. UNDISPUTED FACTS
      Plaintiff, an African-American senior engineer with 12 years of exemplary performance reviews, was passed over for promotion to Engineering Director in favor of a white candidate with 3 years of experience. The decision-maker, VP of Engineering Marcus Webb, made the selection without a formal interview process. Three other African-American engineers in the department were similarly passed over during 2023-2024. Statistical analysis by Dr. Elena Rodriguez (Plaintiff's expert) shows the promotion rate for African-American engineers was 4.2% versus 18.7% for white engineers during 2020-2024 (p < 0.01).

      II. MCDONNELL DOUGLAS FRAMEWORK
      Under McDonnell Douglas Corp. v. Green, 411 U.S. 792 (1973), Plaintiff establishes a prima facie case: (1) member of a protected class; (2) qualified for the position — 12 years experience, exemplary reviews; (3) suffered adverse action — denied promotion; (4) position filled by someone outside the protected class.

      III. PRETEXT
      Defendant's stated reason — "better cultural fit" — is pretextual. In Ash v. Tyson Foods, Inc., 546 U.S. 454 (2006), the Supreme Court held that subjective criteria like "cultural fit" can be evidence of pretext when applied inconsistently. Here, "cultural fit" was never used in prior promotion decisions and was first invoked to deny Plaintiff's promotion. See also Reeves v. Sanderson Plumbing Products, Inc., 530 U.S. 133, 147 (2000) (prima facie case plus disbelief of employer's reason may suffice for judgment as a matter of law).

      IV. STATISTICAL EVIDENCE
      The statistical disparity (4.2% vs. 18.7%, p < 0.01) corroborates the individual claim. Bazemore v. Friday, 478 U.S. 385, 400 (1986) (statistical evidence admissible in Title VII cases). Defendant has offered no rebuttal expert.
    attackerOutput: |
      {
        "attacks": [
          {
            "claim": "Plaintiff establishes a prima facie case under McDonnell Douglas",
            "weakness": "The prima facie case is well-pled but the brief does not address Defendant's likely argument that the position required specific technical skills or leadership certifications that the selected candidate possessed. The brief should preemptively address qualifications comparisons beyond just years of experience.",
            "type": "legal",
            "evidence": "Texas Dep't of Cmty. Affairs v. Burdine, 450 U.S. 248, 254 (1981) (employer's burden is only production, not persuasion — the brief must anticipate legitimate reasons)."
          },
          {
            "claim": "Statistical evidence corroborates the individual claim",
            "weakness": "The statistical analysis may face a Daubert challenge. The brief does not address: (1) whether the sample size is sufficient for the specific department; (2) whether the analysis controls for relevant variables (education, certifications, performance tier); (3) the expert's methodology. A Daubert motion could exclude the statistics.",
            "type": "factual",
            "evidence": "Daubert v. Merrell Dow Pharmaceuticals, Inc., 509 U.S. 579 (1993); Wal-Mart Stores v. Dukes, 564 U.S. 338, 357 (2011) (statistical evidence must account for relevant distinctions)."
          }
        ]
      }
    defenderOutput: |
      {
        "rebuttals": [
          {
            "attack_ref": "brief does not address Defendant's likely argument about specific technical skills",
            "defense": "On summary judgment, Plaintiff need not disprove every conceivable justification — only show that the stated reason is pretextual. The brief properly focuses on the 'cultural fit' reason actually given. If Defendant raises new reasons in opposition, Plaintiff can address them in reply.",
            "supporting_citations": ["Reeves v. Sanderson Plumbing Products, Inc., 530 U.S. 133 (2000)", "Burdine, 450 U.S. at 256"],
            "strength": 0.6
          },
          {
            "attack_ref": "statistical analysis may face a Daubert challenge",
            "defense": "The Daubert concern is valid and the brief should be stronger on methodology. However, the statistics are supplementary to the individual claim — even without them, the McDonnell Douglas case is strong. The brief should add a paragraph on Dr. Rodriguez's methodology and controls.",
            "supporting_citations": ["Bazemore v. Friday, 478 U.S. 385 (1986)", "Teamsters v. United States, 431 U.S. 324 (1977)"],
            "strength": 0.5
          }
        ]
      }
    jurisdiction: "Federal"
    round: "1"
    previousFindings: "[]"
  assert:
    - type: javascript
      value: "file://assertions/validate-judge.js"
    - type: javascript
      value: |
        module.exports = (output) => {
          const parsed = typeof output === 'string' ? JSON.parse(output) : output;
          if (parsed.overall_score < 50 || parsed.overall_score > 70) {
            return { pass: false, score: 0, reason: `Score ${parsed.overall_score} outside expected 50-70 range for a strong brief with minor gaps` };
          }
          const hasCritical = parsed.findings.some(f => f.severity === 'critical');
          if (hasCritical) {
            return { pass: false, score: 0, reason: 'No critical findings expected for a well-researched brief with minor gaps' };
          }
          return { pass: true, score: 1, reason: `Score ${parsed.overall_score} — appropriate for strong brief` };
        };
    - type: llm-rubric
      value: >
        This is a well-researched Title VII brief with proper McDonnell Douglas framework,
        real citations (Ash v. Tyson Foods, Reeves, Bazemore), and strong factual allegations.
        The attacker raises two valid but non-fatal points: (1) anticipating alternative
        qualifications arguments and (2) Daubert vulnerability of the statistics. The defender
        mounts reasonable rebuttals. The judge should score 50-70 with medium-severity findings
        only — no critical defects. The brief demonstrates competent legal research with
        refinement-level gaps. Rate on whether the judge correctly calibrates severity for
        a genuinely strong brief.

# Case 4: Procedural-only flaw (60-80 expected) — good law, bad filing procedure
- vars:
    brief: |
      MOTION FOR TEMPORARY RESTRAINING ORDER
      Environmental Contamination — Clean Water Act

      I. FACTUAL BACKGROUND
      Defendant ChemFlow Industries has been discharging industrial wastewater containing PFAS compounds into the Cedar River since approximately January 2024. EPA monitoring data (attached as Exhibit A) shows PFAS levels at 127 ppt, exceeding the EPA's health advisory level of 70 ppt by 81%. The discharge point is 2.3 miles upstream of the municipal water intake for the City of Riverside (population 45,000).

      II. LIKELIHOOD OF SUCCESS — Clean Water Act Section 505
      Citizen suits under CWA Section 505, 33 U.S.C. Section 1365, are authorized when the EPA has not commenced enforcement. Gwaltney of Smithfield, Ltd. v. Chesapeake Bay Foundation, 484 U.S. 49, 56 (1987) (citizen suits require allegation of ongoing or intermittent violation). The discharge is ongoing — EPA's most recent sampling (February 2025) confirmed continued exceedance.

      III. IRREPARABLE HARM
      PFAS contamination of drinking water supplies constitutes irreparable harm. These compounds are persistent, bioaccumulative, and linked to cancer, thyroid disease, and immune suppression. Monetary damages cannot restore water quality or reverse public health exposure. See Amoco Production Co. v. Village of Gambell, 480 U.S. 531, 545 (1987) (environmental harm may be irreparable).

      IV. BALANCE OF EQUITIES AND PUBLIC INTEREST
      The balance favors Plaintiff. Defendant can install filtration systems; the public cannot un-drink contaminated water. The public interest in clean drinking water is paramount. See Tennessee Valley Authority v. Hill, 437 U.S. 153 (1978) (environmental protection reflects congressional policy priority).

      V. RELIEF REQUESTED
      Plaintiff requests the Court immediately order Defendant to cease all discharges into Cedar River.
    attackerOutput: |
      {
        "attacks": [
          {
            "claim": "Citizen suits under CWA Section 505 are authorized when the EPA has not commenced enforcement",
            "weakness": "The brief fails to demonstrate compliance with CWA Section 505(b)(1)(A), which requires 60 days' notice to the EPA, the state, and the alleged violator before filing a citizen suit. This is a jurisdictional prerequisite. If notice was not given, the court lacks subject matter jurisdiction. Hallstrom v. Tillamook County, 493 U.S. 20 (1989).",
            "type": "procedural",
            "evidence": "33 U.S.C. Section 1365(b)(1)(A); Hallstrom v. Tillamook County, 493 U.S. 20 (1989) (60-day notice is mandatory and jurisdictional)."
          },
          {
            "claim": "Plaintiff requests the Court immediately order Defendant to cease all discharges",
            "weakness": "A TRO cannot be issued ex parte unless the movant certifies that immediate and irreparable injury will result before the adverse party can be heard. FRCP 65(b)(1). The brief does not address whether notice was given to Defendant or why ex parte relief is necessary. Also, the brief does not include the required security bond under FRCP 65(c).",
            "type": "procedural",
            "evidence": "Fed. R. Civ. P. 65(b)(1) (ex parte TRO requirements); Fed. R. Civ. P. 65(c) (security requirement)."
          }
        ]
      }
    defenderOutput: |
      {
        "rebuttals": [
          {
            "attack_ref": "fails to demonstrate compliance with CWA Section 505(b)(1)(A) 60-day notice requirement",
            "defense": "The attacker raises a critical procedural point. However, an exception to the 60-day notice requirement exists for citizen suits alleging violations of Sections 301(a) and 306 — if the violation is of an effluent standard or limitation. The brief should address whether this exception applies and, if 60-day notice was sent, should attach proof of notice.",
            "supporting_citations": ["33 U.S.C. Section 1365(b)(1)(A)", "Natural Resources Defense Council v. Southwest Marine, Inc., 236 F.3d 985 (9th Cir. 2000)"],
            "strength": 0.35
          },
          {
            "attack_ref": "brief does not address ex parte TRO requirements or security bond",
            "defense": "The FRCP 65(b) and (c) issues are valid procedural omissions. The brief should be refiled with: (1) a certification explaining why immediate relief is needed before a hearing; (2) a proposed security bond amount; (3) proof of notice to Defendant or explanation of why ex parte relief is warranted. These are fixable drafting deficiencies, not substantive legal flaws.",
            "supporting_citations": ["Fed. R. Civ. P. 65(b)(1)", "Fed. R. Civ. P. 65(c)"],
            "strength": 0.25
          }
        ]
      }
    jurisdiction: "Federal"
    round: "1"
    previousFindings: "[]"
  assert:
    - type: javascript
      value: "file://assertions/validate-judge.js"
    - type: javascript
      value: |
        module.exports = (output) => {
          const parsed = typeof output === 'string' ? JSON.parse(output) : output;
          if (parsed.overall_score < 60 || parsed.overall_score > 80) {
            return { pass: false, score: 0, reason: `Score ${parsed.overall_score} outside expected 60-80 range — good law but bad procedure` };
          }
          // Should have procedural findings
          const procFindings = parsed.findings.filter(f => f.type === 'procedural');
          if (procFindings.length === 0) {
            return { pass: false, score: 0, reason: 'Expected procedural findings for a brief with filing procedure deficiencies' };
          }
          return { pass: true, score: 1, reason: `Score ${parsed.overall_score}, ${procFindings.length} procedural findings — appropriate` };
        };
    - type: llm-rubric
      value: >
        This brief has excellent substantive law — CWA Section 505, Gwaltney, proper
        irreparable harm and balance analysis with real citations. However, it has significant
        procedural omissions: (1) no evidence of 60-day notice requirement compliance (Hallstrom
        makes this jurisdictional); (2) no FRCP 65(b) ex parte certification; (3) no FRCP 65(c)
        security bond. The judge should score 60-80: the law is sound, the facts are compelling,
        but the procedural gaps could be case-ending if not cured. Procedural findings should be
        high severity (60-day notice) and medium severity (FRCP 65 requirements). Legal findings
        should be low/none — the substantive analysis is competent.

# Case 5: Fabricated citations (5-20 expected) — multiple fake cases cited
- vars:
    brief: |
      MEMORANDUM IN SUPPORT OF MOTION FOR NEW TRIAL
      Federal Rule of Civil Procedure 59

      The jury's verdict of $2.1 million in compensatory damages should be set aside because it is against the manifest weight of the evidence.

      I. STANDARD OF REVIEW
      Under the Supreme Court's decision in Blackstone v. American Jury Systems, Inc., 603 U.S. 115 (2025), trial courts have an enhanced duty to scrutinize jury verdicts in complex commercial litigation. Blackstone established a three-part "reliability inquiry" requiring courts to assess: (1) whether the jury received adequate expert guidance, (2) whether the damages methodology was scientifically valid, and (3) whether the verdict amount falls within a "zone of reasonableness."

      II. THE VERDICT FAILS THE BLACKSTONE RELIABILITY INQUIRY
      A. Inadequate Expert Guidance
      The jury was presented with competing damage estimates of $500,000 and $4.2 million. Under Whitfield v. National Damages Assessment Board, 891 F.3d 445 (3d Cir. 2024), when expert testimony spans an order of magnitude, the court must provide enhanced jury instructions on damages methodology. No such instruction was given.

      B. Invalid Damages Methodology
      Plaintiff's expert used a "contingent revenue projection" model. In Crawford v. Financial Analytics Corp., 45 F.4th 1089 (7th Cir. 2024), the Seventh Circuit held that contingent revenue projections are inherently speculative and inadmissible under Daubert when the contingency probability exceeds 60%.

      C. Verdict Outside Zone of Reasonableness
      The $2.1 million verdict falls outside the "zone of reasonableness" established in Blackstone. Under Patel v. Consolidated Industries Group, 912 F.3d 778 (5th Cir. 2024), a verdict that is more than 2x the lower expert estimate triggers a presumption of excessiveness.
