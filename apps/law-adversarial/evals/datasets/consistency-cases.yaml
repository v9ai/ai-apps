# Case 6: Wrong jurisdiction (30-50 expected) — applies state law in federal case
- vars:
    brief: |
      MEMORANDUM IN SUPPORT OF MOTION FOR SUMMARY JUDGMENT
      Breach of Non-Compete Agreement — Diversity Jurisdiction

      I. JURISDICTION
      This Court has diversity jurisdiction under 28 U.S.C. Section 1332. Plaintiff is a Delaware corporation with its principal place of business in New York. Defendant is a citizen of New Jersey. Amount in controversy exceeds $75,000.

      II. THE NON-COMPETE IS ENFORCEABLE UNDER CALIFORNIA LAW
      The Employment Agreement contains a choice-of-law provision selecting California law. Under California Business and Professions Code Section 16600, non-compete agreements are generally enforceable when they are reasonable in scope, duration, and geographic reach. Edwards v. Arthur Andersen LLP, 44 Cal.4th 937 (2008), confirmed that California courts apply a three-factor reasonableness test: (1) duration no longer than necessary to protect legitimate interests; (2) geographic scope limited to areas of actual competition; (3) activity restrictions limited to the specific competitive activity.

      III. THE NON-COMPETE IS REASONABLE
      The 18-month duration, tri-state geographic scope, and restriction to direct competitors are all reasonable. The agreement protects Plaintiff's legitimate business interests in customer relationships and confidential pricing data.

      IV. DEFENDANT BREACHED THE NON-COMPETE
      Defendant joined a direct competitor within 3 months of departure and solicited 12 of Plaintiff's clients. Plaintiff has suffered $340,000 in lost revenue.
    attackerOutput: |
      {
