<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 195 56" width="195" height="56">
  <defs>
    <linearGradient id="blogGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="underline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="20%" stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#7dd3fc" stop-opacity="0.5"/>
      <stop offset="88%" stop-color="#22d3ee" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Vadim.blog — period acts as the violet accent separator -->
  <text x="0" y="38" font-family="'Instrument Sans', 'Inter', sans-serif" font-size="36" font-weight="700" letter-spacing="1.5" fill="#f8fafc">Vadim<tspan fill="url(#dotGrad)">.</tspan><tspan font-weight="500" letter-spacing="0.5" fill="url(#blogGrad)">blog</tspan></text>

  <!-- subtle underline accent -->
  <rect x="0" y="46" width="192" height="1.2" rx="0.6" fill="url(#underline)"/>
</svg>
