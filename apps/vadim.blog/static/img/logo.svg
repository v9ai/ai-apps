<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60" width="300" height="60">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&amp;family=Instrument+Sans:wght@500;600;700&amp;family=JetBrains+Mono:wght@400&amp;display=swap');
    </style>

    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#6dd5ed"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <filter id="aiGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feColorMatrix in="b" type="matrix"
        values="0.4 0 0 0 0.3  0 0.4 0 0 0.5  0 0 0.6 0 1  0 0 0 0.35 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <linearGradient id="blogGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6dd5ed"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>

  </defs>

  <!-- VADIM -->
  <text x="0" y="42"
    font-family="'Instrument Sans', sans-serif"
    font-size="36" font-weight="700" letter-spacing="2"
    fill="#e2e8f0">VADIM</text>

  <!-- .blog -->
  <text x="138" y="42"
    font-family="'Instrument Sans', sans-serif"
    font-size="36" font-weight="500" letter-spacing="0"
    fill="url(#blogGrad)">.blog</text>

  <!-- Separator bar -->
  <rect x="230" y="14" width="1.5" height="30" rx="1" fill="#334155" opacity="0.5"/>

  <!-- AI -->
  <text x="244" y="42"
    font-family="'Syne', sans-serif"
    font-size="36" font-weight="700"
    fill="url(#aiGrad)" filter="url(#aiGlow)">AI</text>

</svg>
