<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" width="220" height="48">
  <defs>
    <linearGradient id="blogGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Vadim.blog — period acts as the violet accent separator -->
  <text x="0" y="38" font-family="'Instrument Sans', 'Inter', sans-serif" font-size="36" font-weight="700" letter-spacing="1.5" fill="#f8fafc">Vadim<tspan fill="url(#dotGrad)">.</tspan><tspan font-weight="500" letter-spacing="0.5" fill="url(#blogGrad)">blog</tspan></text>
</svg>
