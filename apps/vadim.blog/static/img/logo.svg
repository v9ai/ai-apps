<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <defs>
    <linearGradient id="blogGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="underline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="20%" stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#7dd3fc" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#22d3ee" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Vadim -->
  <text x="0" y="42" font-family="'Instrument Sans', sans-serif" font-size="36" font-weight="700" letter-spacing="3" fill="#f8fafc">Vadim</text>

  <!-- dot accent -->
  <circle cx="113" cy="40" r="3.5" fill="url(#dotGrad)"/>

  <!-- blog -->
  <text x="121" y="42" font-family="'Instrument Sans', sans-serif" font-size="36" font-weight="500" letter-spacing="0.5" fill="url(#blogGrad)">blog</text>

  <!-- subtle underline accent -->
  <rect x="0" y="50" width="200" height="1.2" rx="0.6" fill="url(#underline)"/>
</svg>
