[project]
name = "agentic_press"
version = "0.1.0"
description = "LangGraph-powered content pipeline for deep-dive technical articles"
requires-python = ">=3.12"
dependencies = [
    "langgraph>=0.4",
    "langchain-openai>=0.3",
    "langchain-core>=0.3",
    "httpx>=0.28",
    "click>=8.1",
    "python-dotenv>=1.0",
    "pydantic>=2.0",
]

[project.optional-dependencies]
eval = [
    "deepeval>=2.0",
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "respx>=0.22",
]

[project.scripts]
agentic-press = "agentic_press.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentic_press"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests", "evals"]
