description: "Editor Agent Eval — APPROVE/REVISE quality gate (PRIORITY 2)"
sharing: false

prompts:
  - |
    You are an Editor for a journalism team.
    You are the final quality gate before content is published. You review drafts for
    accuracy, clarity, tone, structure, and publication readiness.

    You receive: a draft, a research brief, and an SEO strategy.

    Perform these passes:

    1. FACT-CHECK: Cross-reference every claim against the research brief.
       Flag any statement not backed by the research brief. Flag any claim in the
       draft that appears in the SEO strategy but NOT in the research brief — these
       are likely hallucinated.

    2. STRUCTURE: Check heading structure matches SEO recommendations.
       Primary keyword in H1 and first paragraph? Word count in range?

    3. CLARITY: Line-edit for readability.
       - Break sentences over 25 words
       - No paragraph over 4 sentences
       - Convert passive to active voice
       - Remove weasel words

    4. TONE: Verify the voice is authoritative but approachable.

    5. EDITORIAL STANDARDS:
       - Spell out one through nine; use digits for 10+
       - Include context for numbers
       - Attribute data to its original source

    DECISION — based on all passes, respond with one of:

    **DECISION: APPROVE**
    Apply copy-edits directly and output the final article with
    `status: published` in the frontmatter.

    **DECISION: REVISE**
    ## Critical Issues (must fix)
    - [ ] [Issue — paragraph ref]
    ## Suggestions (should fix)
    - [ ] [Suggestion]
    ## Minor Notes (nice to have)
    - [ ] [Note]

    Maximum 1 revision round.

    Rules:
    1. NEVER approve a draft with unverified claims
    2. NEVER rewrite from scratch — edit what exists
    3. Preserve the Writer's voice
    4. Be specific in revision notes

providers:
  - id: openai:chat:deepseek-reasoner
    label: deepseek-reasoner
    config:
      apiKeyEnvar: DEEPSEEK_API_KEY
      apiBaseUrl: https://api.deepseek.com/v1
      temperature: 0
  - id: openai:chat:qwen-plus
    label: qwen-plus
    config:
      apiKeyEnvar: DASHSCOPE_API_KEY
      apiBaseUrl: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      temperature: 0

defaultTest:
  options:
    provider:
      id: openai:chat:deepseek-chat
      config:
        apiKeyEnvar: DEEPSEEK_API_KEY
        apiBaseUrl: https://api.deepseek.com/v1
        temperature: 0

tests:
  # Should APPROVE — clean draft with all facts from research
  - vars:
      input: "file://fixtures/editor-input-approvable.md"
    assert:
      - type: javascript
        value: "file://assertions/validate-editor.js"
      - type: contains
        value: "APPROVE"
      - type: llm-rubric
        value: >
          The editor should APPROVE this draft because all claims are backed by the
          research brief. The output should include the final article with
          status: published frontmatter. Copy-edits should be minor — the draft is
          already well-structured. Rate on appropriate approval and quality of edits.

  # Should REVISE — draft contains fabricated statistics
  - vars:
      input: "file://fixtures/editor-input-needs-revision.md"
    assert:
      - type: javascript
        value: "file://assertions/validate-editor.js"
      - type: contains
        value: "REVISE"
      - type: llm-rubric
        value: >
          The editor MUST flag these fabricated claims not in the research brief:
          (1) "73% of developers underestimate cold start impact" — no Stanford study
          in research brief; (2) "67% of enterprises evaluating Wasm" — no Gartner
          survey in research brief; (3) "40% cost reduction" — no McKinsey analysis
          in research brief; (4) "82% of platform teams plan to adopt Wasm" — no
          industry survey in research brief. The editor should REVISE, not APPROVE.
          Rate on fact-checking precision and catching all fabricated claims.

outputPath: ../promptfoo-output/editor-latest.json
