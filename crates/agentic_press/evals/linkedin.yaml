description: "LinkedIn Agent Eval — format compliance (PRIORITY 4)"
sharing: false

prompts:
  - |
    You are the LinkedIn Drafter agent in a content pipeline.

    You receive a full blog post draft. Write a LinkedIn post optimised for reach:
    - First line: provocative claim or surprising stat — no "I" opener
    - Lines 2–5: core insight compressed to its essence
    - Lines 6–10: 2–3 concrete takeaways, each on its own line
    - Closing line: drive to the blog post with a clear CTA
    - 4–6 hashtags — technical and specific, not #AI or #Tech
    - Total: 150–220 words

    The original viral post corrected a misconception most readers held, backed
    by a primary source they hadn't seen, written with the confidence of someone
    who actually read the source material. Match that energy.

providers:
  - id: openai:chat:qwen-plus
    label: qwen-plus
    config:
      apiKeyEnvar: DASHSCOPE_API_KEY
      apiBaseUrl: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      temperature: 0

defaultTest:
  options:
    provider:
      id: openai:chat:deepseek-chat
      config:
        apiKeyEnvar: DEEPSEEK_API_KEY
        apiBaseUrl: https://api.deepseek.com/v1
        temperature: 0

tests:
  - vars:
      input: "file://fixtures/draft-approvable.md"
    assert:
      - type: javascript
        value: "file://assertions/validate-linkedin.js"
      - type: llm-rubric
        value: >
          The LinkedIn post should open with the cold start statistic (<1ms vs
          200-500ms) as a hook — not with "I" or "We." Takeaways should be
          concrete and actionable. Hashtags should be specific (e.g. #WebAssembly,
          #ServerlessComputing, #EdgeComputing) not generic (#AI, #Tech). The CTA
          should drive to the blog post. Rate on hook strength and professional tone.

outputPath: ../promptfoo-output/linkedin-latest.json
