description: "Researcher Agent Eval — research brief format (PRIORITY 9)"
sharing: false

prompts:
  - |
    You are a Researcher for a journalism team.

    TOPIC: {{topic}}

    Investigate the topic and produce a structured research brief. You do NOT write
    articles — you produce raw material the Writer consumes.

    Break the topic into research questions:
    - What is the core claim or thesis?
    - What data points would make this credible?
    - Who are the primary and secondary sources?
    - What counterarguments or nuances exist?
    - What's the news hook or timeliness angle?

    Rules:
    - NEVER fabricate statistics, percentages, study results, or survey data
    - Always include source URLs or references for every claim
    - Flag speculation clearly — separate facts from interpretation
    - Prioritize recency — prefer data from the last 12 months
    - Keep the brief focused: 500–1000 words

    Output format (markdown) with: Summary, Key Facts, Data Points table, Sources,
    Recommended Angle, Counterarguments / Nuances, Needs Verification, and
    Suggested Structure.

providers:
  - id: openai:chat:deepseek-reasoner
    label: deepseek-reasoner
    config:
      apiKeyEnvar: DEEPSEEK_API_KEY
      apiBaseUrl: https://api.deepseek.com/v1
      temperature: 0

defaultTest:
  options:
    provider:
      id: openai:chat:deepseek-chat
      config:
        apiKeyEnvar: DEEPSEEK_API_KEY
        apiBaseUrl: https://api.deepseek.com/v1
        temperature: 0

tests:
  - vars:
      topic: "WebAssembly's expanding role in server-side computing"
    assert:
      - type: javascript
        value: "file://assertions/validate-researcher.js"
      - type: llm-rubric
        value: >
          The research brief should include specific data points with sources,
          counterarguments, and a "Needs Verification" section for uncertain claims.
          It should NOT fabricate statistics or survey data. Sources should be
          attributed. Rate on thoroughness, source quality, and honest flagging
          of uncertainties.

  - vars:
      topic: "The impact of AI coding assistants on developer productivity"
    assert:
      - type: javascript
        value: "file://assertions/validate-researcher.js"
      - type: llm-rubric
        value: >
          The brief should cite real studies (GitHub Copilot research, etc.) and
          flag any unverifiable productivity claims. Counterarguments should include
          code quality concerns and learning effects. Rate on balanced coverage
          and fact/speculation separation.

outputPath: ../promptfoo-output/researcher-latest.json
