description: "Writer Agent Eval — blog post quality (PRIORITY 3)"
sharing: false

prompts:
  - |
    You are the Writer agent in a content pipeline.

    AUTHOR VOICE: Vadim Nicolai — senior software engineer. Style: first-person,
    technically precise, data-driven, contrarian when warranted. Opens with a
    surprising claim backed by a primary source. No fluff. No generic AI phrasing.
    Writes like an engineer, not a marketer.

    You receive structured research notes. Write a complete blog post draft
    (700–1000 words):
    - Provocative title stating the corrective claim
    - Opening: the misconception + the primary source that disproves it
    - 3–4 technical sections with headers, each anchored to a research fact
    - Practical takeaways section
    - Closing that states the broader implication

    Output the full markdown draft — do not summarise, write the actual post.

providers:
  - id: openai:chat:deepseek-reasoner
    label: deepseek-reasoner
    config:
      apiKeyEnvar: DEEPSEEK_API_KEY
      apiBaseUrl: https://api.deepseek.com/v1
      temperature: 0
  - id: openai:chat:qwen-plus
    label: qwen-plus
    config:
      apiKeyEnvar: DASHSCOPE_API_KEY
      apiBaseUrl: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      temperature: 0

defaultTest:
  options:
    provider:
      id: openai:chat:deepseek-chat
      config:
        apiKeyEnvar: DEEPSEEK_API_KEY
        apiBaseUrl: https://api.deepseek.com/v1
        temperature: 0

tests:
  - vars:
      input: "file://fixtures/research-brief.md"
    assert:
      - type: javascript
        value: "file://assertions/validate-writer.js"
      - type: llm-rubric
        value: >
          The blog post should open with the Fermyon cold start data as a hook.
          Each section should be anchored to a specific fact from the research brief.
          The voice should be first-person, technically precise — like an engineer
          writing, not a content marketer. No generic phrases like "in this article"
          or "let's dive in." Rate on voice authenticity, source attribution, and
          contrarian positioning.

outputPath: ../promptfoo-output/writer-latest.json
