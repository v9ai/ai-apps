description: "E2E Journalism Eval — cross-agent coherence (PRIORITY 10)"
sharing: false

prompts:
  - |
    You are a Writer for a journalism team.

    You receive a research brief and an SEO strategy. Write a publication-ready draft.

    Cross-reference rule:
    - ONLY use facts that appear in the Research Brief
    - If the SEO Strategy mentions data claims not in the Research Brief, DO NOT
      include them
    - If the research brief has a "Needs Verification" section, do NOT present those
      items as established facts

    Target 1200–1800 words with frontmatter (title, description, date, tags, status: draft).

providers:
  - id: openai:chat:deepseek-reasoner
    label: deepseek-reasoner
    config:
      apiKeyEnvar: DEEPSEEK_API_KEY
      apiBaseUrl: https://api.deepseek.com/v1
      temperature: 0

defaultTest:
  options:
    provider:
      id: openai:chat:deepseek-chat
      config:
        apiKeyEnvar: DEEPSEEK_API_KEY
        apiBaseUrl: https://api.deepseek.com/v1
        temperature: 0

tests:
  - vars:
      input: |
        ## Research Brief

        file://fixtures/research-brief.md

        ---

        ## SEO Strategy

        file://fixtures/seo-strategy.md
    assert:
      - type: javascript
        value: |
          module.exports = (output) => {
            if (typeof output !== 'string' || output.trim().length === 0) {
              return { pass: false, score: 0, reason: 'Output is empty' };
            }

            const errors = [];

            // Research terms that MUST appear (from the research brief)
            const requiredTerms = ['Fermyon', 'Fastly', 'WASI', 'Bytecode Alliance'];
            const missingTerms = requiredTerms.filter(t => !output.includes(t));
            if (missingTerms.length > 0) {
              errors.push(`Missing research terms: ${missingTerms.join(', ')}`);
            }

            // Fabricated claims that must NOT appear (from Needs Verification)
            const fabricated = ['70% of edge computing', '70%'];
            const foundFabricated = fabricated.filter(f => output.includes(f));
            if (foundFabricated.length > 0) {
              errors.push(`Includes unverified claim: "${foundFabricated.join('", "')}"`);
            }

            // Must have frontmatter
            if (!output.includes('status: draft')) {
              errors.push('Missing frontmatter with status: draft');
            }

            if (errors.length > 0) {
              return { pass: false, score: 0, reason: errors.join('; ') };
            }

            return { pass: true, score: 1, reason: 'Cross-agent coherence: research terms present, no fabricated claims' };
          };
      - type: llm-rubric
        value: >
          Evaluate cross-agent coherence: (1) Does the writer reference specific
          facts from the research brief (Fermyon <1ms, Fastly 18B requests, WASI
          Preview 2, Bytecode Alliance 30+ members)? (2) Does the writer avoid
          the "Needs Verification" items from the research brief (70% edge computing
          claim, memory overhead comparisons)? (3) Are facts attributed to their
          original sources? Rate on faithfulness to research and absence of
          hallucinated additions.

outputPath: ../promptfoo-output/e2e-journalism-latest.json
